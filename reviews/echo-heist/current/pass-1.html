<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0a0f;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden}
  canvas{display:block;image-rendering:pixelated}
  #ui-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
  #math-popup{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(10,15,30,0.96);border:2px solid #00e5ff;border-radius:12px;padding:24px 28px;min-width:340px;max-width:420px;pointer-events:all;z-index:20;box-shadow:0 0 40px rgba(0,229,255,0.25)}

  #math-popup .prompt-text{color:#e0e6ed;font-size:16px;line-height:1.5;margin-bottom:16px}
  #math-popup input{width:100%;background:#0d1117;border:1px solid #30363d;color:#fff;font-size:18px;padding:10px 14px;border-radius:8px;outline:none;font-family:monospace}
  #math-popup input:focus{border-color:#00e5ff}
  #math-popup .feedback{margin-top:10px;font-size:14px;min-height:20px}
  #math-popup .hint{color:#64748b;font-size:12px;margin-top:8px}
  .fb-correct{color:#22c55e}.fb-wrong{color:#ef4444}
  #math-popup.vault-mode{border-color:#ffd700;box-shadow:0 0 60px rgba(255,215,0,0.3)}
  #math-popup.vault-mode h3{color:#ffd700}
  #math-popup.vault-mode input:focus{border-color:#ffd700}
  .vault-progress{display:flex;gap:8px;margin-bottom:12px}
  .vault-step{width:32px;height:6px;border-radius:3px;background:#1e293b}
  .vault-step.done{background:#22c55e}
  .vault-step.active{background:#ffd700;animation:vaultPulse 0.6s ease-in-out infinite alternate}
  @keyframes vaultPulse{from{opacity:0.6}to{opacity:1}}
  #math-popup.escape-mode{border-color:#ef4444;box-shadow:0 0 60px rgba(239,68,68,0.3)}
  #math-popup.escape-mode h3{color:#ef4444}
  #math-popup.escape-mode input:focus{border-color:#ef4444}
</style>
</head>

document.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (gameState === STATE.VAULT) handleVaultKey(e);
  else if (gameState === STATE.MATH) handleMathKey(e);
  else if (gameState === STATE.MENU) handleMenuKey(e);
  else if (gameState === STATE.BRIEFING) handleBriefingKey(e);

});

// ── MATH VALIDATION ENGINE ─────────────────────────────────────
function normalizeAnswer(raw) {
  let s = raw.trim().toLowerCase().replace(/\s+/g, '');
  // Remove trailing % for comparison
  s = s.replace(/%$/, '');
  return s;
}

function parseNumericValue(s) {
  // Try fraction
  const fracMatch = s.match(/^(-?\d+)\/(\d+)$/);
  if (fracMatch) return parseInt(fracMatch[1]) / parseInt(fracMatch[2]);
  // Try decimal
  const n = parseFloat(s);
  if (!isNaN(n)) return n;
  return null;
}

function checkAnswer(userRaw, correctRaw, tolerance) {
  const u = normalizeAnswer(userRaw);
  const c = normalizeAnswer(correctRaw);
  // Exact string match
  if (u === c) return true;
  // Numeric equivalence
  const uv = parseNumericValue(u);
  const cv = parseNumericValue(c);
  if (uv !== null && cv !== null) {
    const tol = tolerance || 0.01;
    return Math.abs(uv - cv) < tol;
  }
  return false;
}

// ── ENTITY HELPERS ─────────────────────────────────────────────
function tileAt(gx, gy) {
  if (gx < 0 || gx >= COLS || gy < 0 || gy >= ROWS) return T.WALL;
  return level.map[gy][gx];
}

function isSolid(gx, gy) {
  const t = tileAt(gx, gy);
  return t === T.WALL || t === T.DOOR_LOCKED;
}

function pixelToGrid(px, py) {
  return { gx: Math.floor(px / TILE), gy: Math.floor(py / TILE) };
}

// ── GUARD AI ───────────────────────────────────────────────────
function createGuard(def) {
  return {
    x: def.x * TILE + TILE/2,
    y: def.y * TILE + TILE/2,
    route: def.route.map(r => ({ x: r[0]*TILE+TILE/2, y: r[1]*TILE+TILE/2 })),
    routeIdx: 0,
    speed: def.speed,
    coneAngle: def.coneAngle * DEG,
    coneRange: def.coneRange * TILE,
    facing: 0,
    state: 'patrol', // patrol, investigate, chase
    alertTimer: 0,
    investigateTarget: null,
    chaseTimer: 0
  };
}

function updateGuard(g, dt) {
  if (g.state === 'patrol') {
    const target = g.route[g.routeIdx];
    const dx = target.x - g.x;
    const dy = target.y - g.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 2) {
      g.routeIdx = (g.routeIdx + 1) % g.route.length;
    } else {
      const speed = g.speed * TILE * dt;
      g.x += (dx/dist) * speed;
      g.y += (dy/dist) * speed;
      g.facing = Math.atan2(dy, dx);
    }
  } else if (g.state === 'investigate') {
    if (g.investigateTarget) {
      const dx = g.investigateTarget.x - g.x;
      const dy = g.investigateTarget.y - g.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < TILE) {
        g.alertTimer -= dt;
        if (g.alertTimer <= 0) {
          g.state = 'patrol';
          g.investigateTarget = null;
        }
      } else {
        const speed = g.speed * 1.5 * TILE * dt;
        g.x += (dx/dist) * speed;
        g.y += (dy/dist) * speed;
        g.facing = Math.atan2(dy, dx);
      }
    }
  } else if (g.state === 'chase') {
    const dx = player.x - g.x;
    const dy = player.y - g.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const speed = g.speed * 2.0 * TILE * dt;
    g.x += (dx/dist) * speed;
    g.y += (dy/dist) * speed;
    g.facing = Math.atan2(dy, dx);
    g.chaseTimer -= dt;
    if (g.chaseTimer <= 0 || dist > 8 * TILE) {
      g.state = 'patrol';
    }
    // Catch player
    if (dist < TILE * 0.6) {
      gameState = STATE.CAUGHT;
    }
  }

  // Vision check
  if (gameState === STATE.PLAYING && !mathActive) {
    const dx = player.x - g.x;
    const dy = player.y - g.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const angle = Math.atan2(dy, dx);
    let diff = angle - g.facing;
    while (diff > Math.PI) diff -= PI2;
    while (diff < -Math.PI) diff += PI2;

    const effectiveRange = player.crouching ? g.coneRange * 0.6 : g.coneRange;
    if (dist < effectiveRange && Math.abs(diff) < g.coneAngle / 2) {
      // Line of sight check (simple: just check walls between)
      if (hasLineOfSight(g.x, g.y, player.x, player.y)) {
        if (g.state === 'patrol') {
          g.state = 'investigate';
          g.investigateTarget = { x: player.x, y: player.y };
          g.alertTimer = 3;
          heat = Math.min(100, heat + 15);
        } else if (g.state === 'investigate' && dist < effectiveRange * 0.6) {
          g.state = 'chase';
          g.chaseTimer = 6;
          heat = Math.min(100, heat + 25);
        }
      }
    }
  }

  // React to noise
  if (noise > 40 && g.state === 'patrol') {
    const dx = player.x - g.x;
    const dy = player.y - g.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 6 * TILE) {
      g.state = 'investigate';
      g.investigateTarget = { x: player.x + (Math.random()-0.5)*TILE*2, y: player.y + (Math.random()-0.5)*TILE*2 };
      g.alertTimer = 4;
    }
  }
}

function hasLineOfSight(x1, y1, x2, y2) {
  const steps = 20;
  for (let i = 1; i < steps; i++) {
    const t = i / steps;
    const px = x1 + (x2-x1)*t;
    const py = y1 + (y2-y1)*t;
    if (isSolid(Math.floor(px/TILE), Math.floor(py/TILE))) return false;
  }
  return true;
}

// ── CAMERA SYSTEM ──────────────────────────────────────────────
function createCamera(def) {
  return {
    x: def.x * TILE + TILE/2,
    y: def.y * TILE + TILE/2,
    baseAngle: def.angle * DEG,
    currentAngle: def.angle * DEG,
    sweep: def.sweep * DEG,
    range: def.range * TILE,
    speed: def.speed * DEG,
    direction: 1,
    disabled: false
  };
}

function updateCamera(cam, dt) {
  if (cam.disabled) return;
  cam.currentAngle += cam.speed * cam.direction * dt;
  const halfSweep = cam.sweep / 2;
  if (cam.currentAngle > cam.baseAngle + halfSweep) {
    cam.direction = -1;
  } else if (cam.currentAngle < cam.baseAngle - halfSweep) {
    cam.direction = 1;
  }

  // Detection
  if (gameState === STATE.PLAYING && !mathActive) {
    const dx = player.x - cam.x;
    const dy = player.y - cam.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const angle = Math.atan2(dy, dx);
    let diff = angle - cam.currentAngle;
    while (diff > Math.PI) diff -= PI2;
    while (diff < -Math.PI) diff += PI2;
    const coneHalf = 35 * DEG;
    if (dist < cam.range && Math.abs(diff) < coneHalf) {
      if (hasLineOfSight(cam.x, cam.y, player.x, player.y)) {
        heat = Math.min(100, heat + 20 * dt);
        if (heat >= 100) gameState = STATE.CAUGHT;
      }
    }
  }
}

// ── LEVEL INITIALIZATION ───────────────────────────────────────
function loadLevel(missionIdx) {
  // Deep copy so door unlocks don't persist across retries
  const src = LEVELS[missionIdx];
  level = {
    guards: src.guards,
    cameras: src.cameras,
    interactables: src.interactables,
    loot: src.loot,
    map: src.map.map(row => [...row])
  };
  const mission = MISSIONS[missionIdx];

  // Find spawn
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      if (level.map[y][x] === T.SPAWN) {
        player.x = x * TILE + TILE/2;
        player.y = y * TILE + TILE/2;
      }
    }
  }

  player.vx = 0; player.vy = 0;
  player.crouching = false;
  player.hasLoot = false;
  player.facing = 0;

  guards = level.guards.map(createGuard);
  cameras = level.cameras.map(createCamera);

  interactables = level.interactables.map(ia => ({
    x: ia.x * TILE + TILE/2,
    y: ia.y * TILE + TILE/2,
    type: ia.type,
    prompt: mission.prompts[ia.promptIdx],
    solved: false,
    gx: ia.x, gy: ia.y
  }));

  lootPos = level.loot ? { x: level.loot.x * TILE + TILE/2, y: level.loot.y * TILE + TILE/2 } : null;

  heat = 0; noise = 0; score = 0;
  mathCorrect = 0; mathTotal = 0; mathTimes = [];
  missionTimer = 0;
  echoRecording = false; echoBuffer = []; echoGhost = null; echoAvailable = true;
  promptQueue = [...mission.prompts];
  currentPromptIdx = 0;

  // Reset vault/escape
  vaultActive = false; vaultStep = 0; vaultPrompts = []; vaultTimer = 0;
  escapeActive = false; escapeCountdown = 60; escapeFlashTimer = 0;
  mathActive = false;
  document.getElementById('math-popup').style.display = 'none';
  document.getElementById('vault-progress').style.display = 'none';
}

// ── PLAYER UPDATE ──────────────────────────────────────────────
function updatePlayer(dt) {
  if (mathActive) return;

  const cls = CLASSES[selectedClass];
  let speed = cls.moveSpeed * TILE;
  if (player.crouching) speed *= 0.5;

  // Sprinting (Runner burst)
  player.vx = 0; player.vy = 0;
  if (keys['w'] || keys['arrowup']) player.vy = -speed;
  if (keys['s'] || keys['arrowdown']) player.vy = speed;
  if (keys['a'] || keys['arrowleft']) player.vx = -speed;
  if (keys['d'] || keys['arrowright']) player.vx = speed;

  // Normalize diagonal
  if (player.vx && player.vy) {
    player.vx *= 0.707;
    player.vy *= 0.707;
  }

  // Update facing
  if (player.vx || player.vy) {
    player.facing = Math.atan2(player.vy, player.vx);
  }

  // Move with collision
  const nx = player.x + player.vx * dt;
  const ny = player.y + player.vy * dt;
  const r = TILE * 0.3;

  // X axis
  if (!isSolid(Math.floor((nx - r)/TILE), Math.floor((player.y - r)/TILE)) &&
      !isSolid(Math.floor((nx + r)/TILE), Math.floor((player.y - r)/TILE)) &&
      !isSolid(Math.floor((nx - r)/TILE), Math.floor((player.y + r)/TILE)) &&
      !isSolid(Math.floor((nx + r)/TILE), Math.floor((player.y + r)/TILE))) {
    player.x = nx;
  }
  // Y axis
  if (!isSolid(Math.floor((player.x - r)/TILE), Math.floor((ny - r)/TILE)) &&
      !isSolid(Math.floor((player.x + r)/TILE), Math.floor((ny - r)/TILE)) &&
      !isSolid(Math.floor((player.x - r)/TILE), Math.floor((ny + r)/TILE)) &&
      !isSolid(Math.floor((player.x + r)/TILE), Math.floor((ny + r)/TILE))) {
    player.y = ny;
  }

  // Noise generation
  const { gx, gy } = pixelToGrid(player.x, player.y);
  const tileType = tileAt(gx, gy);
  const tileNoise = NOISE_MAP[tileType] || 2;
  const moving = player.vx !== 0 || player.vy !== 0;
  const noiseGen = moving ? tileNoise * cls.noiseMultiplier * (player.crouching ? 0.3 : 1.0) : 0;
  noise = Math.max(0, Math.min(100, noise + noiseGen * dt - noiseDecay * dt));

  // Crouching
  player.crouching = keys['shift'];

  // Loot pickup → triggers vault sequence instead of instant pickup
  if (lootPos && !player.hasLoot && !vaultActive && !escapeActive) {
    const dx = player.x - lootPos.x;
    const dy = player.y - lootPos.y;
    if (Math.sqrt(dx*dx + dy*dy) < TILE * 0.8) {
      startVault();
    }
  }

  // Exit check — only during escape phase
  if (escapeActive) {
    const exitTile = tileAt(gx, gy);
    if (exitTile === T.EXIT) {
      finishMission();
    }
  }

  // Echo recording
  if (echoRecording) {
    const elapsed = (Date.now() - echoStartTime) / 1000;
    echoBuffer.push({ x: player.x, y: player.y, facing: player.facing, crouching: player.crouching, t: elapsed });
    if (elapsed >= ECHO_DURATION) {
      stopEchoRecording();
    }
  }
}

// ── ECHO SYSTEM ────────────────────────────────────────────────
function startEchoRecording() {
  if (!echoAvailable || echoRecording) return;
  echoRecording = true;
  echoBuffer = [];
  echoStartTime = Date.now();
}

function stopEchoRecording() {
  echoRecording = false;
  echoAvailable = false;
  echoGhost = { frames: [...echoBuffer], playIdx: 0, active: true, startTime: Date.now() };
}

function updateEcho(dt) {
  if (!echoGhost || !echoGhost.active) return;
  const elapsed = (Date.now() - echoGhost.startTime) / 1000;
  // Find frame closest to elapsed time
  while (echoGhost.playIdx < echoGhost.frames.length - 1 &&
         echoGhost.frames[echoGhost.playIdx + 1].t <= elapsed) {
    echoGhost.playIdx++;
  }
  if (echoGhost.playIdx >= echoGhost.frames.length - 1) {
    echoGhost.active = false;
  }
}

// ── VAULT SEQUENCE ─────────────────────────────────────────────
function startVault() {
  const mission = MISSIONS[currentMission];
  vaultActive = true;
  vaultStep = 0;
  vaultPrompts = mission.vaultPrompts;
  vaultStartTime = Date.now();
  vaultTimer = 0;
  gameState = STATE.VAULT;
  showVaultPrompt();
}

function showVaultPrompt() {
  const p = vaultPrompts[vaultStep];
  mathActive = true;
  mathPrompt = p;
  mathStartTime = Date.now();

  const popup = document.getElementById('math-popup');
  const title = document.getElementById('popup-title');
  const prompt = document.getElementById('popup-prompt');
  const input = document.getElementById('popup-input');
  const feedback = document.getElementById('popup-feedback');
  const progress = document.getElementById('vault-progress');

  popup.className = 'vault-mode';
  popup.style.display = 'block';
  title.textContent = `🔐 VAULT · LOCK ${vaultStep + 1} / ${vaultPrompts.length}`;
  prompt.textContent = p.text;
  input.value = '';
  feedback.textContent = '';
  input.focus();

  // Build step indicators
  progress.style.display = 'flex';
  progress.innerHTML = vaultPrompts.map((_, i) =>
    `<div class="vault-step ${i < vaultStep ? 'done' : ''} ${i === vaultStep ? 'active' : ''}"></div>`
  ).join('');
}

function advanceVault() {
  vaultStep++;
  if (vaultStep >= vaultPrompts.length) {
    finishVault();
  } else {
    showVaultPrompt();
  }
}

function finishVault() {
  vaultActive = false;
  mathActive = false;
  const popup = document.getElementById('math-popup');
  popup.style.display = 'none';
  popup.className = '';
  document.getElementById('vault-progress').style.display = 'none';

  player.hasLoot = true;
  score += 300; // vault bonus
  startEscape();
}

function handleVaultKey(e) {
  const input = document.getElementById('popup-input');
  const feedback = document.getElementById('popup-feedback');

  // No escape from vault — you must solve it
  if (e.key === 'Escape') {
    feedback.textContent = '⚠ Vault cannot be abandoned!';
    feedback.className = 'feedback fb-wrong';
    return;
  }

  if (e.key === 'Enter') {
    e.preventDefault();
    const userAnswer = input.value;
    if (!userAnswer.trim()) return;
    mathTotal++;
    const solveTime = (Date.now() - mathStartTime) / 1000;

    if (checkAnswer(userAnswer, mathPrompt.answer)) {
      mathCorrect++;
      mathTimes.push(solveTime);
      feedback.textContent = '✓ LOCK CRACKED!';
      feedback.className = 'feedback fb-correct';
      score += Math.max(20, Math.floor(150 - solveTime * 5));
      setTimeout(() => advanceVault(), 800);
    } else {
      feedback.textContent = '✗ Wrong code — try again';
      feedback.className = 'feedback fb-wrong';
      heat = Math.min(100, heat + 8);
      input.value = '';
      input.focus();
    }
  }
}

// ── ESCAPE SEQUENCE ────────────────────────────────────────────
function startEscape() {
  escapeActive = true;
  escapeCountdown = 60;
  escapeStartTime = Date.now();
  escapeFlashTimer = 0;
  gameState = STATE.PLAYING;

  // Speed up all guards and set them to investigate toward player
  for (const g of guards) {
    g.speed *= 1.6;
    g.coneRange *= 1.3;
    g.coneAngle *= 1.2;
    g.state = 'investigate';
    g.investigateTarget = { x: player.x + (Math.random()-0.5)*TILE*4, y: player.y + (Math.random()-0.5)*TILE*4 };
    g.alertTimer = 5;
  }

  // Place escape gates — lock doors on the escape path
  const mission = MISSIONS[currentMission];
  const src = LEVELS[currentMission];
  if (src.escapeGates) {
    src.escapeGates.forEach((gate, i) => {
      level.map[gate.y][gate.x] = T.DOOR_LOCKED;
      const escPrompt = mission.escapePrompts[i] || mission.escapePrompts[0];
      interactables.push({
        x: gate.x * TILE + TILE/2,
        y: gate.y * TILE + TILE/2,
        type: 'escape_gate',
        prompt: escPrompt,
        solved: false,
        gx: gate.x, gy: gate.y
      });
    });
  }
}

function updateEscape(dt) {
  if (!escapeActive) return;
  escapeCountdown -= dt;
  escapeFlashTimer += dt;
  if (escapeCountdown <= 0) {
    escapeCountdown = 0;
    gameState = STATE.CAUGHT;
  }
}

// ── INTERACTION ────────────────────────────────────────────────
function tryInteract() {
  for (const ia of interactables) {
    if (ia.solved) continue;
    const dx = player.x - ia.x;
    const dy = player.y - ia.y;
    if (Math.sqrt(dx*dx + dy*dy) < TILE * 1.2) {
      openMathPopup(ia);
      return;
    }
  }
}

function openMathPopup(ia) {
  mathActive = true;
  mathPrompt = ia.prompt;
  mathInteractable = ia;
  mathStartTime = Date.now();
  mathInputValue = '';
  gameState = STATE.MATH;

  const popup = document.getElementById('math-popup');
  const title = document.getElementById('popup-title');
  const prompt = document.getElementById('popup-prompt');
  const input = document.getElementById('popup-input');
  const feedback = document.getElementById('popup-feedback');

  // Style based on context
  popup.className = ia.type === 'escape_gate' ? 'escape-mode' : '';
  document.getElementById('vault-progress').style.display = 'none';

  if (ia.type === 'escape_gate') {
    title.textContent = '🚨 ESCAPE GATE';
  } else {
    title.textContent = ia.type === 'terminal' ? '🖥 Terminal' : '🔒 Keypad';
  }
  prompt.textContent = mathPrompt.text;
  input.value = '';
  feedback.textContent = '';
  popup.style.display = 'block';
  input.focus();
}

function closeMathPopup(solved) {
  mathActive = false;
  const popup = document.getElementById('math-popup');
  popup.style.display = 'none';
  popup.className = '';
  gameState = STATE.PLAYING;

  if (solved && mathInteractable) {
    mathInteractable.solved = true;
    // Open door / escape gate
    if (mathInteractable.type === 'door' || mathInteractable.type === 'escape_gate') {
      level.map[mathInteractable.gy][mathInteractable.gx] = T.DOOR_OPEN;
    }
    // Disable nearby camera if terminal
    if (mathInteractable.type === 'terminal') {
      let closest = null, closestDist = Infinity;
      for (const cam of cameras) {
        const dx = cam.x - mathInteractable.x;
        const dy = cam.y - mathInteractable.y;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < closestDist && !cam.disabled) {
          closest = cam; closestDist = d;
        }
      }
      if (closest && closestDist < 8 * TILE) {
        closest.disabled = true;
      }
    }
    score += mathInteractable.type === 'escape_gate' ? 100 : 50;
  }

  mathPrompt = null;
  mathInteractable = null;
}

function handleMathKey(e) {
  const input = document.getElementById('popup-input');
  const feedback = document.getElementById('popup-feedback');

  if (e.key === 'Escape') {
    heat = Math.min(100, heat + 10);
    closeMathPopup(false);
    return;
  }

  if (e.key === 'Enter') {
    e.preventDefault();
    const userAnswer = input.value;
    if (!userAnswer.trim()) return;
    mathTotal++;
    const solveTime = (Date.now() - mathStartTime) / 1000;

    if (checkAnswer(userAnswer, mathPrompt.answer)) {
      mathCorrect++;
      mathTimes.push(solveTime);
      feedback.textContent = '✓ Correct!';
      feedback.className = 'feedback fb-correct';
      score += Math.max(10, Math.floor(100 - solveTime * 5));
      setTimeout(() => closeMathPopup(true), 600);
    } else {
      feedback.textContent = '✗ Try again';
      feedback.className = 'feedback fb-wrong';
      heat = Math.min(100, heat + 5);
      input.value = '';
      input.focus();
    }
  }
}

// ── INPUT HANDLERS ─────────────────────────────────────────────
let menuSelection = 0;
const classKeys = ['hacker', 'ghost', 'runner'];

function handleMenuKey(e) {
  if (e.key === 'ArrowLeft' || e.key === 'a') menuSelection = (menuSelection + 2) % 3;
  if (e.key === 'ArrowRight' || e.key === 'd') menuSelection = (menuSelection + 1) % 3;
  if (e.key === 'Enter' || e.key === ' ') {
    selectedClass = classKeys[menuSelection];
    gameState = STATE.BRIEFING;
  }
}

function handleBriefingKey(e) {
  if (e.key === 'Enter' || e.key === ' ') {
    loadLevel(currentMission);
    gameState = STATE.PLAYING;
  }
}

function handlePlayingKey(e) {
  if (e.key === 'e') tryInteract();
  if (e.key === 'r') {
    if (!echoRecording && echoAvailable) startEchoRecording();
    else if (echoRecording) stopEchoRecording();
  }
}

function handleResultsKey(e) {
  if (e.key === 'Enter' || e.key === ' ') {
    if (gameState === STATE.CAUGHT) {
      // Restart same mission
      loadLevel(currentMission);
      gameState = STATE.PLAYING;
    } else {
      currentMission++;
      if (currentMission >= MISSIONS.length) {
        currentMission = 0;
        gameState = STATE.MENU;
      } else {
        gameState = STATE.BRIEFING;
      }
    }
  }
}

function finishMission() {
  // Calculate final score
  const timeBonus = Math.max(0, Math.floor((missionTimeLimit - missionTimer) / 10));
  const stealthBonus = Math.max(0, Math.floor((100 - heat) * 3));
  const accuracyBonus = mathTotal > 0 ? Math.floor((mathCorrect / mathTotal) * 200) : 0;
  const escapeBonus = escapeActive ? Math.floor(escapeCountdown * 5) : 0;
  score += timeBonus + stealthBonus + accuracyBonus + escapeBonus;
  escapeActive = false;
  gameState = STATE.RESULTS;
}

// ── RENDER ─────────────────────────────────────────────────────
function drawTiles() {
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      const t = level.map[y][x];
      ctx.fillStyle = COLORS[t] || COLORS[T.FLOOR];
      ctx.fillRect(x * TILE, y * TILE, TILE, TILE);

      // Grid lines (subtle)
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.strokeRect(x * TILE, y * TILE, TILE, TILE);

      // Decorations
      if (t === T.DOOR_LOCKED) {
        ctx.fillStyle = '#cc6600';
        ctx.fillRect(x*TILE+4, y*TILE+TILE/2-2, TILE-8, 4);
        ctx.fillStyle = '#ffcc00';
        ctx.beginPath();
        ctx.arc(x*TILE+TILE/2, y*TILE+TILE/2, 4, 0, PI2);
        ctx.fill();
      }
      if (t === T.DOOR_OPEN) {
        ctx.fillStyle = 'rgba(58,42,26,0.5)';
        ctx.fillRect(x*TILE, y*TILE, TILE, TILE);
      }
      if (t === T.EXIT) {
        ctx.fillStyle = '#00ff4488';
        ctx.font = '20px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('EXIT', x*TILE+TILE/2, y*TILE+TILE/2+6);
      }
      if (t === T.METAL) {
        // Metal floor pattern
        ctx.strokeStyle = 'rgba(100,100,120,0.2)';
        ctx.beginPath();
        ctx.moveTo(x*TILE, y*TILE); ctx.lineTo(x*TILE+TILE, y*TILE+TILE);
        ctx.moveTo(x*TILE+TILE, y*TILE); ctx.lineTo(x*TILE, y*TILE+TILE);
        ctx.stroke();
      }
      if (t === T.CARPET) {
        ctx.fillStyle = 'rgba(40,80,50,0.15)';
        for (let i = 0; i < 3; i++) {
          ctx.fillRect(x*TILE+5+i*12, y*TILE+5, 8, 2);
          ctx.fillRect(x*TILE+8+i*10, y*TILE+TILE-7, 6, 2);
        }
      }
    }
  }
}

function drawLoot() {
  if (!lootPos || player.hasLoot) return;
  const pulse = Math.sin(Date.now() / 300) * 0.3 + 0.7;
  ctx.save();
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  // Diamond shape
  const cx = lootPos.x, cy = lootPos.y;
  ctx.moveTo(cx, cy - 12);
  ctx.lineTo(cx + 10, cy);
  ctx.lineTo(cx, cy + 12);
  ctx.lineTo(cx - 10, cy);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#ffaa00';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();

  // Glow
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 25);
  grad.addColorStop(0, 'rgba(255,215,0,0.2)');
  grad.addColorStop(1, 'rgba(255,215,0,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, cy, 25, 0, PI2);
  ctx.fill();
}

function drawInteractables() {
  for (const ia of interactables) {
    if (ia.solved) continue;
    const pulse = Math.sin(Date.now() / 500) * 0.2 + 0.8;

    if (ia.type === 'terminal') {
      ctx.fillStyle = `rgba(0,229,255,${pulse * 0.8})`;
      ctx.fillRect(ia.x - 8, ia.y - 10, 16, 14);
      ctx.fillStyle = '#001a22';
      ctx.fillRect(ia.x - 6, ia.y - 8, 12, 8);
      // Blinking cursor
      if (Math.floor(Date.now() / 500) % 2) {
        ctx.fillStyle = '#00e5ff';
        ctx.fillRect(ia.x - 3, ia.y - 5, 6, 2);
      }
    } else if (ia.type === 'door') {
      // Keypad glow near door
      ctx.fillStyle = `rgba(255,100,0,${pulse * 0.6})`;
      ctx.beginPath();
      ctx.arc(ia.x, ia.y, 6, 0, PI2);
      ctx.fill();
    } else if (ia.type === 'escape_gate') {
      // Pulsing red gate indicator
      const ep = Math.sin(Date.now() / 200) * 0.3 + 0.7;
      ctx.fillStyle = `rgba(239,68,68,${ep * 0.7})`;
      ctx.beginPath();
      ctx.arc(ia.x, ia.y, 8, 0, PI2);
      ctx.fill();
      ctx.fillStyle = '#ef4444';
      ctx.font = 'bold 10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('LOCKED', ia.x, ia.y + 18);
    }

    // Proximity indicator
    const dx = player.x - ia.x;
    const dy = player.y - ia.y;
    if (Math.sqrt(dx*dx + dy*dy) < TILE * 1.5) {
      ctx.strokeStyle = 'rgba(0,229,255,0.5)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4,4]);
      ctx.beginPath();
      ctx.arc(ia.x, ia.y, TILE * 0.8, 0, PI2);
      ctx.stroke();
      ctx.setLineDash([]);

      // E prompt
      ctx.fillStyle = 'rgba(0,229,255,0.9)';
      ctx.font = 'bold 11px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('[E]', ia.x, ia.y - 16);
    }
  }
}

function drawGuards() {
  for (const g of guards) {
    // Vision cone
    ctx.save();
    ctx.translate(g.x, g.y);
    ctx.rotate(g.facing);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, g.coneRange, -g.coneAngle/2, g.coneAngle/2);
    ctx.closePath();
    ctx.fillStyle = g.state === 'patrol' ? COLORS.guardCone :
                    g.state === 'investigate' ? 'rgba(255,136,0,0.15)' :
                    'rgba(255,0,0,0.2)';
    ctx.fill();
    ctx.restore();

    // Body
    const color = g.state === 'patrol' ? COLORS.guard :
                  g.state === 'investigate' ? COLORS.guardAlert : '#ff0000';
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(g.x, g.y, TILE * 0.35, 0, PI2);
    ctx.fill();

    // Direction indicator
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(g.x, g.y);
    ctx.lineTo(g.x + Math.cos(g.facing) * TILE * 0.4, g.y + Math.sin(g.facing) * TILE * 0.4);
    ctx.stroke();

    // Alert icon
    if (g.state !== 'patrol') {
      ctx.fillStyle = g.state === 'chase' ? '#ff0000' : '#ff8800';
      ctx.font = 'bold 14px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(g.state === 'chase' ? '!!' : '?', g.x, g.y - 20);
    }
  }
}

function drawCameras() {
  for (const cam of cameras) {
    if (cam.disabled) {
      ctx.fillStyle = 'rgba(100,100,100,0.3)';
      ctx.beginPath();
      ctx.arc(cam.x, cam.y, 6, 0, PI2);
      ctx.fill();
      continue;
    }

    // Camera cone
    ctx.save();
    ctx.translate(cam.x, cam.y);
    ctx.rotate(cam.currentAngle);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, cam.range, -35 * DEG, 35 * DEG);
    ctx.closePath();
    ctx.fillStyle = COLORS.cameraCone;
    ctx.fill();
    ctx.restore();

    // Camera body
    ctx.fillStyle = COLORS.cameraBody;
    ctx.beginPath();
    ctx.arc(cam.x, cam.y, 6, 0, PI2);
    ctx.fill();

    // Direction line
    ctx.strokeStyle = COLORS.cameraBody;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cam.x, cam.y);
    ctx.lineTo(cam.x + Math.cos(cam.currentAngle) * 12, cam.y + Math.sin(cam.currentAngle) * 12);
    ctx.stroke();
  }
}

function drawPlayer() {
  const cls = CLASSES[selectedClass];

  // Player body
  const size = player.crouching ? TILE * 0.25 : TILE * 0.3;
  ctx.fillStyle = cls.color;
  ctx.beginPath();
  ctx.arc(player.x, player.y, size, 0, PI2);
  ctx.fill();

  // Facing line
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(player.x, player.y);
  ctx.lineTo(player.x + Math.cos(player.facing) * TILE * 0.4, player.y + Math.sin(player.facing) * TILE * 0.4);
  ctx.stroke();

  // Loot indicator
  if (player.hasLoot) {
    ctx.fillStyle = '#ffd700';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('💎', player.x, player.y - 18);
  }

  // Crouch indicator
  if (player.crouching) {
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3,3]);
    ctx.beginPath();
    ctx.arc(player.x, player.y, size + 4, 0, PI2);
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

function drawEchoGhost() {
  if (!echoGhost || !echoGhost.active) return;
  const frame = echoGhost.frames[echoGhost.playIdx];
  if (!frame) return;

  ctx.save();
  ctx.globalAlpha = 0.4;
  ctx.fillStyle = COLORS.ghost;
  ctx.beginPath();
  ctx.arc(frame.x, frame.y, TILE * 0.28, 0, PI2);
  ctx.fill();

  // Ghost trail
  const trailStart = Math.max(0, echoGhost.playIdx - 10);
  ctx.globalAlpha = 0.1;
  for (let i = trailStart; i < echoGhost.playIdx; i++) {
    const f = echoGhost.frames[i];
    ctx.beginPath();
    ctx.arc(f.x, f.y, 3, 0, PI2);
    ctx.fill();
  }
  ctx.restore();
}

function drawEchoRecordingIndicator() {
  if (!echoRecording) return;
  const elapsed = (Date.now() - echoStartTime) / 1000;
  const remaining = ECHO_DURATION - elapsed;
  const pulse = Math.sin(Date.now() / 200) * 0.3 + 0.7;

  ctx.save();
  ctx.fillStyle = `rgba(255,0,0,${pulse})`;
  ctx.beginPath();
  ctx.arc(W - 80, 50, 6, 0, PI2);
  ctx.fill();
  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`REC ${remaining.toFixed(1)}s`, W - 68, 54);
  ctx.restore();
}

  ctx.textAlign = 'center';

}

function drawMenu() {
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);

  // Title
  ctx.fillStyle = '#00e5ff';
  ctx.font = 'bold 48px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('ECHO HEIST', W/2, 120);

  ctx.fillStyle = '#94a3b8';
  ctx.font = '16px monospace';
  ctx.fillText('Math-Stealth Roguelite', W/2, 155);

  // Subtitle
  ctx.fillStyle = '#64748b';
  ctx.font = '13px monospace';
  ctx.fillText('District 1: Training Gallery', W/2, 185);

  // Class selection
  ctx.fillStyle = '#e0e6ed';
  ctx.font = 'bold 18px monospace';
  ctx.fillText('Choose Your Class', W/2, 240);

  const classArr = Object.entries(CLASSES);
  const cardW = 220, cardH = 160, gap = 30;
  const startX = (W - (classArr.length * cardW + (classArr.length - 1) * gap)) / 2;

  classArr.forEach(([key, cls], i) => {
    const x = startX + i * (cardW + gap);
    const y = 270;
    const selected = i === menuSelection;

    // Card bg
    ctx.fillStyle = selected ? 'rgba(0,229,255,0.08)' : 'rgba(30,41,59,0.5)';
    ctx.strokeStyle = selected ? cls.color : 'rgba(100,116,139,0.3)';
    ctx.lineWidth = selected ? 2 : 1;
    ctx.beginPath();
    ctx.roundRect(x, y, cardW, cardH, 12);
    ctx.fill();
    ctx.stroke();

    // Icon
    ctx.font = '32px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(cls.icon, x + cardW/2, y + 40);

    // Name
    ctx.fillStyle = cls.color;
    ctx.font = 'bold 16px monospace';
    ctx.fillText(cls.name, x + cardW/2, y + 70);

    // Desc (wrap)
    ctx.fillStyle = '#94a3b8';
    ctx.font = '11px monospace';
    const lines = cls.desc.split(' · ');
    lines.forEach((line, li) => {
      ctx.fillText(line, x + cardW/2, y + 92 + li * 16);
    });

    // Selection indicator
    if (selected) {
      ctx.fillStyle = cls.color;
      ctx.font = 'bold 13px monospace';
      ctx.fillText('▸ SELECTED ◂', x + cardW/2, y + cardH - 10);
    }
  });

  // Instructions
  ctx.fillStyle = '#64748b';
  ctx.font = '13px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('← → to select · Enter to confirm', W/2, H - 60);
  ctx.fillText('Ages 11–13 · Typed Math Answers · 8–10 min runs', W/2, H - 38);
}

// ── RESULTS SCREEN ─────────────────────────────────────────────
function drawResults() {
  const mission = MISSIONS[currentMission];
  const cls = CLASSES[selectedClass];

  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#22c55e';
  ctx.font = 'bold 36px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('MISSION COMPLETE', W/2, 80);

  ctx.fillStyle = '#e0e6ed';
  ctx.font = '18px monospace';
  ctx.fillText(`${mission.name} · ${cls.name}`, W/2, 120);

  // Stats
  const stats = [
    { label: 'Score', value: `$${score}`, color: COLORS.score },
    { label: 'Math Accuracy', value: mathTotal > 0 ? `${mathCorrect}/${mathTotal} (${Math.round(mathCorrect/mathTotal*100)}%)` : 'N/A', color: COLORS.hudAccent },
    { label: 'Avg Solve Time', value: mathTimes.length > 0 ? `${(mathTimes.reduce((a,b)=>a+b,0)/mathTimes.length).toFixed(1)}s` : 'N/A', color: '#f59e0b' },
    { label: 'Final Heat', value: `${Math.round(heat)}%`, color: heat > 50 ? '#ef4444' : '#22c55e' },
    { label: 'Time', value: `${Math.floor(missionTimer/60)}:${Math.floor(missionTimer%60).toString().padStart(2,'0')}`, color: COLORS.hudText },
    { label: 'Loot', value: player.hasLoot ? 'Retrieved ✓' : 'Missed ✗', color: player.hasLoot ? '#ffd700' : '#ef4444' }
  ];

  stats.forEach((s, i) => {
    const y = 180 + i * 50;

    ctx.fillStyle = s.color;
    ctx.font = 'bold 18px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(s.value, W/2 + 160, y);
  });

  // Grade
  const accuracy = mathTotal > 0 ? mathCorrect / mathTotal : 0;
  const grade = accuracy >= 0.9 ? 'S' : accuracy >= 0.7 ? 'A' : accuracy >= 0.5 ? 'B' : 'C';

  ctx.fillStyle = gradeColor;
  ctx.font = 'bold 64px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(grade, W/2, 530);

  ctx.fillStyle = '#64748b';
  ctx.font = '13px monospace';
  ctx.fillText(currentMission < MISSIONS.length - 1 ? 'Press ENTER for next mission' : 'Press ENTER to return to menu', W/2, 580);
}

// ── VAULT OVERLAY (drawn on canvas behind popup) ─────────────
function drawVaultOverlay() {
  // Dark tinted overlay
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, W, H);

  // Gold border pulse
  const pulse = Math.sin(Date.now() / 400) * 0.3 + 0.7;
  ctx.strokeStyle = `rgba(255,215,0,${pulse * 0.6})`;
  ctx.lineWidth = 4;
  ctx.strokeRect(6, 6, W - 12, H - 12);

  // Vault timer
  const elapsed = (Date.now() - vaultStartTime) / 1000;
  const remaining = Math.max(0, VAULT_TIME_LIMIT - elapsed);
  ctx.fillStyle = remaining < 20 ? '#ef4444' : '#ffd700';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`VAULT CRACKING · ${Math.ceil(remaining)}s`, W/2, 50);

  // Vault icon
  ctx.font = '48px sans-serif';
  ctx.fillText('🔐', W/2, H/2 - 100);

  // Vault timer expired = caught
  if (remaining <= 0 && vaultActive) {
    vaultActive = false;
    mathActive = false;
    document.getElementById('math-popup').style.display = 'none';
    gameState = STATE.CAUGHT;
  }
}

// ── ESCAPE OVERLAY ────────────────────────────────────────
function drawEscapeOverlay() {
  if (!escapeActive) return;

  // Flashing red border
  const flash = Math.sin(escapeFlashTimer * 4) * 0.4 + 0.4;
  ctx.strokeStyle = `rgba(239,68,68,${flash})`;
  ctx.lineWidth = 6;
  ctx.strokeRect(3, 3, W - 6, H - 6);

  // Escape countdown at top center
  const secs = Math.ceil(escapeCountdown);
  const urgent = secs <= 15;
  ctx.fillStyle = urgent ? '#ff0000' : '#ef4444';
  ctx.font = `bold ${urgent ? 28 : 22}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(`🚨 ESCAPE: ${secs}s`, W/2, 65);

  // "ALARM" text flash
  if (Math.floor(Date.now() / 600) % 2) {
    ctx.fillStyle = 'rgba(239,68,68,0.15)';
    ctx.font = 'bold 80px monospace';
    ctx.fillText('ALARM', W/2, H/2);
  }
}

// ── MAIN GAME LOOP ─────────────────────────────────────────────
let lastTime = 0;

function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  switch (gameState) {
    case STATE.MENU:
      drawMenu();
      break;

    case STATE.BRIEFING:
      drawBriefing();
      break;

    case STATE.VAULT:
      // During vault: guards/cameras still update (tension!)
      missionTimer += dt;
      guards.forEach(g => updateGuard(g, dt));
      cameras.forEach(c => updateCamera(c, dt));

      // Draw world behind vault overlay
      drawTiles();
      drawLoot();
      drawInteractables();
      drawCameras();
      drawGuards();
      drawPlayer();
      drawHUD();
      drawVaultOverlay();
      break;

    case STATE.PLAYING:
    case STATE.MATH:
      // Update
      if (gameState === STATE.PLAYING) {
        missionTimer += dt;
        if (missionTimer >= missionTimeLimit) {
          gameState = STATE.CAUGHT;
        }
        updatePlayer(dt);
        updateEscape(dt);
        heat = Math.max(0, heat - 0.5 * dt); // slow heat decay
      }
      guards.forEach(g => updateGuard(g, dt));
      cameras.forEach(c => updateCamera(c, dt));
      updateEcho(dt);

      // Draw
      drawTiles();
      drawLoot();
      drawInteractables();
      drawCameras();
      drawEchoGhost();
      drawGuards();
      drawPlayer();
      drawHUD();
      drawEchoRecordingIndicator();
      drawEscapeOverlay();
      break;

    case STATE.RESULTS:
      drawResults();
      break;

    case STATE.CAUGHT:
      // Draw game behind
      drawTiles();
      drawLoot();
      drawInteractables();
      drawCameras();
      drawGuards();
      drawPlayer();
      drawHUD();
      drawCaught();
      break;
  }

  requestAnimationFrame(gameLoop);
}

// Start
requestAnimationFrame(gameLoop);

</script>
