// ── Layout ──────────────────────────────────────
let W, H, SCALE;
function resize() {
  const rect = C.getBoundingClientRect();
  W = rect.width;
  H = rect.height;
  SCALE = Math.min(W / 400, H / 700);
  const dpr = window.devicePixelRatio || 1;
  C.width = W * dpr;
  C.height = H * dpr;
  X.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ── Audio ───────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
let audioUnlocked = false;

function unlockAudio() {
  if (audioUnlocked) return;
  if (AC.state === 'suspended') AC.resume();
  audioUnlocked = true;
}

function playTone(freq, dur, type, gain) {
  if (muted) return;
  const o = AC.createOscillator();
  const g = AC.createGain();
  o.type = type || 'triangle';
  o.frequency.value = freq;
  g.gain.value = gain || 0.3;
  g.gain.setTargetAtTime(0, AC.currentTime + dur - 0.02, 0.01);
  o.connect(g); g.connect(AC.destination);
  o.start(); o.stop(AC.currentTime + dur + 0.05);
}

function sfxCorrect() {
  playTone(400, 0.12, 'triangle', 0.2);
  setTimeout(() => playTone(600, 0.12, 'triangle', 0.2), 120);
  setTimeout(() => playTone(800, 0.18, 'triangle', 0.25), 240);
}

function sfxWrong() { playTone(200, 0.2, 'sine', 0.12); }
function sfxTap() { playTone(800, 0.03, 'sine', 0.08); }
function sfxPop() { playTone(600, 0.06, 'sine', 0.1); }
function sfxScaffoldBoop(n) { playTone(350 + n * 40, 0.08, 'triangle', 0.12); }

function sfxTrumpet() {
  if (muted) return;
  const o = AC.createOscillator(); const g = AC.createGain();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(200, AC.currentTime);
  o.frequency.linearRampToValueAtTime(400, AC.currentTime + 0.3);
  g.gain.value = 0.15;
  g.gain.setTargetAtTime(0, AC.currentTime + 0.25, 0.03);
  o.connect(g); g.connect(AC.destination);
  o.start(); o.stop(AC.currentTime + 0.4);
}

function sfxSplash() {
  if (muted) return;
  // White noise burst for splash
  const buf = AC.createBuffer(1, AC.sampleRate * 0.15, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i/d.length);
  const s = AC.createBufferSource(); s.buffer = buf;
  const f = AC.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 800;
  const g = AC.createGain(); g.gain.value = 0.12;
  s.connect(f); f.connect(g); g.connect(AC.destination);
  s.start(); s.stop(AC.currentTime + 0.2);
}

// ── Speech ──────────────────────────────────────
let speaking = false;
function speak(text, rate, onEnd) {
  if (muted) { if (onEnd) setTimeout(onEnd, 300); return; }
  if (!window.speechSynthesis) { if (onEnd) setTimeout(onEnd, 300); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = rate || 0.85;
  u.pitch = 1.1;
  const voices = window.speechSynthesis.getVoices();
  const preferred = voices.find(v => /samantha|karen|female|zira/i.test(v.name));
  if (preferred) u.voice = preferred;
  speaking = true;
  u.onend = () => { speaking = false; if (onEnd) onEnd(); };
  u.onerror = () => { speaking = false; if (onEnd) onEnd(); };
  window.speechSynthesis.speak(u);
}
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

// ── Drawing helpers ─────────────────────────────
function drawRoundedRect(x, y, w, h, r) {
  X.beginPath();
  X.moveTo(x+r,y); X.lineTo(x+w-r,y); X.quadraticCurveTo(x+w,y,x+w,y+r);
  X.lineTo(x+w,y+h-r); X.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  X.lineTo(x+r,y+h); X.quadraticCurveTo(x,y+h,x,y+h-r);
  X.lineTo(x,y+r); X.quadraticCurveTo(x,y,x+r,y);
  X.closePath();
}

function drawDots(cx, cy, count, sz) {
  X.fillStyle = 'rgba(255,255,255,0.9)';
  const dotR = sz * 0.12;
  const positions = getDotPositions(count, sz * 0.35);
  for (const p of positions) {
    X.beginPath();
    X.arc(cx + p[0], cy + p[1], dotR, 0, Math.PI*2);
    X.fill();
  }
}

function getDotPositions(n, spread) {
  if (n <= 0) return [];
  const s = spread;
  const layouts = {
    1:[[0,0]],2:[[-s*.4,0],[s*.4,0]],3:[[-s*.4,s*.3],[s*.4,s*.3],[0,-s*.3]],
    4:[[-s*.4,-s*.3],[s*.4,-s*.3],[-s*.4,s*.3],[s*.4,s*.3]],
    5:[[-s*.4,-s*.3],[s*.4,-s*.3],[-s*.4,s*.3],[s*.4,s*.3],[0,0]],
    6:[[-s*.4,-s*.4],[0,-s*.4],[s*.4,-s*.4],[-s*.4,s*.2],[0,s*.2],[s*.4,s*.2]],
  };
  if (layouts[n]) return layouts[n];
  const cols = Math.ceil(Math.sqrt(n));
  const rows = Math.ceil(n / cols);
  const pts = []; let idx = 0;
  for (let r = 0; r < rows && idx < n; r++) {
    const rc = Math.min(cols, n - idx);
    const rw = (rc - 1) * s * 0.3;
    for (let c = 0; c < rc; c++) { pts.push([c*s*0.3 - rw/2, r*s*0.3 - (rows-1)*s*0.15]); idx++; }
  }
  return pts;
}

// ── Background ──────────────────────────────────
function drawBackground() {
  const t = T;

  // Sky
  const skyG = X.createLinearGradient(0, 0, 0, H * 0.45);
  if (state === 'session_end') {
    skyG.addColorStop(0, '#FF7B3A'); skyG.addColorStop(1, '#FFD166');
  } else if (tier === 'tree') {
    skyG.addColorStop(0, '#D96E5B'); skyG.addColorStop(1, '#F0C987');
  } else {
    skyG.addColorStop(0, '#5BB5E8'); skyG.addColorStop(1, '#A8DBA8');
  }
  X.fillStyle = skyG;
  X.fillRect(0, 0, W, H * 0.45);

  // Clouds
  X.fillStyle = 'rgba(255,255,255,0.6)';
  for (let i = 0; i < 3; i++) {
    const cx = ((t * 8 + i * W * 0.4) % (W + 200)) - 100;
    const cy = H * 0.08 + i * H * 0.06;
    X.beginPath();
    X.ellipse(cx, cy, 50 + i*10, 18 + i*4, 0, 0, Math.PI*2); X.fill();
    X.beginPath();
    X.ellipse(cx + 30, cy - 8, 35, 14, 0, 0, Math.PI*2); X.fill();
    X.beginPath();
    X.ellipse(cx - 25, cy + 2, 30, 12, 0, 0, Math.PI*2); X.fill();
  }

  // Distant trees (background)
  X.fillStyle = '#3A7A3A';
  for (let i = 0; i < 6; i++) {
    const tx = W * 0.08 + i * W * 0.17;
    const ty = H * 0.33;
    X.beginPath();
    X.moveTo(tx, ty); X.lineTo(tx - 25, ty + 15); X.lineTo(tx + 25, ty + 15);
    X.fill();
    X.beginPath(); X.arc(tx, ty, 22, Math.PI, 0); X.fill();
  }

  // Ground — lush green gradient
  const groundG = X.createLinearGradient(0, H * 0.35, 0, H);
  groundG.addColorStop(0, '#6DBF47');
  groundG.addColorStop(0.3, '#5AAE38');
  groundG.addColorStop(1, '#3D7A28');
  X.fillStyle = groundG;
  X.fillRect(0, H * 0.35, W, H * 0.65);

  // Water — animated ripple ellipse
  const wy = H * 0.44;
  const wRx = W * 0.38;
  const wRy = H * 0.08;

  // Water shadow
  X.fillStyle = 'rgba(0,80,40,0.2)';
  X.beginPath();
  X.ellipse(W/2, wy + wRy + 4, wRx + 6, wRy + 3, 0, 0, Math.PI*2);
  X.fill();

  // Main water body
  const waterG = X.createRadialGradient(W/2, wy, 10, W/2, wy, wRx);
  waterG.addColorStop(0, '#6BC5E8');
  waterG.addColorStop(0.6, '#4A9ED9');
  waterG.addColorStop(1, '#3580B8');
  X.fillStyle = waterG;
  X.beginPath();
  X.ellipse(W/2, wy, wRx, wRy, 0, 0, Math.PI*2);
  X.fill();

  // Ripple rings
  X.strokeStyle = 'rgba(255,255,255,0.2)';
  X.lineWidth = 1.5;
  for (let i = 0; i < 3; i++) {
    const rPhase = (t * 0.5 + i * 2) % 4;
    const rScale = rPhase / 4;
    const rAlpha = 1 - rScale;
    X.globalAlpha = rAlpha * 0.3;
    X.beginPath();
    X.ellipse(W * 0.45 + i * W * 0.08, wy, 15 + rScale * 40, 6 + rScale * 15, 0, 0, Math.PI*2);
    X.stroke();
  }
  X.globalAlpha = 1;

  // Shimmer highlights
  X.fillStyle = 'rgba(255,255,255,0.25)';
  for (let i = 0; i < 6; i++) {
    const sx = W * 0.28 + i * W * 0.08 + Math.sin(t * 1.5 + i * 1.3) * 8;
    const sy = wy - wRy * 0.2 + Math.cos(t * 1.2 + i * 0.9) * 4;
    X.beginPath();
    X.ellipse(sx, sy, 8 + Math.sin(t * 2 + i) * 3, 2, 0.3, 0, Math.PI*2);
    X.fill();
  }

  // Grass tufts along water edge
  for (let i = 0; i < 12; i++) {
    const gx = W * 0.05 + i * W * 0.085;
    const gy = H * 0.52;
    const sway = Math.sin(t * 1.8 + i * 0.7) * 3;
    X.fillStyle = i % 2 === 0 ? '#4CAF35' : '#5BBF42';
    for (let b = -1; b <= 1; b++) {
      X.beginPath();
      X.moveTo(gx + b*4, gy);
      X.quadraticCurveTo(gx + b*4 + sway, gy - 16 - Math.abs(b)*4, gx + b*2 + sway*1.3, gy - 22 - Math.abs(b)*3);
      X.quadraticCurveTo(gx + b*4 + sway*0.5, gy - 14, gx + b*4 + 2, gy);
      X.fill();
    }
  }

  // Flowers
  const flowerColors = ['#FFD700', '#FF6B9D', '#E8A0FF', '#FF8C42'];
  for (let i = 0; i < 5; i++) {
    const fx = W * 0.1 + i * W * 0.2 + Math.sin(i * 3) * 20;
    const fy = H * 0.56 + Math.cos(i * 5) * 10;
    X.fillStyle = flowerColors[i % flowerColors.length];
    for (let p = 0; p < 5; p++) {
      const a = p * Math.PI * 2 / 5 + Math.sin(t + i) * 0.1;
      X.beginPath();
      X.ellipse(fx + Math.cos(a) * 4, fy + Math.sin(a) * 4, 3, 2, a, 0, Math.PI*2);
      X.fill();
    }
    X.fillStyle = '#FFE082';
    X.beginPath(); X.arc(fx, fy, 2.5, 0, Math.PI*2); X.fill();
  }
}

function drawObstacles() {
  for (const ob of obstacles) {
    if (ob.type === 'rock') {
      // Rounder, more natural rock
      const rg = X.createRadialGradient(ob.x - ob.w*0.1, ob.y - ob.h*0.2, 2, ob.x, ob.y, ob.w*0.6);
      rg.addColorStop(0, '#AAA59E'); rg.addColorStop(1, '#7A756E');
      X.fillStyle = rg;
      X.beginPath(); X.ellipse(ob.x, ob.y, ob.w/2, ob.h/2, 0.1, 0, Math.PI*2); X.fill();
      // Highlight
      X.fillStyle = 'rgba(255,255,255,0.15)';
      X.beginPath(); X.ellipse(ob.x - ob.w*0.12, ob.y - ob.h*0.18, ob.w*0.2, ob.h*0.15, -0.3, 0, Math.PI*2); X.fill();
    } else if (ob.type === 'tree') {
      // Trunk
      X.fillStyle = '#6B4226';
      X.fillRect(ob.x - 7, ob.y - ob.h*0.2, 14, ob.h*0.55);
      // Canopy layers
      X.fillStyle = '#2E8B3E';
      X.beginPath(); X.arc(ob.x, ob.y - ob.h*0.35, ob.w*0.5, 0, Math.PI*2); X.fill();
      X.fillStyle = '#3CA84E';
      X.beginPath(); X.arc(ob.x - 8, ob.y - ob.h*0.42, ob.w*0.35, 0, Math.PI*2); X.fill();
      X.beginPath(); X.arc(ob.x + 10, ob.y - ob.h*0.38, ob.w*0.32, 0, Math.PI*2); X.fill();
    } else if (ob.type === 'grass') {
      const sway = Math.sin(T * 1.5 + ob.x * 0.01) * 4;
      X.fillStyle = '#3D8B3D';
      for (let i = -3; i <= 3; i++) {
        X.beginPath();
        X.moveTo(ob.x + i*4, ob.y);
        X.quadraticCurveTo(ob.x + i*4 + sway, ob.y - ob.h*0.6, ob.x + i*3 + sway*1.2, ob.y - ob.h);
        X.quadraticCurveTo(ob.x + i*4 + sway*0.5, ob.y - ob.h*0.5, ob.x + i*4 + 2, ob.y);
        X.fill();
      }
    }
  }
}

// ── Animal drawing (completely rewritten) ───────
function drawAnimal(a) {
  if (!a.visible) return;
  const t = ANIMAL_TYPES[a.type];
  const sz = 42 * SCALE; // MUCH larger than before (was 28)
  const time = T + a.phase;

  // Idle animation
  const bobY = Math.sin(time * 2) * 3;
  const breathe = 1 + Math.sin(time * 2.5) * 0.03;
  const headTilt = Math.sin(time * 1.2) * 0.08;
  const tailWag = Math.sin(time * 4) * 0.3;
  const legCycle = Math.sin(time * 3);

  // Celebration: big bouncy jump + squash/stretch
  let cY = 0, cSquash = 1, cStretch = 1;
  if (a.celebrating) {
    const cPhase = (T * 6 + a.phase) % (Math.PI * 2);
    cY = Math.abs(Math.sin(cPhase)) * sz * 0.6;
    cSquash = cY > sz * 0.2 ? 0.85 : 1.1; // squash on ground, stretch in air
    cStretch = cY > sz * 0.2 ? 1.15 : 0.9;
  }

  // Scaffold highlight glow
  if (a.highlighted) {
    X.save();
    const glowPulse = 0.5 + Math.sin(T * 6) * 0.3;
    X.shadowColor = '#FFD700';
    X.shadowBlur = 25 + Math.sin(T * 8) * 10;
    X.fillStyle = `rgba(255,215,0,${glowPulse})`;
    X.beginPath();
    X.ellipse(a.x, a.y + bobY - cY, sz * 0.7, sz * 0.5, 0, 0, Math.PI*2);
    X.fill();
    X.restore();
  }

  X.save();
  X.translate(a.x, a.y + bobY - cY);
  X.scale(cSquash, cStretch);

  if (a.type === 0) drawZebra(sz, time, headTilt, tailWag, legCycle, a.celebrating);
  else if (a.type === 1) drawFlamingo(sz, time, headTilt, a.celebrating);
  else if (a.type === 2) drawTurtle(sz, time, headTilt, legCycle, a.celebrating);
  else if (a.type === 3) drawFrog(sz, time, a.celebrating);

  X.restore();
}

function drawZebra(sz, time, headTilt, tailWag, legCycle, celebrating) {
  const s = sz;
  // Legs (behind body)
  X.fillStyle = '#E8E4DC';
  const legH = s * 0.3;
  X.save(); X.translate(-s*0.25, s*0.15);
  X.rotate(legCycle * 0.12);
  X.fillRect(-3, 0, 7, legH); X.restore();
  X.save(); X.translate(s*0.15, s*0.15);
  X.rotate(-legCycle * 0.12);
  X.fillRect(-3, 0, 7, legH); X.restore();
  // Hooves
  X.fillStyle = '#333';
  X.fillRect(-s*0.28, s*0.15 + legH - 4, 7, 5);
  X.fillRect(s*0.13, s*0.15 + legH - 4, 7, 5);

  // Body
  X.fillStyle = '#F5F5F0';
  X.beginPath(); X.ellipse(0, 0, s*0.4, s*0.28, 0, 0, Math.PI*2); X.fill();
  // Stripes
  X.strokeStyle = '#333'; X.lineWidth = 2.5;
  for (let i = 0; i < 4; i++) {
    const sx = -s*0.2 + i*s*0.13;
    X.beginPath(); X.moveTo(sx, -s*0.2); X.lineTo(sx + 2, s*0.15); X.stroke();
  }
  // Belly highlight
  X.fillStyle = 'rgba(255,255,255,0.3)';
  X.beginPath(); X.ellipse(0, s*0.08, s*0.25, s*0.1, 0, 0, Math.PI*2); X.fill();

  // Tail
  X.save(); X.translate(-s*0.38, -s*0.05);
  X.rotate(tailWag);
  X.strokeStyle = '#333'; X.lineWidth = 2; X.lineCap = 'round';
  X.beginPath(); X.moveTo(0, 0); X.quadraticCurveTo(-s*0.15, -s*0.1, -s*0.12, -s*0.2); X.stroke();
  // Tail tuft
  X.fillStyle = '#222';

  X.save(); X.translate(s*0.32, -s*0.2);
  X.rotate(headTilt);
  X.fillStyle = '#F5F5F0';
  X.beginPath(); X.ellipse(0, 0, s*0.18, s*0.15, 0.2, 0, Math.PI*2); X.fill();
  // Muzzle
  X.fillStyle = '#E8E0D0';
  X.beginPath(); X.ellipse(s*0.12, s*0.04, s*0.09, s*0.08, 0, 0, Math.PI*2); X.fill();
  // Nostril
  X.fillStyle = '#999';
  X.beginPath(); X.arc(s*0.17, s*0.05, 1.5, 0, Math.PI*2); X.fill();
  // Eye
  X.fillStyle = '#fff';
  X.beginPath(); X.arc(s*0.05, -s*0.05, s*0.055, 0, Math.PI*2); X.fill();

  // Eye shine

  // Ear
  X.fillStyle = '#E8E4DC';
  X.beginPath(); X.ellipse(s*0.02, -s*0.14, s*0.05, s*0.08, -0.3, 0, Math.PI*2); X.fill();
  X.fillStyle = '#FFB5A0';
  X.beginPath(); X.ellipse(s*0.02, -s*0.13, s*0.03, s*0.05, -0.3, 0, Math.PI*2); X.fill();

}

// ── Splashes ────────────────────────────────────
function spawnSplash(x, y) {
  for (let i = 0; i < 6; i++) {
    splashes.push({
      x: x + (Math.random() - 0.5) * 30,
      y: y,
      vy: -2 - Math.random() * 4,
      vx: (Math.random() - 0.5) * 3,
      life: 1,
      r: 2 + Math.random() * 3
    });
  }
}

function updateSplashes(dt) {
  for (let i = splashes.length - 1; i >= 0; i--) {
    const s = splashes[i];
    s.x += s.vx; s.y += s.vy; s.vy += 5 * dt;
    s.life -= dt * 1.5;
    if (s.life <= 0) splashes.splice(i, 1);
  }
}

function drawSplashes() {
  for (const s of splashes) {
    X.globalAlpha = s.life * 0.7;
    X.fillStyle = '#8DD8F0';
    X.beginPath(); X.arc(s.x, s.y, s.r * s.life, 0, Math.PI*2); X.fill();
  }
  X.globalAlpha = 1;
}

// ── Particles ───────────────────────────────────
function spawnParticles(x, y, count, color1, color2) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed - 2,
      life: 1, decay: 0.012 + Math.random() * 0.008,
      r: 4 + Math.random() * 5,
      color: Math.random() > 0.5 ? color1 : color2
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    X.globalAlpha = p.life;
    X.fillStyle = p.color;
    X.beginPath(); X.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2); X.fill();
  }
  X.globalAlpha = 1;
}

// ── Answer bar ──────────────────────────────────
let answerBarY = 0, answerBarTargetY = 0, answerBarVisible = false;

function generateChoices(correct, numChoices) {
  const opts = new Set([correct]);
  const offsets = [-1,1,-2,2,-3,3];
  let oi = 0;
  while (opts.size < numChoices && oi < offsets.length) {
    const v = correct + offsets[oi]; if (v >= 1 && v <= 20) opts.add(v); oi++;
  }
  let d = 4;
  while (opts.size < numChoices) {
    if (correct+d <= 20) opts.add(correct+d);
    if (correct-d >= 1 && opts.size < numChoices) opts.add(correct-d); d++;
  }
  if (roundData && roundData.others) {
    const totalAll = roundData.qty + roundData.others.qty;
    if (totalAll !== correct && totalAll >= 1 && totalAll <= 20) {
      const arr = [...opts]; let fi=0,fd=0;
      for (let i=0;i<arr.length;i++){if(arr[i]===correct)continue;const dd=Math.abs(arr[i]-correct);if(dd>fd){fd=dd;fi=i;}}
      arr[fi]=totalAll; return shuffle(arr);
    }
  }
  if (roundData && roundData.departures > 0) {
    const peak = roundData.qty + roundData.departures;
    if (peak !== correct && peak >= 1 && peak <= 20) {
      const arr = [...opts]; let fi=0,fd=0;
      for (let i=0;i<arr.length;i++){if(arr[i]===correct)continue;const dd=Math.abs(arr[i]-correct);if(dd>fd){fd=dd;fi=i;}}
      arr[fi]=peak; return shuffle(arr);
    }
  }
  return shuffle([...opts].slice(0, numChoices));
}

function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} return arr;
}

function drawAnswerBar() {
  if (!answerBarVisible && answerBarY >= H) return;
  answerBarY += (answerBarTargetY - answerBarY) * 0.15;
  const barH = Math.min(120, H * 0.16);
  const bw = Math.min(80, (W - 32 - (choices.length-1)*16) / choices.length);
  const totalW = choices.length * bw + (choices.length-1)*16;
  const startX = (W - totalW) / 2;

  X.fillStyle = 'rgba(255,255,255,0.95)';
  X.shadowColor = 'rgba(0,0,0,0.1)'; X.shadowBlur = 10; X.shadowOffsetY = -2;
  drawRoundedRect(8, answerBarY, W-16, barH, 18); X.fill();
  X.shadowColor = 'transparent'; X.shadowBlur = 0; X.shadowOffsetY = 0;

  for (let i = 0; i < choices.length; i++) {
    const bx = startX + i*(bw+16);
    const by = answerBarY + (barH-bw)/2;
    const val = choices[i];
    const isGreyed = greyedOut.includes(val);
    const isSelected = selectedChoice === i;
    const isCorrectReveal = state === 'reveal' && val === roundData.qty;

    if (isGreyed) { X.fillStyle = '#E5E7EB'; }
    else if (isCorrectReveal) {
      const glow = 0.7 + Math.sin(revealGlow*4)*0.3;
      X.fillStyle = `rgba(251,191,36,${glow})`;
    } else if (isSelected && state === 'feedback_correct') { X.fillStyle = '#4ADE80'; }
    else { X.fillStyle = '#FAFAFA'; }
    X.shadowColor = isGreyed ? 'transparent' : 'rgba(0,0,0,0.08)'; X.shadowBlur = 4; X.shadowOffsetY = 2;
    drawRoundedRect(bx, by, bw, bw, 14); X.fill();
    X.shadowColor = 'transparent'; X.shadowBlur = 0; X.shadowOffsetY = 0;

    X.strokeStyle = isGreyed ? '#D1D5DB' : isSelected && state==='feedback_correct' ? '#22A85A' : '#C8D6C0';
    X.lineWidth = 2; drawRoundedRect(bx, by, bw, bw, 14); X.stroke();

    X.fillStyle = isGreyed ? '#B0B5B0' : '#1F2937';
    X.font = `bold ${bw*0.4}px "Segoe UI",system-ui,sans-serif`;
    X.textAlign = 'center'; X.textBaseline = 'middle';
    X.fillText(val, bx+bw/2, by+bw*0.35);

    if (!isGreyed) drawDots(bx+bw/2, by+bw*0.7, val, bw);

    choices[i] = val;
    if (!choiceBounds[i]) choiceBounds[i] = {};
    choiceBounds[i].x = bx; choiceBounds[i].y = by; choiceBounds[i].w = bw; choiceBounds[i].h = bw;
  }
}

// ── Place animals for a round ───────────────────
function setupRound() {
  const rd = TIERS[tier].rounds[roundIndex];
  roundData = rd;
  animals = []; otherAnimals = []; obstacles = []; greyedOut = [];
  wrongAttempts = 0; selectedChoice = -1; scaffoldIndex = -1;
  answerBarVisible = false; answerBarY = H+20; answerBarTargetY = H+20;
  choiceBounds = []; wanderWarned = false; paused = false;
  ellie.trunkUp = false; ellie.shakeHead = false; ellie.shakeTimer = 0; ellie.bounce = 0; ellie.earFlap = 0;

  roundLog = {
    round: roundIndex+1, tier, animalType: ANIMAL_TYPES[rd.animal].name,
    correctAnswer: rd.qty, attemptsNeeded: 0, scaffoldTriggered: false,
    answerRevealed: false, wrongAnswersTapped: [], timeToFirstTap: 0,
    timeToCorrectTap: 0, hadOcclusion: rd.occlusion>0, hadSelectiveCounting: rd.others!==null,
    hadDeparture: rd.departures>0, hadLateArrival: rd.lateArrivals>0, barAppearedAt: 0
  };

  const occTypes = ['rock','tree','grass'];
  for (let i=0; i<rd.occlusion; i++) {
    obstacles.push({
      type: occTypes[i%3],
      x: W*0.4 + i*W*0.2 + Math.random()*W*0.1,
      y: H*0.38 + Math.random()*H*0.05,
      w: 45+Math.random()*20, h: 50+Math.random()*15
    });
  }

  const initialCount = rd.qty - rd.lateArrivals + rd.departures;
  const totalAsked = rd.qty + rd.departures;
  const spacing = Math.min(85, (W*0.6) / Math.max(totalAsked, 1));

  for (let i=0; i<totalAsked; i++) {
    const a = {
      type: rd.animal,
      x: W*0.3 + (i%5)*spacing + (Math.random()-0.5)*20,
      y: H*0.36 + Math.floor(i/5)*55 + (Math.random()-0.5)*10,
      targetX:0, targetY:0, visible:true, arriving:false,
      departing:false, departed:false, lateArrival:false, lateArrivalTime:0,
      departureTime:0, highlighted:false, celebrating:false,
      phase: Math.random()*Math.PI*2, opacity:1
    };
    a.targetX = a.x; a.targetY = a.y;
    animals.push(a);
  }

  for (let i=0; i<rd.lateArrivals; i++) {
    const idx = initialCount+i;
    if (idx<animals.length) {
      animals[idx].visible=false; animals[idx].lateArrival=true;
      animals[idx].lateArrivalTime=3+i*2; animals[idx].x=-50;
    }
  }
  for (let i=0; i<rd.departures; i++) {
    const idx = totalAsked-1-i;
    if (idx>=0 && idx<animals.length) { animals[idx].departing=true; animals[idx].departureTime=8+i*2; }
  }

  if (rd.others) {
    for (let i=0; i<rd.others.qty; i++) {
      otherAnimals.push({
        type: rd.others.type,
        x: W*0.58 + i*spacing*0.8 + (Math.random()-0.5)*20,
        y: H*0.42 + (Math.random()-0.5)*10,
        visible:true, highlighted:false, celebrating:false,
        phase: Math.random()*Math.PI*2, opacity:1
      });
    }
  }

  choices = generateChoices(rd.qty, TIERS[tier].choices);
  state = 'scene_setup'; stateTimer = 0;
}

// ── State machine ───────────────────────────────
let lastTime = 0;
let questionSpoken = false;
let barDelay = 0;

function update(dt) {
  T += dt;
  stateTimer += dt;
  updateParticles(dt);
  updateSplashes(dt);

  if (ellie.shakeTimer > 0) ellie.shakeTimer -= dt;
  if (ellie.shakeTimer <= 0) ellie.shakeHead = false;
  if (ellie.trunkTimer > 0) { ellie.trunkTimer -= dt; if (ellie.trunkTimer <= 0) ellie.trunkUp = false; }
  if (ellie.bounce > 0) ellie.bounce -= dt;
  if (ellie.earFlap > 0) ellie.earFlap -= dt * 0.5;

  if (state === 'scene_setup') {
    if (stateTimer > 1.5) { state = 'animals_arrive'; stateTimer = 0; sfxPop(); }
  }
  else if (state === 'animals_arrive') {
    for (const a of animals) { if (!a.lateArrival && a.visible) a.opacity = Math.min(1, stateTimer/0.8); }
    if (stateTimer > 1.5) { state = 'question'; stateTimer = 0; questionSpoken = false; }
  }
  else if (state === 'question') {
    for (const a of animals) {
      if (a.lateArrival && !a.visible && stateTimer >= a.lateArrivalTime) { a.visible=true; a.x=-30; a.opacity=0; sfxPop(); }
      if (a.lateArrival && a.visible) { a.x += (a.targetX-a.x)*0.05; a.opacity = Math.min(1,a.opacity+dt*2); }
      if (a.departing && !a.departed && stateTimer >= a.departureTime) a.departed = true;
      if (a.departed) { a.x += dt*80; a.opacity = Math.max(0,a.opacity-dt); if (a.x>W+50) a.visible=false; }
    }
    if (!questionSpoken) {
      questionSpoken = true; sfxTrumpet();
      ellie.trunkUp = true; ellie.trunkTimer = 4;
      setTimeout(() => speak(`How many ${ANIMAL_TYPES[roundData.animal].name} are at the watering hole?`, 0.85), 400);
      barDelay = 3.0;
    }
    if (barDelay > 0) {
      barDelay -= dt;
      if (barDelay <= 0) {
        state = 'answer'; stateTimer = 0;
        answerBarVisible = true; answerBarTargetY = H - Math.min(130, H*0.18);
        roundLog.barAppearedAt = performance.now(); sfxPop();
      }
    }
    const wt = TIERS[tier].wanderTime;
    if (wt < Infinity && stateTimer > wt-2 && !wanderWarned) { wanderWarned = true; speak("They're starting to leave!", 0.9); }
  }
  else if (state === 'answer') {
    for (const a of animals) {
      if (a.lateArrival && a.visible) { a.x += (a.targetX-a.x)*0.05; a.opacity = Math.min(1,a.opacity+dt*2); }
      if (a.departed) { a.x += dt*80; a.opacity = Math.max(0,a.opacity-dt); if (a.x>W+50) a.visible=false; }
      if (a.departing && !a.departed && stateTimer + 3 >= a.departureTime) a.departed = true;
    }
    const pt = TIERS[tier].pauseTime;
    if (pt < Infinity && stateTimer > pt && !paused) { paused = true; speak("Take your time!", 0.85); }
  }
  else if (state === 'feedback_correct') {
    for (const a of [...animals, ...otherAnimals]) { if (a.visible) a.celebrating = true; }
    ellie.trunkUp = true; ellie.earFlap = 1;
    // Spawn water splashes during celebration
    if (stateTimer < 0.5 && Math.random() < 0.3) {
      const va = animals.filter(a => a.visible);
      if (va.length) { const ra = va[Math.floor(Math.random()*va.length)]; spawnSplash(ra.x, H*0.44); sfxSplash(); }
    }
    if (stateTimer > 2.2) {
      for (const a of [...animals, ...otherAnimals]) a.celebrating = false;
      advanceRound();
    }
  }
  else if (state === 'feedback_wrong') {
    if (stateTimer > 1.5) { state = 'answer'; stateTimer = 0; }
  }
  else if (state === 'scaffold') {
    scaffoldTimer += dt;
    const interval = 0.7;
    const targetIdx = Math.floor(scaffoldTimer / interval);
    const visibleAnimals = animals.filter(a => a.visible && !a.departed);
    if (targetIdx !== scaffoldIndex && targetIdx < visibleAnimals.length) {
      scaffoldIndex = targetIdx;
      for (const a of animals) a.highlighted = false;
      visibleAnimals[scaffoldIndex].highlighted = true;
      sfxScaffoldBoop(scaffoldIndex);
      speak(`${scaffoldIndex+1}`, 0.7);
    }
    if (targetIdx >= visibleAnimals.length && scaffoldTimer > visibleAnimals.length*interval+0.8) {
      for (const a of animals) a.highlighted = false;
      const n = roundData.qty;
      speak(`${n}! There are ${n} ${ANIMAL_TYPES[roundData.animal].name}.`, 0.8, () => { state='answer'; stateTimer=0; });
      state = 'scaffold_done'; stateTimer = 0;
    }
  }
  else if (state === 'scaffold_done') { if (stateTimer > 2.5) { state='answer'; stateTimer=0; } }
  else if (state === 'reveal') { revealGlow += dt; }
}

function advanceRound() {
  roundIndex++;
  if (roundIndex >= 8) {
    state = 'session_end'; stateTimer = 0; logSession();
    speak("Great safari, Ranger! You counted 8 groups today!", 0.85);
    spawnParticles(W/2, H*0.35, 25, '#4ADE80', '#FFD700');
  } else { setupRound(); }
}

// ── Input ───────────────────────────────────────
function handleTap(px, py) {
  unlockAudio();
  if (px > W-48 && py < 48) { muted = !muted; return; }

  if (state === 'tier_select') {
    const tkeys = ['sprout','sapling','tree'];
    for (let i=0;i<3;i++){
      const b = tierBounds[i];
      if (px>=b.x && px<=b.x+b.w && py>=b.y && py<=b.y+b.h) {
        tier = tkeys[i]; localStorage.setItem('wh_tier',tier);
        roundIndex = 0; sessionLog = [];
        speak(TIERS[tier].label+'!', 0.9);
        setTimeout(() => { if (state==='loading') setupRound(); }, 1200);
        state = 'loading'; return;
      }
    }
    if (py > H*0.15 && py < H*0.35) speak('Pick a path, Ranger!', 0.85);
    return;
  }

  if (state === 'session_end') {
    if (endBounds.replay && px>=endBounds.replay.x && px<=endBounds.replay.x+endBounds.replay.w && py>=endBounds.replay.y && py<=endBounds.replay.y+endBounds.replay.h) {
      if (sessionLog.length) sessionLog[sessionLog.length-1].replayChosen = true;
      roundIndex = 0; sessionLog = []; setupRound(); return;
    }
    if (endBounds.home && px>=endBounds.home.x && px<=endBounds.home.x+endBounds.home.w && py>=endBounds.home.y && py<=endBounds.home.y+endBounds.home.h) { state = 'tier_select'; return; }
    return;
  }

  if ((state==='answer'||state==='question') && roundData) {
    const ed = Math.hypot(px-ellie.x, py-ellie.y);
    if (ed < 60) { speak(`How many ${ANIMAL_TYPES[roundData.animal].name} are at the watering hole?`, 0.85); return; }
  }

  if (state==='answer' || state==='reveal') {
    for (let i=0;i<choices.length;i++){
      const b = choiceBounds[i]; if(!b||!b.x) continue;
      if (px>=b.x && px<=b.x+b.w && py>=b.y && py<=b.y+b.h) {
        const val = choices[i];
        if (greyedOut.includes(val)) return;
        sfxTap();
        const now = performance.now();
        if (roundLog.attemptsNeeded === 0) roundLog.timeToFirstTap = now - roundLog.barAppearedAt;

        if (val === roundData.qty) {
          roundLog.attemptsNeeded = wrongAttempts+1;
          roundLog.timeToCorrectTap = now - roundLog.barAppearedAt;
          selectedChoice = i; state = 'feedback_correct'; stateTimer = 0;
          sfxCorrect(); sfxTrumpet();
          spawnParticles(b.x+b.w/2, b.y, 18, '#4ADE80', '#FFD700');
          spawnParticles(b.x+b.w/2, b.y, 8, '#FFD700', '#FF8C42');
          ellie.bounce = 0.8; ellie.earFlap = 1;
          const praise = PRAISE[Math.floor(Math.random()*PRAISE.length)];
          speak(`${praise} ${roundData.qty} ${ANIMAL_TYPES[roundData.animal].name}!`, 0.85);
          sessionLog.push({...roundLog});
        } else {
          wrongAttempts++; roundLog.wrongAnswersTapped.push(val); greyedOut.push(val); sfxWrong();
          const maxWrong = TIERS[tier].choices - 1;
          if (wrongAttempts === 1) {
            ellie.shakeHead = true; ellie.shakeTimer = 0.6;
            speak("Hmm, not quite. Count them again!", 0.85);
            state = 'feedback_wrong'; stateTimer = 0;
          } else if (wrongAttempts === 2) {
            ellie.trunkUp = true; ellie.trunkTimer = 5;
            roundLog.scaffoldTriggered = true;
            speak("Let me help! Count with me.", 0.8);
            setTimeout(() => { if (state==='feedback_wrong') { state='scaffold'; stateTimer=0; scaffoldTimer=0; scaffoldIndex=-1; } }, 1800);
            state = 'feedback_wrong'; stateTimer = 0;
          } else if (wrongAttempts >= maxWrong) {
            roundLog.answerRevealed = true; roundLog.attemptsNeeded = wrongAttempts+1;
            roundLog.timeToCorrectTap = now - roundLog.barAppearedAt;
            state = 'reveal'; stateTimer = 0; revealGlow = 0;
            speak(`It's ${roundData.qty}! Tap ${roundData.qty}.`, 0.85);
          } else {
            state = 'feedback_wrong'; stateTimer = 0;
            ellie.shakeHead = true; ellie.shakeTimer = 0.5; speak("Try again!", 0.85);
          }
        }
        return;
      }
    }
  }
}

C.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  const rect = C.getBoundingClientRect();
  handleTap(e.clientX - rect.left, e.clientY - rect.top);
});

// ── Logging ─────────────────────────────────────
function logSession() {
  const firstTryCorrect = sessionLog.filter(r=>r.attemptsNeeded===1).length;
  const scaffoldCount = sessionLog.filter(r=>r.scaffoldTriggered).length;
  const answerRevealCount = sessionLog.filter(r=>r.answerRevealed).length;
  const avgFirst = sessionLog.reduce((s,r)=>s+r.timeToFirstTap,0)/sessionLog.length;
  const avgCorrect = sessionLog.reduce((s,r)=>s+r.timeToCorrectTap,0)/sessionLog.length;
  console.log('=== WATERING HOLE COUNT — SESSION LOG ===');
  console.log(JSON.stringify({tier,rounds:8,firstTryCorrect,scaffoldCount,answerRevealCount,
    avgTimeToFirstTapMs:Math.round(avgFirst),avgTimeToCorrectTapMs:Math.round(avgCorrect)}, null, 2));
  for (const r of sessionLog)
    console.log(`R${r.round}: ${r.animalType} x${r.correctAnswer} | attempts:${r.attemptsNeeded} | scaffold:${r.scaffoldTriggered} | firstTap:${Math.round(r.timeToFirstTap)}ms`);
}

// ── Main render ─────────────────────────────────
function draw() {
  X.clearRect(0,0,W,H);
  if (state === 'tier_select') { drawTierSelect(); return; }
  if (state === 'session_end') { drawSessionEnd(); return; }
  if (state === 'loading') { X.fillStyle='#3D7A28'; X.fillRect(0,0,W,H); return; }

  drawBackground();
  drawObstacles();
  for (const a of otherAnimals) drawAnimal(a);
  for (const a of animals) {
    if (a.visible && a.opacity > 0) { X.globalAlpha = a.opacity; drawAnimal(a); X.globalAlpha = 1; }
  }
  drawEllie();
  drawSplashes();
  drawAnswerBar();
  drawParticles();
  drawMuteButton();

  X.fillStyle = 'rgba(255,255,255,0.75)';
  drawRoundedRect(8,8,66,26,8); X.fill();
  X.fillStyle = '#2D5016';
  X.font = 'bold 13px "Segoe UI",system-ui,sans-serif';
  X.textAlign = 'center'; X.textBaseline = 'middle';
  X.fillText(`${roundIndex+1} / 8`, 41, 21);
}

// ── Game loop ───────────────────────────────────
function loop() {
  const now = performance.now();
  const dt = Math.min((now-lastTime)/1000, 0.05);
  lastTime = now;
  resize(); update(dt); draw();
}
lastTime = performance.now();
setInterval(loop, 16);
setTimeout(() => speak('Pick a path, Ranger!', 0.85), 500);
</script>
</body>
