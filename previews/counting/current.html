  C.width = W * dpr;
  C.height = H * dpr;
  X.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// ── Audio ───────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
let audioUnlocked = false;

function unlockAudio() {
  if (audioUnlocked) return;
  if (AC.state === 'suspended') AC.resume();
  audioUnlocked = true;
}

function playTone(freq, dur, type, gain) {
  if (muted) return;
  const o = AC.createOscillator();
  const g = AC.createGain();
  o.type = type || 'triangle';
  o.frequency.value = freq;
  g.gain.value = gain || 0.3;
  g.gain.setTargetAtTime(0, AC.currentTime + dur - 0.02, 0.01);
  o.connect(g); g.connect(AC.destination);
  o.start(); o.stop(AC.currentTime + dur + 0.05);
}

function sfxCorrect() {
  playTone(300, 0.15, 'triangle', 0.25);
  setTimeout(() => playTone(500, 0.18, 'triangle', 0.25), 150);
}

function sfxWrong() {
  playTone(200, 0.2, 'sine', 0.12);
}

function sfxTap() {
  playTone(800, 0.03, 'sine', 0.08);
}

function sfxTrumpet() {
  if (muted) return;
  const o = AC.createOscillator();
  const g = AC.createGain();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(200, AC.currentTime);
  o.frequency.linearRampToValueAtTime(400, AC.currentTime + 0.3);
  g.gain.value = 0.15;
  g.gain.setTargetAtTime(0, AC.currentTime + 0.25, 0.03);
  o.connect(g); g.connect(AC.destination);
  o.start(); o.stop(AC.currentTime + 0.4);
}

function sfxPop() {
  playTone(600, 0.06, 'sine', 0.1);
}

function sfxScaffoldBoop(n) {
  playTone(350 + n * 40, 0.08, 'triangle', 0.12);
}

// ── Speech ──────────────────────────────────────
let speaking = false;
function speak(text, rate, onEnd) {
  if (muted) { if (onEnd) setTimeout(onEnd, 300); return; }
  if (!window.speechSynthesis) { if (onEnd) setTimeout(onEnd, 300); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = rate || 0.85;
  u.pitch = 1.1;
  // Try to pick a good voice
  const voices = window.speechSynthesis.getVoices();
  const preferred = voices.find(v => /samantha|karen|female|zira/i.test(v.name));
  if (preferred) u.voice = preferred;
  speaking = true;
  u.onend = () => { speaking = false; if (onEnd) onEnd(); };
  u.onerror = () => { speaking = false; if (onEnd) onEnd(); };
  window.speechSynthesis.speak(u);
}

// Preload voices
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

// ── Drawing helpers ─────────────────────────────
function drawRoundedRect(x, y, w, h, r) {
  X.beginPath();
  X.moveTo(x+r,y); X.lineTo(x+w-r,y); X.quadraticCurveTo(x+w,y,x+w,y+r);
  X.lineTo(x+w,y+h-r); X.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  X.lineTo(x+r,y+h); X.quadraticCurveTo(x,y+h,x,y+h-r);
  X.lineTo(x,y+r); X.quadraticCurveTo(x,y,x+r,y);
  X.closePath();
}

function drawDots(cx, cy, count, sz) {
  // Draw dot pattern for a number (1–15) in a compact layout
  X.fillStyle = 'rgba(255,255,255,0.9)';
  const dotR = sz * 0.12;
  const positions = getDotPositions(count, sz * 0.35);
  for (const p of positions) {
    X.beginPath();
    X.arc(cx + p[0], cy + p[1], dotR, 0, Math.PI*2);
    X.fill();
  }
}

function getDotPositions(n, spread) {
  // Arrange dots in recognizable patterns
  if (n <= 0) return [];
  const s = spread;
  const layouts = {
    1: [[0,0]],
    2: [[-s*0.4,0],[s*0.4,0]],
    3: [[-s*0.4,s*0.3],[s*0.4,s*0.3],[0,-s*0.3]],
    4: [[-s*0.4,-s*0.3],[s*0.4,-s*0.3],[-s*0.4,s*0.3],[s*0.4,s*0.3]],
    5: [[-s*0.4,-s*0.3],[s*0.4,-s*0.3],[-s*0.4,s*0.3],[s*0.4,s*0.3],[0,0]],
    6: [[-s*0.4,-s*0.4],[0,-s*0.4],[s*0.4,-s*0.4],[-s*0.4,s*0.2],[0,s*0.2],[s*0.4,s*0.2]],
  };
  if (layouts[n]) return layouts[n];
  // For 7+, arrange in rows
  const cols = Math.ceil(Math.sqrt(n));
  const rows = Math.ceil(n / cols);
  const pts = [];
  let idx = 0;
  for (let r = 0; r < rows && idx < n; r++) {
    const rowCount = Math.min(cols, n - idx);
    const rowW = (rowCount - 1) * s * 0.3;
    for (let c = 0; c < rowCount; c++) {
      pts.push([c * s * 0.3 - rowW/2, r * s * 0.3 - (rows-1)*s*0.15]);
      idx++;
    }
  }
  return pts;
}

// ── Scene drawing ───────────────────────────────
const SKY_TOP = '#87CEEB';
const SKY_BOT = '#B5E8B5';
const WATER_COLOR = '#4A90D9';
const GROUND_COLOR = '#7CB342';
const GROUND_DARK = '#5D8A2F';

function drawBackground() {
  // Sky gradient
  const skyG = X.createLinearGradient(0, 0, 0, H * 0.4);
  if (state === 'session_end') {
    skyG.addColorStop(0, '#FF8C42');
    skyG.addColorStop(1, '#FFD166');
  } else if (tier === 'tree') {
    skyG.addColorStop(0, '#E8836B');
    skyG.addColorStop(1, '#F0C987');
  } else {
    skyG.addColorStop(0, SKY_TOP);
    skyG.addColorStop(1, '#C8E6C8');
  }
  X.fillStyle = skyG;
  X.fillRect(0, 0, W, H * 0.4);

  // Ground
  X.fillStyle = GROUND_COLOR;
  X.fillRect(0, H * 0.35, W, H * 0.35);

  // Water
  const wy = H * 0.42;
  const wh = H * 0.15;
  X.fillStyle = WATER_COLOR;
  X.beginPath();
  X.ellipse(W/2, wy + wh/2, W * 0.42, wh/2, 0, 0, Math.PI * 2);
  X.fill();
  // Water shimmer
  X.fillStyle = 'rgba(255,255,255,0.15)';
  for (let i = 0; i < 5; i++) {
    const sx = W * 0.25 + i * W * 0.1 + Math.sin(Date.now()/800 + i) * 5;
    const sy = wy + wh * 0.3 + Math.cos(Date.now()/600 + i*2) * 3;
    X.fillRect(sx, sy, W * 0.06, 2);
  }

  // Ground texture below water
  X.fillStyle = GROUND_DARK;
  X.fillRect(0, H * 0.62, W, H * 0.38);

  // Simple grass tufts
  X.fillStyle = '#6AAF35';
  for (let i = 0; i < 8; i++) {
    const gx = W * 0.05 + i * W * 0.12;
    const gy = H * 0.61;
    X.beginPath();
    X.moveTo(gx, gy); X.lineTo(gx-3, gy-12); X.lineTo(gx+3, gy-8);
    X.lineTo(gx+6, gy-14); X.lineTo(gx+9, gy);
    X.fill();
  }
}

function drawObstacles() {
  for (const ob of obstacles) {
    if (ob.type === 'rock') {
      X.fillStyle = '#8B8680';
      X.beginPath();
      X.ellipse(ob.x, ob.y, ob.w/2, ob.h/2, 0, 0, Math.PI*2);
      X.fill();
      X.fillStyle = '#9E9890';
      X.beginPath();
      X.ellipse(ob.x - ob.w*0.1, ob.y - ob.h*0.15, ob.w*0.25, ob.h*0.2, -0.2, 0, Math.PI*2);
      X.fill();
    } else if (ob.type === 'tree') {
      X.fillStyle = '#5D3A1A';
      X.fillRect(ob.x - 6, ob.y - ob.h*0.3, 12, ob.h*0.6);
      X.fillStyle = '#2D7A3A';
      X.beginPath();
      X.arc(ob.x, ob.y - ob.h*0.4, ob.w/2, 0, Math.PI*2);
      X.fill();
    } else if (ob.type === 'grass') {
      X.fillStyle = '#3D8B3D';
      for (let i = -2; i <= 2; i++) {
        X.beginPath();
        X.moveTo(ob.x + i*5, ob.y);
        X.lineTo(ob.x + i*5 - 2, ob.y - ob.h);
        X.lineTo(ob.x + i*5 + 2, ob.y - ob.h + 4);
        X.fill();
      }
    }
  }
}

// ── Animal drawing ──────────────────────────────
function drawAnimal(a) {
  if (!a.visible) return;
  const ax = a.x, ay = a.y;
  const sz = 28 * SCALE;
  const t = ANIMAL_TYPES[a.type];
  const bobY = Math.sin(Date.now()/500 + a.phase) * 2;

  // Highlight glow during scaffold
  if (a.highlighted) {
    X.save();
    X.shadowColor = '#FFD700';
    X.shadowBlur = 20;
    X.fillStyle = 'rgba(255,215,0,0.3)';
    X.beginPath();
    X.arc(ax, ay + bobY - sz*0.2, sz*0.8, 0, Math.PI*2);
    X.fill();
    X.restore();
  }

  // Celebration bounce
  const cBounce = a.celebrating ? Math.abs(Math.sin(Date.now()/150)) * 8 : 0;

  X.save();
  X.translate(ax, ay + bobY - cBounce);

  // Body
  X.fillStyle = t.color;
  X.beginPath();
  X.ellipse(0, 0, sz*0.5, sz*0.35, 0, 0, Math.PI*2);
  X.fill();

  // Head
  X.fillStyle = t.color;
  X.beginPath();
  X.arc(sz*0.35, -sz*0.25, sz*0.22, 0, Math.PI*2);
  X.fill();

  // Eye
  X.fillStyle = '#fff';
  X.beginPath();
  X.arc(sz*0.42, -sz*0.3, sz*0.07, 0, Math.PI*2);
  X.fill();
  X.fillStyle = '#111';
  X.beginPath();
  X.arc(sz*0.44, -sz*0.3, sz*0.035, 0, Math.PI*2);
  X.fill();

  // Stripe/marking
  X.fillStyle = t.stripe;
  if (a.type === 0) { // zebra stripes
    for (let i = 0; i < 3; i++) {
      X.fillRect(-sz*0.2 + i*sz*0.18, -sz*0.15, sz*0.06, sz*0.3);
    }
  } else if (a.type === 2) { // turtle shell pattern
    X.beginPath();
    X.arc(0, 0, sz*0.25, 0, Math.PI*2);
    X.fill();
    X.fillStyle = t.color;
    X.beginPath();
    X.arc(0, 0, sz*0.18, 0, Math.PI*2);
    X.fill();
  }

  // Legs
  X.fillStyle = t.color;
  X.fillRect(-sz*0.3, sz*0.2, sz*0.1, sz*0.2);
  X.fillRect(sz*0.15, sz*0.2, sz*0.1, sz*0.2);

  X.restore();
}

// ── Ellie ───────────────────────────────────────
function drawEllie() {
  const ex = W * 0.12, ey = H * 0.52;
  ellie.x = ex; ellie.y = ey;
  const sz = 40 * SCALE;
  const bounce = ellie.bounce > 0 ? Math.sin(ellie.bounce * 8) * 5 : 0;

  X.save();
  X.translate(ex, ey - bounce);

  // Shake head animation
  let shakeX = 0;
  if (ellie.shakeHead && ellie.shakeTimer > 0) {
    shakeX = Math.sin(ellie.shakeTimer * 15) * 4;
  }
  X.translate(shakeX, 0);

  // Body
  X.fillStyle = '#8B8B8B';
  X.beginPath();
  X.ellipse(0, 0, sz*0.55, sz*0.45, 0, 0, Math.PI*2);
  X.fill();

  // Head
  X.fillStyle = '#7A7A7A';
  X.beginPath();
  X.arc(sz*0.3, -sz*0.35, sz*0.3, 0, Math.PI*2);
  X.fill();

  // Ears
  X.fillStyle = '#9A9A9A';
  X.beginPath();
  X.ellipse(sz*0.55, -sz*0.45, sz*0.18, sz*0.25, 0.3, 0, Math.PI*2);
  X.fill();
  X.beginPath();
  X.ellipse(sz*0.1, -sz*0.5, sz*0.15, sz*0.22, -0.3, 0, Math.PI*2);
  X.fill();

  // Eye
  X.fillStyle = '#fff';
  X.beginPath();
  X.arc(sz*0.4, -sz*0.4, sz*0.07, 0, Math.PI*2);
  X.fill();
  X.fillStyle = '#222';
  X.beginPath();
  X.arc(sz*0.42, -sz*0.4, sz*0.035, 0, Math.PI*2);
  X.fill();

  // Trunk
  X.strokeStyle = '#7A7A7A';
  X.lineWidth = sz * 0.1;
  X.lineCap = 'round';
  X.beginPath();
  const trunkEnd = ellie.trunkUp ? -sz*0.7 : -sz*0.1;
  X.moveTo(sz*0.5, -sz*0.25);
  X.quadraticCurveTo(sz*0.7, -sz*0.15, sz*0.65, trunkEnd);
  X.stroke();

  // Legs
  X.fillStyle = '#7A7A7A';
  X.fillRect(-sz*0.3, sz*0.25, sz*0.15, sz*0.3);
  X.fillRect(sz*0.1, sz*0.25, sz*0.15, sz*0.3);

  X.restore();
}

// ── Particles ───────────────────────────────────
function spawnParticles(x, y, count, color1, color2) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1,
      life: 1,
      decay: 0.015 + Math.random() * 0.01,
      r: 3 + Math.random() * 4,
      color: Math.random() > 0.5 ? color1 : color2
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    X.globalAlpha = p.life;
    X.fillStyle = p.color;
    X.beginPath();
    X.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    X.fill();
  }
  X.globalAlpha = 1;
}

// ── Answer bar ──────────────────────────────────
let answerBarY = 0;
let answerBarTargetY = 0;
let answerBarVisible = false;

function generateChoices(correct, numChoices) {
  const opts = new Set([correct]);
  // Distractors: ±1, ±2, ±3
  const offsets = [-1, 1, -2, 2, -3, 3];
  let oi = 0;
  while (opts.size < numChoices && oi < offsets.length) {
    const v = correct + offsets[oi];
    if (v >= 1 && v <= 20) opts.add(v);
    oi++;
  }
  // If still not enough, add nearby
  let d = 4;
  while (opts.size < numChoices) {
    if (correct + d <= 20) opts.add(correct + d);
    if (correct - d >= 1 && opts.size < numChoices) opts.add(correct - d);
    d++;
  }

  // For selective counting rounds, make sure the total count of all animals is a distractor
  if (roundData && roundData.others) {
    const totalAll = roundData.qty + roundData.others.qty;
    if (totalAll !== correct && totalAll >= 1 && totalAll <= 20) {
      const arr = [...opts];
      // Replace the distractor farthest from correct
      let farthestIdx = 0, farthestDist = 0;
      for (let i = 0; i < arr.length; i++) {
        if (arr[i] === correct) continue;
        const dist = Math.abs(arr[i] - correct);
        if (dist > farthestDist) { farthestDist = dist; farthestIdx = i; }
      }
      arr[farthestIdx] = totalAll;
      return shuffle(arr);
    }
  }

  // For Tree departures, include peak count as distractor
  if (roundData && roundData.departures > 0) {
    const peak = roundData.qty + roundData.departures;
    if (peak !== correct && peak >= 1 && peak <= 20) {
      const arr = [...opts];
      let farthestIdx = 0, farthestDist = 0;
      for (let i = 0; i < arr.length; i++) {
        if (arr[i] === correct) continue;
        const dist = Math.abs(arr[i] - correct);
        if (dist > farthestDist) { farthestDist = dist; farthestIdx = i; }
      }
      arr[farthestIdx] = peak;
      return shuffle(arr);
    }
  }

  return shuffle([...opts].slice(0, numChoices));
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function drawAnswerBar() {
  if (!answerBarVisible && answerBarY >= H) return;

  // Animate slide
  answerBarY += (answerBarTargetY - answerBarY) * 0.15;

  const barH = Math.min(120, H * 0.16);
  const bw = Math.min(80, (W - 32 - (choices.length - 1) * 12) / choices.length);
  const totalW = choices.length * bw + (choices.length - 1) * 12;
  const startX = (W - totalW) / 2;

  // Bar background
  X.fillStyle = 'rgba(255,255,255,0.92)';
  drawRoundedRect(8, answerBarY, W - 16, barH, 16);
  X.fill();

  for (let i = 0; i < choices.length; i++) {
    const bx = startX + i * (bw + 12);
    const by = answerBarY + (barH - bw) / 2;
    const val = choices[i];
    const isGreyed = greyedOut.includes(val);
    const isSelected = selectedChoice === i;
    const isCorrectReveal = state === 'reveal' && val === roundData.qty;

    // Button background
    if (isGreyed) {
      X.fillStyle = '#D1D5DB';
    } else if (isCorrectReveal) {
      const glow = 0.6 + Math.sin(revealGlow * 4) * 0.4;
      X.fillStyle = `rgba(251,191,36,${glow})`;
    } else if (isSelected && state === 'feedback_correct') {
      X.fillStyle = '#4ADE80';
    } else {
      X.fillStyle = '#F0F4F0';
    }
    drawRoundedRect(bx, by, bw, bw, 12);
    X.fill();

    // Border
    X.strokeStyle = isGreyed ? '#9CA3AF' : '#2D5016';
    X.lineWidth = 2;
    drawRoundedRect(bx, by, bw, bw, 12);
    X.stroke();

    // Number
    X.fillStyle = isGreyed ? '#9CA3AF' : '#1F2937';
    X.font = `bold ${bw * 0.38}px sans-serif`;
    X.textAlign = 'center';
    X.textBaseline = 'middle';
    X.fillText(val, bx + bw/2, by + bw * 0.35);

    // Dots
    if (!isGreyed) {
      drawDots(bx + bw/2, by + bw * 0.68, val, bw);
    }

    // Store button bounds for hit testing
    choices[i] = val;
    if (!choiceBounds[i]) choiceBounds[i] = {};
    choiceBounds[i].x = bx;
    choiceBounds[i].y = by;
    choiceBounds[i].w = bw;
    choiceBounds[i].h = bw;
  }
}

let endBounds = {};

// ── Place animals for a round ───────────────────
function setupRound() {
  const rd = TIERS[tier].rounds[roundIndex];
  roundData = rd;
  animals = [];
  otherAnimals = [];
  obstacles = [];
  greyedOut = [];
  wrongAttempts = 0;
  selectedChoice = -1;
  scaffoldIndex = -1;
  answerBarVisible = false;
  answerBarY = H + 20;
  answerBarTargetY = H + 20;
  choiceBounds = [];
  wanderWarned = false;
  paused = false;
  ellie.trunkUp = false;
  ellie.shakeHead = false;
  ellie.shakeTimer = 0;
  ellie.bounce = 0;

  roundLog = {
    round: roundIndex + 1,
    tier: tier,
    animalType: ANIMAL_TYPES[rd.animal].name,
    correctAnswer: rd.qty,
    attemptsNeeded: 0,
    scaffoldTriggered: false,
    answerRevealed: false,
    wrongAnswersTapped: [],
    timeToFirstTap: 0,
    timeToCorrectTap: 0,
    hadOcclusion: rd.occlusion > 0,
    hadSelectiveCounting: rd.others !== null,
    hadDeparture: rd.departures > 0,
    hadLateArrival: rd.lateArrivals > 0,
    barAppearedAt: 0
  };

  // Place obstacles for occlusion
  const occlusionTypes = ['rock', 'tree', 'grass'];
  for (let i = 0; i < rd.occlusion; i++) {
    obstacles.push({
      type: occlusionTypes[i % 3],
      x: W * 0.4 + i * W * 0.2 + Math.random() * W * 0.1,
      y: H * 0.38 + Math.random() * H * 0.05,
      w: 40 + Math.random() * 20,
      h: 45 + Math.random() * 15
    });
  }

  // Determine total to place initially
  const initialCount = rd.qty - rd.lateArrivals + rd.departures;
  const totalAsked = rd.qty + rd.departures; // peak count before departures

  // Place main animals
  const spacing = Math.min(70, (W * 0.65) / Math.max(totalAsked, 1));
  for (let i = 0; i < totalAsked; i++) {
    const willDepart = i >= totalAsked - rd.departures;
    const isLate = i >= initialCount && i < initialCount + rd.lateArrivals;
    // Actually, let's recalculate: we want initialCount on screen, then lateArrivals come in, then departures leave
    // Peak = initialCount + lateArrivals = rd.qty + rd.departures
    // After departures: rd.qty animals remain (the correct answer)
    const a = {
      type: rd.animal,
      x: W * 0.28 + (i % 6) * spacing + Math.random() * 15,
      y: H * 0.36 + Math.floor(i / 6) * 40 + Math.random() * 15,
      targetX: 0, targetY: 0,
      visible: true,
      arriving: false,
      departing: false,
      departed: false,
      lateArrival: false,
      lateArrivalTime: 0,
      departureTime: 0,
      highlighted: false,
      celebrating: false,
      phase: Math.random() * Math.PI * 2,
      opacity: 1
    };
    a.targetX = a.x;
    a.targetY = a.y;

    animals.push(a);
  }

  // Mark late arrivals (last N animals start off-screen)
  for (let i = 0; i < rd.lateArrivals; i++) {
    const idx = initialCount + i; // but we may have more animals due to departures
    // Actually let's index from the end of non-departing animals
    // Re-think: we have totalAsked animals. The last rd.departures will leave.
    // The "late arrivals" should be among the ones that STAY.
    // So: animals 0..initialCount-1 are on screen initially
    // animals initialCount..initialCount+lateArrivals-1 arrive late
    // animals totalAsked-departures..totalAsked-1 depart
    if (idx < animals.length) {
      animals[idx].visible = false;
      animals[idx].lateArrival = true;
      animals[idx].lateArrivalTime = 3 + i * 2; // seconds
      animals[idx].x = -50; // off-screen left
    }
  }

  // Mark departures
  for (let i = 0; i < rd.departures; i++) {
    const idx = totalAsked - 1 - i;
    if (idx >= 0 && idx < animals.length) {
      animals[idx].departing = true;
      animals[idx].departureTime = 8 + i * 2; // seconds
    }
  }

  // Place "other" animals (for selective counting)
  if (rd.others) {
    for (let i = 0; i < rd.others.qty; i++) {
      otherAnimals.push({
        type: rd.others.type,
        x: W * 0.55 + i * spacing * 0.8 + Math.random() * 20,
        y: H * 0.40 + Math.random() * 15,
        visible: true,
        highlighted: false,
        celebrating: false,
        phase: Math.random() * Math.PI * 2,
        opacity: 1
      });
    }
  }

  // Generate answer choices
  const numChoices = TIERS[tier].choices;
  choices = generateChoices(rd.qty, numChoices);

  state = 'scene_setup';
  stateTimer = 0;
}

// ── State machine ───────────────────────────────
let lastTime = 0;
let questionSpoken = false;
let barDelay = 0;

function update(dt) {
  stateTimer += dt;
  updateParticles(dt);

  // Ellie animations
  if (ellie.shakeTimer > 0) ellie.shakeTimer -= dt;
  if (ellie.shakeTimer <= 0) ellie.shakeHead = false;
  if (ellie.trunkTimer > 0) { ellie.trunkTimer -= dt; if (ellie.trunkTimer <= 0) ellie.trunkUp = false; }
  if (ellie.bounce > 0) ellie.bounce -= dt;

  if (state === 'scene_setup') {
    if (stateTimer > 1.5) {
      state = 'animals_arrive';
      stateTimer = 0;
      // Play arrival sound
      sfxPop();
    }
  }
  else if (state === 'animals_arrive') {
    // Animals walk in (simple: fade in over 1s)
    for (const a of animals) {
      if (!a.lateArrival && a.visible) {
        a.opacity = Math.min(1, stateTimer / 0.8);
      }
    }
    if (stateTimer > 1.5) {
      state = 'question';
      stateTimer = 0;
      questionSpoken = false;
    }
  }
  else if (state === 'question') {
    // Handle late arrivals
    for (const a of animals) {
      if (a.lateArrival && !a.visible && stateTimer >= a.lateArrivalTime) {
        a.visible = true;
        a.x = -30;
        a.opacity = 0;
        sfxPop();
      }
      if (a.lateArrival && a.visible) {
        a.x += (a.targetX - a.x) * 0.05;
        a.opacity = Math.min(1, a.opacity + dt * 2);
      }
    }

    // Handle departures
    for (const a of animals) {
      if (a.departing && !a.departed && stateTimer >= a.departureTime) {
        a.departed = true;
      }
      if (a.departed) {
        a.x += dt * 80; // walk off right
        a.opacity = Math.max(0, a.opacity - dt);
        if (a.x > W + 50) a.visible = false;
      }
    }

    if (!questionSpoken) {
      questionSpoken = true;
      sfxTrumpet();
      const animalName = ANIMAL_TYPES[roundData.animal].name;
      setTimeout(() => {
        speak(`How many ${animalName} are at the watering hole?`, 0.85);
      }, 400);
      // Show answer bar after fixed delay (don't depend on speech callback)
      barDelay = 3.0;
    }

    if (barDelay > 0) {
      barDelay -= dt;
      if (barDelay <= 0) {
        state = 'answer';
        stateTimer = 0;
        answerBarVisible = true;
        answerBarTargetY = H - Math.min(130, H * 0.18);
        roundLog.barAppearedAt = performance.now();
        sfxPop();
      }
    }

    // Wander warning (Sapling/Tree)
    const wt = TIERS[tier].wanderTime;
    if (wt < Infinity && stateTimer > wt - 2 && !wanderWarned) {
      wanderWarned = true;
      speak("They're starting to leave!", 0.9);
    }
  }
  else if (state === 'answer') {
    // Continue late arrivals / departures in Tree
    for (const a of animals) {
      if (a.lateArrival && a.visible) {
        a.x += (a.targetX - a.x) * 0.05;
        a.opacity = Math.min(1, a.opacity + dt * 2);
      }
      if (a.departed) {
        a.x += dt * 80;
        a.opacity = Math.max(0, a.opacity - dt);
        if (a.x > W + 50) a.visible = false;
      }
      if (a.departing && !a.departed && stateTimer + (questionSpoken ? 3 : 0) >= a.departureTime) {
        a.departed = true;
      }
    }

    // Auto-pause for Sapling/Tree
    const pt = TIERS[tier].pauseTime;
    if (pt < Infinity && stateTimer > pt && !paused) {
      paused = true;
      // Freeze animals
      speak("Take your time!", 0.85);
    }
  }
  else if (state === 'feedback_correct') {
    // Celebration animation
    for (const a of [...animals, ...otherAnimals]) {
      if (a.visible) a.celebrating = true;
    }
    ellie.trunkUp = true;
    if (stateTimer > 2.0) {
      // End celebration, advance
      for (const a of [...animals, ...otherAnimals]) a.celebrating = false;
      advanceRound();
    }
  }
  else if (state === 'feedback_wrong') {
    if (stateTimer > 1.5) {
      state = 'answer';
      stateTimer = 0;
    }
  }
  else if (state === 'scaffold') {
    scaffoldTimer += dt;
    const interval = 0.7;
    const targetIdx = Math.floor(scaffoldTimer / interval);
    const visibleAnimals = animals.filter(a => a.visible && !a.departed);

    if (targetIdx !== scaffoldIndex && targetIdx < visibleAnimals.length) {
      scaffoldIndex = targetIdx;
      // Highlight this animal
      for (const a of animals) a.highlighted = false;
      visibleAnimals[scaffoldIndex].highlighted = true;
      sfxScaffoldBoop(scaffoldIndex);
      speak(`${scaffoldIndex + 1}`, 0.7);
    }

    if (targetIdx >= visibleAnimals.length && scaffoldTimer > visibleAnimals.length * interval + 0.8) {
      // Scaffold complete
      for (const a of animals) a.highlighted = false;
      const n = roundData.qty;
      speak(`${n}! There are ${n} ${ANIMAL_TYPES[roundData.animal].name}.`, 0.8, () => {
        state = 'answer';
        stateTimer = 0;
      });
      state = 'scaffold_done';
      stateTimer = 0;
    }
  }
  else if (state === 'scaffold_done') {
    // Wait for speech to finish
    if (stateTimer > 2.5) {
      state = 'answer';
      stateTimer = 0;
    }
  }
  else if (state === 'reveal') {
    revealGlow += dt;
    // Just wait for player to tap the correct answer
  }
}

function advanceRound() {
  roundIndex++;
  if (roundIndex >= 8) {
    state = 'session_end';
    stateTimer = 0;
    logSession();
    speak("Great safari, Ranger! You counted 8 groups today!", 0.85);
    spawnParticles(W/2, H*0.35, 20, '#4ADE80', '#FFD700');
  } else {
    setupRound();
  }
}

// ── Input ───────────────────────────────────────
function handleTap(px, py) {
  unlockAudio();

  // Mute button (always active)
  if (px > W - 48 && py < 48) {
    muted = !muted;
    return;
  }

  if (state === 'tier_select') {
    const tiers = ['sprout', 'sapling', 'tree'];
    for (let i = 0; i < 3; i++) {
      const b = tierBounds[i];
      if (px >= b.x && px <= b.x + b.w && py >= b.y && py <= b.y + b.h) {
        tier = tiers[i];
        localStorage.setItem('wh_tier', tier);
        roundIndex = 0;
        sessionLog = [];
        speak(TIERS[tier].label + '!', 0.9);
        // Start game after short delay (don't depend on speech callback)
        setTimeout(() => { if (state === 'loading') setupRound(); }, 1200);
        state = 'loading';
        return;
      }
    }
    // Tap Ellie area to hear instruction again
    if (py > H * 0.12 && py < H * 0.32) {
      speak('Pick a path, Ranger!', 0.85);
    }
    return;
  }

  if (state === 'session_end') {
    if (endBounds.replay && px >= endBounds.replay.x && px <= endBounds.replay.x + endBounds.replay.w &&
        py >= endBounds.replay.y && py <= endBounds.replay.y + endBounds.replay.h) {
      sessionLog[sessionLog.length - 1].replayChosen = true;
      roundIndex = 0;
      sessionLog = [];
      setupRound();
      return;
    }
    if (endBounds.home && px >= endBounds.home.x && px <= endBounds.home.x + endBounds.home.w &&
        py >= endBounds.home.y && py <= endBounds.home.y + endBounds.home.h) {
      state = 'tier_select';
      return;
    }
    return;
  }

  // Tap Ellie to re-hear question
  if ((state === 'answer' || state === 'question') && roundData) {
    const ed = Math.hypot(px - ellie.x, py - ellie.y);
    if (ed < 50) {
      const animalName = ANIMAL_TYPES[roundData.animal].name;
      speak(`How many ${animalName} are at the watering hole?`, 0.85);
      return;
    }
  }

  // Answer bar taps
  if (state === 'answer' || state === 'reveal') {
    for (let i = 0; i < choices.length; i++) {
      const b = choiceBounds[i];
      if (!b || !b.x) continue;
      if (px >= b.x && px <= b.x + b.w && py >= b.y && py <= b.y + b.h) {
        const val = choices[i];
        if (greyedOut.includes(val)) return; // already tried

        sfxTap();
        const now = performance.now();

        if (roundLog.attemptsNeeded === 0) {
          roundLog.timeToFirstTap = now - roundLog.barAppearedAt;
        }

        if (val === roundData.qty) {
          // CORRECT
          roundLog.attemptsNeeded = wrongAttempts + 1;
          roundLog.timeToCorrectTap = now - roundLog.barAppearedAt;
          selectedChoice = i;
          state = 'feedback_correct';
          stateTimer = 0;
          sfxCorrect();
          sfxTrumpet();
          spawnParticles(b.x + b.w/2, b.y + b.h/2, 12, '#4ADE80', '#FFD700');
          ellie.bounce = 0.6;
          const praise = PRAISE[Math.floor(Math.random() * PRAISE.length)];
          speak(`${praise} ${roundData.qty} ${ANIMAL_TYPES[roundData.animal].name}!`, 0.85);
          sessionLog.push({...roundLog});
        } else {
          // WRONG
          wrongAttempts++;
          roundLog.wrongAnswersTapped.push(val);
          greyedOut.push(val);
          sfxWrong();

          const maxWrong = TIERS[tier].choices - 1;

          if (wrongAttempts === 1) {
            // First wrong
            ellie.shakeHead = true;
            ellie.shakeTimer = 0.5;
            speak("Hmm, not quite. Count them again!", 0.85);
            state = 'feedback_wrong';
            stateTimer = 0;
          } else if (wrongAttempts === 2) {
            // Second wrong — scaffold
            ellie.trunkUp = true;
            ellie.trunkTimer = 5;
            roundLog.scaffoldTriggered = true;
            speak("Let me help! Count with me.", 0.8);
            // Start scaffold after fixed delay
            setTimeout(() => {
              if (state === 'feedback_wrong') {
                state = 'scaffold';
                stateTimer = 0;
                scaffoldTimer = 0;
                scaffoldIndex = -1;
              }
            }, 1800);
            state = 'feedback_wrong';
            stateTimer = 0;
          } else if (wrongAttempts >= maxWrong) {
            // All wrong — reveal
            roundLog.answerRevealed = true;
            roundLog.attemptsNeeded = wrongAttempts + 1;
            roundLog.timeToCorrectTap = now - roundLog.barAppearedAt;
            state = 'reveal';
            stateTimer = 0;
            revealGlow = 0;
            speak(`It's ${roundData.qty}! Tap ${roundData.qty}.`, 0.85);
          } else {
            state = 'feedback_wrong';
            stateTimer = 0;
            ellie.shakeHead = true;
            ellie.shakeTimer = 0.5;
            speak("Try again!", 0.85);
          }
        }
        return;
      }
    }
  }
}

C.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  const rect = C.getBoundingClientRect();
  handleTap(e.clientX - rect.left, e.clientY - rect.top);
});

// ── Logging ─────────────────────────────────────
function logSession() {
  const firstTryCorrect = sessionLog.filter(r => r.attemptsNeeded === 1).length;
  const scaffoldCount = sessionLog.filter(r => r.scaffoldTriggered).length;
  const answerRevealCount = sessionLog.filter(r => r.answerRevealed).length;
  const avgTimeFirst = sessionLog.reduce((s,r) => s + r.timeToFirstTap, 0) / sessionLog.length;
  const avgTimeCorrect = sessionLog.reduce((s,r) => s + r.timeToCorrectTap, 0) / sessionLog.length;

  const summary = {
    tier,
    rounds: 8,
    firstTryCorrect,
    scaffoldCount,
    answerRevealCount,
    avgTimeToFirstTapMs: Math.round(avgTimeFirst),
    avgTimeToCorrectTapMs: Math.round(avgTimeCorrect),
    sessionDurationSec: 0, // would need session start tracking
    replayChosen: false,
    roundDetails: sessionLog
  };

  console.log('=== WATERING HOLE COUNT — SESSION LOG ===');
  console.log(JSON.stringify(summary, null, 2));
  console.log('=== PER-ROUND DETAILS ===');
  for (const r of sessionLog) {
    console.log(`R${r.round}: ${r.animalType} x${r.correctAnswer} | attempts:${r.attemptsNeeded} | scaffold:${r.scaffoldTriggered} | firstTap:${Math.round(r.timeToFirstTap)}ms | correctTap:${Math.round(r.timeToCorrectTap)}ms | wrong:${JSON.stringify(r.wrongAnswersTapped)}`);
  }
}

// ── Main render ─────────────────────────────────
function draw() {
  X.clearRect(0, 0, W, H);

  if (state === 'tier_select') {
    drawTierSelect();
    return;
  }

  if (state === 'session_end') {
    drawSessionEnd();
    return;
  }

  if (state === 'loading') {
    X.fillStyle = '#2D5016';
    X.fillRect(0, 0, W, H);
    return;
  }

  // Game scene
  drawBackground();
  drawObstacles();

  // Draw other animals (not asked about)
  for (const a of otherAnimals) drawAnimal(a);

  // Draw main animals
  for (const a of animals) {
    if (a.visible && a.opacity > 0) {
      X.globalAlpha = a.opacity;
      drawAnimal(a);
      X.globalAlpha = 1;
    }
  }

  drawEllie();
  drawAnswerBar();
  drawParticles();
  drawMuteButton();

  // Round indicator
  X.fillStyle = 'rgba(255,255,255,0.7)';
  drawRoundedRect(8, 8, 70, 28, 8);
  X.fill();
  X.fillStyle = '#2D5016';
  X.font = 'bold 13px sans-serif';
  X.textAlign = 'center';
  X.textBaseline = 'middle';
  X.fillText(`${roundIndex + 1} / 8`, 43, 22);
}

// ── Game loop ───────────────────────────────────
function loop() {
  const now = performance.now();
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  resize();
  update(dt);
  draw();
}

// Use setInterval for reliable ticking (rAF pauses in background tabs)
lastTime = performance.now();
setInterval(loop, 16);

// Auto-speak on tier select
setTimeout(() => speak('Pick a path, Ranger!', 0.85), 500);
</script>
