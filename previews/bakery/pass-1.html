<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bakery Math — Pass 1</title>
  <style>
    /* ── Reset ─────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0; padding: 0;
      background: #fdf6ec;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    #root {
      width: 100%; height: 100dvh;
      display: flex; flex-direction: column;
    }

    /* ── Design tokens ──────────────────────────────────────────────────────── */
    :root {
      --bakery-bg:     #fdf6ec;
      --bakery-brown:  #7b4f2e;
      --bakery-warm:   #c8813a;
      --bakery-cream:  #fef3dc;
      --bakery-green:  #3a7d44;
      --bakery-red:    #c0392b;
      --bakery-text:   #3b2510;
      --bakery-border: #d4a96a;
      --radius:        12px;
      --shadow:        0 2px 8px rgba(0,0,0,0.12);
    }

    /* ── Layout ─────────────────────────────────────────────────────────────── */
    .bakery-game {
      display: flex; flex-direction: column;
      height: 100dvh;
      background: var(--bakery-bg);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--bakery-text);
      max-width: 480px; margin: 0 auto;
      position: relative; overflow: hidden;
    }
    .game-shake { animation: game-shake 0.45s ease; }
    @keyframes game-shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-6px); }
      80%      { transform: translateX(6px); }
    }

    /* ── Header ─────────────────────────────────────────────────────────────── */
    .game-header {
      height: 80px;
      background: var(--bakery-brown); color: #fff;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; flex-shrink: 0;
      box-shadow: var(--shadow); position: relative; z-index: 1;
    }
    .game-title { font-size: 1.3rem; font-weight: 700; letter-spacing: 0.02em; }

    /* ── Play area ──────────────────────────────────────────────────────────── */
    .game-play-area {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 20px; gap: 20px; position: relative;
    }

    /* ── Footer ─────────────────────────────────────────────────────────────── */
    .game-footer {
      height: 140px;
      background: var(--bakery-cream);
      border-top: 2px solid var(--bakery-border);
      flex-shrink: 0; display: flex;
      align-items: center; justify-content: center;
      position: relative; z-index: 1;
    }

    /* ── Customer character ─────────────────────────────────────────────────── */
    .ticket-row { display: flex; align-items: center; gap: 16px; }
    .customer-character {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      transition: transform 0.2s ease;
    }
    .customer-character.customer-happy {
      animation: character-bounce 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.28);
    }
    @keyframes character-bounce {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.25) translateY(-6px); }
      100% { transform: scale(1); }
    }
    .customer-emoji { font-size: 3rem; line-height: 1; display: block; transition: all 0.2s ease; }
    .customer-label {
      font-size: 0.65rem; color: var(--bakery-warm);
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
    }

    /* ── Ticket card ─────────────────────────────────────────────────────────── */
    .customer-ticket {
      background: #fff; border: 3px solid var(--bakery-border);
      border-radius: var(--radius); padding: 16px 28px;
      text-align: center; box-shadow: var(--shadow); min-width: 140px;
    }
    .ticket-label {
      font-size: 0.75rem; color: var(--bakery-warm); font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .ticket-number {
      font-size: 3.5rem; font-weight: 900; color: var(--bakery-brown);
      line-height: 1; margin: 4px 0;
    }
    .ticket-sub { font-size: 0.75rem; color: #999; }

    /* ── Running total ───────────────────────────────────────────────────────── */
    .running-total { text-align: right; }
    .total-label { font-size: 0.65rem; opacity: 0.8; text-transform: uppercase; letter-spacing: 0.05em; }
    .total-number { font-size: 1.8rem; font-weight: 900; line-height: 1; }
    .progress-bar {
      width: 80px; height: 6px; background: rgba(255,255,255,0.3);
      border-radius: 3px; margin-top: 4px; overflow: hidden;
    }
    .progress-fill { height: 100%; background: #f0c040; border-radius: 3px; transition: width 0.2s ease; }

    /* ── Pastry box ──────────────────────────────────────────────────────────── */
    .pastry-box {
      background: var(--bakery-cream); border: 3px solid var(--bakery-border);
      border-radius: var(--radius); padding: 16px; min-height: 100px; min-width: 220px;
      text-align: center; position: relative; box-shadow: var(--shadow); transition: border-color 0.15s;
    }
    .pastry-box.box-success { border-color: var(--bakery-green); box-shadow: 0 0 0 4px rgba(58,125,68,0.2); }
    .pastry-box.box-overshoot { border-color: var(--bakery-red); box-shadow: 0 0 0 4px rgba(192,57,43,0.2); }
    .box-label {
      font-size: 0.7rem; color: var(--bakery-warm); font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px;
    }
    .box-items { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; min-height: 40px; }
    .box-pastry { font-size: 1.6rem; animation: item-enter 0.2s ease; }
    @keyframes item-enter {
      from { transform: scale(0) translateY(-10px); opacity: 0; }
      to   { transform: scale(1) translateY(0);     opacity: 1; }
    }
    .box-lid    { font-size: 2rem; margin-top: 8px; animation: lid-drop 0.3s ease; }
    .box-bounce { font-size: 2rem; margin-top: 8px; }
    @keyframes lid-drop {
      from { transform: translateY(-20px); opacity: 0; }
      to   { transform: translateY(0);     opacity: 1; }
    }

    /* ── Flying pastry ───────────────────────────────────────────────────────── */
    .flying-pastry {
      position: fixed; font-size: 1.8rem; pointer-events: none; z-index: 200;
      transform: translate(-50%, -50%);
      animation: fly-to-box linear forwards;
      will-change: transform, opacity;
    }
    @keyframes fly-to-box {
      0%   { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      50%  {
        transform: translate(
          calc(-50% + var(--dx) * 0.5 - 30px),
          calc(-50% + var(--dy) * 0.5 - 60px)
        ) scale(1.15);
        opacity: 1;
      }
      100% {
        transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0.6);
        opacity: 0;
      }
    }

    /* ── Full-screen feedback overlay ────────────────────────────────────────── */
    .feedback-fullscreen {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      animation: overlay-scale-in 0.18s cubic-bezier(0.17, 0.89, 0.32, 1.2) forwards;
    }
    @keyframes overlay-scale-in {
      from { opacity: 0; transform: scale(0.88); }
      to   { opacity: 1; transform: scale(1); }
    }
    .feedback-fullscreen.feedback-success  { background: rgba(40, 120, 60, 0.92); }
    .feedback-fullscreen.feedback-overshoot { background: rgba(180, 40, 30, 0.88); }
    .feedback-inner { text-align: center; color: #fff; }
    .feedback-emoji {
      font-size: 5rem; line-height: 1; display: block;
      animation: emoji-pop 0.25s cubic-bezier(0.17, 0.89, 0.32, 1.4) 0.1s both;
    }
    @keyframes emoji-pop {
      from { transform: scale(0.4); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .feedback-text {
      font-size: 1.6rem; font-weight: 800; margin-top: 16px;
      letter-spacing: 0.01em; text-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }

    /* ── Pastry tray ─────────────────────────────────────────────────────────── */
    .pastry-tray { padding: 0 12px; width: 100%; }
    .tray-label {
      font-size: 0.7rem; color: var(--bakery-brown); font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      text-align: center; margin-bottom: 6px;
    }
    .tray-items { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
    .tray-pastry {
      font-size: 1.8rem; min-width: 44px; min-height: 44px;
      background: #fff; border: 2px solid var(--bakery-border);
      border-radius: 8px; cursor: pointer;
      transition: transform 0.1s, background 0.1s;
      display: flex; align-items: center; justify-content: center; padding: 0;
    }
    .tray-pastry:hover:not(.tray-disabled) { transform: scale(1.15); background: var(--bakery-cream); }
    .tray-pastry:active:not(.tray-disabled) { transform: scale(0.92); }
    .tray-pastry.tray-disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Session complete ────────────────────────────────────────────────────── */
    .session-complete {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; padding: 40px; text-align: center;
    }
    .complete-emoji { font-size: 4rem; animation: pop-in 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.28); }
    @keyframes pop-in {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .session-complete h2 { font-size: 2rem; font-weight: 900; color: var(--bakery-brown); margin: 0; }
    .session-complete p  { font-size: 1.1rem; color: #888; margin: 0; }
    .replay-btn {
      margin-top: 12px; padding: 14px 36px; font-size: 1.1rem; font-weight: 700;
      background: var(--bakery-brown); color: #fff; border: none;
      border-radius: var(--radius); cursor: pointer; min-height: 52px;
      transition: background 0.15s, transform 0.1s;
    }
    .replay-btn:hover  { background: var(--bakery-warm); }
    .replay-btn:active { transform: scale(0.97); }
  </style>
</head>
<body>
<div id="root"></div>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const TARGET_SEQUENCE = [3, 5, 4, 7, 6];
const STATES = { ACTIVE: 'active', SUCCESS: 'success', OVERSHOOT: 'overshoot', COMPLETE: 'complete' };
const SUCCESS_MS   = 1500;
const OVERSHOOT_MS = 700;
const FLY_MS       = 380;

// ── State ─────────────────────────────────────────────────────────────────────
let targets      = [];
let roundIndex   = 0;
let currentTotal = 0;
let roundState   = STATES.ACTIVE;
let isAnimating  = false;
let trayEl       = null;
let boxEl        = null;

function getTargets() {
  return [...TARGET_SEQUENCE].sort(() => Math.random() - 0.5).slice(0, 5);
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const root = document.getElementById('root');
  root.innerHTML = '';

  if (roundState === STATES.COMPLETE) { renderComplete(root); return; }

  const target      = targets[roundIndex];
  const totalRounds = targets.length;
  const isSuccess   = roundState === STATES.SUCCESS;
  const isOvershoot = roundState === STATES.OVERSHOOT;
  const trayDisabled = isAnimating || roundState !== STATES.ACTIVE;

  const game = el('div', `bakery-game${isOvershoot ? ' game-shake' : ''}`);

  // Full-screen feedback overlay
  if (isSuccess || isOvershoot) {
    const overlay = el('div', `feedback-fullscreen ${isSuccess ? 'feedback-success' : 'feedback-overshoot'}`);
    const inner   = el('div', 'feedback-inner');
    const emoji   = el('div', 'feedback-emoji'); emoji.textContent = isSuccess ? '😊' : '↩️';
    const text    = el('div', 'feedback-text');  text.textContent  = isSuccess ? 'Perfect order!' : 'Too many! One bounced back.';
    inner.append(emoji, text);
    overlay.appendChild(inner);
    game.appendChild(overlay);
  }

  // Header
  const header   = el('div', 'game-header');
  const title    = el('span', 'game-title'); title.textContent = '🍞 Bakery Math';
  const rt       = el('div', 'running-total');
  const rtLabel  = el('div', 'total-label');  rtLabel.textContent  = 'In the box';
  const rtNumber = el('div', 'total-number'); rtNumber.textContent = currentTotal;
  const pct = target > 0 ? Math.min(currentTotal / target, 1) : 0;
  const pBar = el('div', 'progress-bar');
  const pFill = el('div', 'progress-fill'); pFill.style.width = `${pct * 100}%`;
  pBar.appendChild(pFill);
  rt.append(rtLabel, rtNumber, pBar);
  header.append(title, rt);
  game.appendChild(header);

  // Play area
  const playArea  = el('div', 'game-play-area');
  const ticketRow = el('div', 'ticket-row');

  // Customer character
  const customer   = el('div', `customer-character${isSuccess ? ' customer-happy' : ''}`);
  const custEmoji  = el('span', 'customer-emoji'); custEmoji.textContent = isSuccess ? '😊' : '👩‍🍳';
  const custLabel  = el('span', 'customer-label'); custLabel.textContent = 'Customer';
  customer.append(custEmoji, custLabel);

  // Ticket
  const ticket = el('div', 'customer-ticket');
  const tLabel = el('div', 'ticket-label'); tLabel.textContent = 'Order';
  const tNum   = el('div', 'ticket-number'); tNum.textContent  = target;
  const tSub   = el('div', 'ticket-sub');   tSub.textContent  = `${roundIndex + 1} / ${totalRounds}`;
  ticket.append(tLabel, tNum, tSub);
  ticketRow.append(customer, ticket);
  playArea.appendChild(ticketRow);

  // Pastry box
  const boxWrap = el('div', '');
  boxEl = boxWrap;
  const box      = el('div', `pastry-box${isSuccess ? ' box-success' : ''}${isOvershoot ? ' box-overshoot' : ''}`);
  const boxLbl   = el('div', 'box-label'); boxLbl.textContent = 'Pastry box';
  const boxItems = el('div', 'box-items');
  for (let i = 0; i < currentTotal; i++) {
    const p = el('span', 'box-pastry'); p.textContent = '🥐'; boxItems.appendChild(p);
  }
  box.append(boxLbl, boxItems);
  if (isSuccess)   { const lid = el('div', 'box-lid');    lid.textContent = '✅'; box.appendChild(lid); }
  if (isOvershoot) { const bnc = el('div', 'box-bounce'); bnc.textContent = '↩';  box.appendChild(bnc); }
  boxWrap.appendChild(box);
  playArea.appendChild(boxWrap);
  game.appendChild(playArea);

  // Footer tray
  const footer = el('div', 'game-footer');
  trayEl = footer;
  const tray      = el('div', 'pastry-tray');
  const trayLbl   = el('div', 'tray-label'); trayLbl.textContent = 'Tap a pastry to add it';
  const trayItems = el('div', 'tray-items');
  for (let i = 0; i < 12; i++) {
    const btn = el('button', `tray-pastry${trayDisabled ? ' tray-disabled' : ''}`);
    btn.textContent = '🥐';
    btn.setAttribute('aria-label', 'Add one pastry to box');
    btn.disabled = trayDisabled;
    if (!trayDisabled) btn.addEventListener('click', handleTap);
    trayItems.appendChild(btn);
  }
  tray.append(trayLbl, trayItems);
  footer.appendChild(tray);
  game.appendChild(footer);

  root.appendChild(game);

  if (isOvershoot) {
    game.addEventListener('animationend', () => game.classList.remove('game-shake'), { once: true });
  }
}

function renderComplete(root) {
  const game   = el('div', 'bakery-game');
  const header = el('div', 'game-header');
  const title  = el('span', 'game-title'); title.textContent = '🍞 Bakery Math';
  header.appendChild(title);
  game.appendChild(header);

  const sc  = el('div', 'session-complete');
  const ce  = el('div', 'complete-emoji'); ce.textContent = '🎉';
  const h2  = document.createElement('h2'); h2.textContent = 'All orders filled!';
  const p   = document.createElement('p');  p.textContent  = 'Great job at the bakery!';
  const btn = el('button', 'replay-btn');   btn.textContent = 'Play again';
  btn.addEventListener('click', handleReplay);
  sc.append(ce, h2, p, btn);
  game.appendChild(sc);
  root.appendChild(game);
}

// ── Handlers ──────────────────────────────────────────────────────────────────
function handleTap() {
  if (isAnimating || roundState !== STATES.ACTIVE) return;
  isAnimating = true;
  spawnFlyingPastry();

  setTimeout(() => {
    const next   = currentTotal + 1;
    currentTotal = next;
    const target = targets[roundIndex];

    if (next === target) {
      roundState = STATES.SUCCESS; render();
      setTimeout(() => {
        if (roundIndex + 1 >= targets.length) {
          roundState = STATES.COMPLETE;
        } else {
          roundIndex++; currentTotal = 0; roundState = STATES.ACTIVE;
        }
        isAnimating = false; render();
      }, SUCCESS_MS);

    } else if (next > target) {
      roundState = STATES.OVERSHOOT; render();
      setTimeout(() => {
        currentTotal--; roundState = STATES.ACTIVE; isAnimating = false; render();
      }, OVERSHOOT_MS);

    } else {
      isAnimating = false; render();
    }
  }, FLY_MS);
}

function handleReplay() {
  targets = getTargets(); roundIndex = 0; currentTotal = 0;
  roundState = STATES.ACTIVE; isAnimating = false; render();
}

// ── Flying pastry arc ─────────────────────────────────────────────────────────
function spawnFlyingPastry() {
  if (!trayEl || !boxEl) return;
  const trayRect = trayEl.getBoundingClientRect();
  const boxRect  = boxEl.getBoundingClientRect();
  const startX = trayRect.left + trayRect.width  / 2;
  const startY = trayRect.top  + trayRect.height / 2;
  const dx = (boxRect.left + boxRect.width  / 2) - startX;
  const dy = (boxRect.top  + boxRect.height / 2) - startY;

  const span = document.createElement('span');
  span.className   = 'flying-pastry';
  span.textContent = '🥐';
  span.setAttribute('aria-hidden', 'true');
  span.style.setProperty('--dx', `${dx}px`);
  span.style.setProperty('--dy', `${dy}px`);
  span.style.left              = `${startX}px`;
  span.style.top               = `${startY}px`;
  span.style.animationDuration = `${FLY_MS}ms`;
  span.addEventListener('animationend', () => span.remove(), { once: true });
  document.body.appendChild(span);
}

// ── Utility ───────────────────────────────────────────────────────────────────
function el(tag, className) {
  const e = document.createElement(tag);
  if (className) e.className = className.trim();
  return e;
}

// ── Boot ──────────────────────────────────────────────────────────────────────
targets = getTargets();
render();
</script>
</body>
</html>
