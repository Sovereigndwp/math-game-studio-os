<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fire Station Dispatch — Pass 3</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: linear-gradient(180deg, #1a1018 0%, #0f0d12 50%, #1a1018 100%);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 16px 8px 32px;
    }

    #root { width: 100%; max-width: 480px; }

    /* ── Root container ── */
    .fire-dispatch {
      background: #1c1418;
      color: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header / HUD ── */
    .dispatch-hud {
      background: #1a1418;
      padding: 12px 16px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #0f3460;
      gap: 8px;
    }
    .hud-title {
      font-size: 13px;
      font-weight: 700;
      color: #94a3b8;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .hud-lives {
      font-size: 18px;
      letter-spacing: 2px;
    }
    .hud-score {
      font-size: 14px;
      font-weight: 700;
      color: #f59e0b;
      background: rgba(245,158,11,0.12);
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 8px;
      padding: 3px 10px;
    }
    .hud-level {
      font-size: 12px;
      color: #64748b;
      font-weight: 600;
    }

    /* ── Timer bar ── */
    .timer-bar {
      height: 6px;
      background: #0f3460;
      position: relative;
      overflow: hidden;
    }
    .timer-fill {
      height: 100%;
      background: #22c55e;
      transition: width 1s linear, background 0.4s;
      transform-origin: left;
    }
    .timer-fill.timer-urgent {
      background: #ef4444;
      animation: timerPulse 0.5s ease-in-out infinite alternate;
    }
    @keyframes timerPulse {
      from { opacity: 1; }
      to   { opacity: 0.5; }
    }

    /* ── Mission card ── */
    .mission-card {
      background: linear-gradient(135deg, #201418 0%, #2a1018 100%);
      margin: 8px 14px 0;
      border-radius: 12px;
      padding: 10px 14px;
      border: 1px solid #1e3a5f;
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
    }
    .mission-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #ef4444, #f97316, #f59e0b);
    }
    .mission-emoji {
      font-size: 32px;
      line-height: 1;
      flex-shrink: 0;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
    }
    .mission-info { flex: 1; min-width: 0; }
    .mission-name {
      font-size: 17px;
      font-weight: 800;
      color: #f1f5f9;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mission-location {
      font-size: 12px;
      color: #94a3b8;
      font-weight: 500;
    }
    .mission-demand-block {
      text-align: center;
      flex-shrink: 0;
    }
    .demand-label {
      font-size: 10px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }
    .demand-value {
      font-size: 32px;
      font-weight: 900;
      color: #f59e0b;
      line-height: 1;
      text-shadow: 0 0 20px rgba(245,158,11,0.5);
    }
    .urgency-badge {
      position: absolute;
      top: 8px; right: 10px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 2px 7px;
      border-radius: 20px;
    }
    .urgency-high   { background: rgba(239,68,68,0.25);  color: #fca5a5; }
    .urgency-medium { background: rgba(245,158,11,0.2);  color: #fcd34d; }
    .urgency-low    { background: rgba(34,197,94,0.18);  color: #86efac; }

    /* ── Dispatch board ── */
    .dispatch-board {
      background: #0f172a;
      margin: 10px 14px;
      border-radius: 12px;
      padding: 12px 14px;
      border: 1px solid #1e293b;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .board-label {
      font-size: 10px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 1px;
      white-space: nowrap;
    }
    .board-trucks {
      display: flex;
      gap: 6px;
      flex: 1;
      flex-wrap: wrap;
      min-height: 28px;
      align-items: center;
    }
    .board-truck {
      background: #1e293b;
      border-radius: 8px;
      padding: 3px 8px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 3px;
      border: 1px solid #334155;
    }
    .board-truck-cap {
      font-size: 11px;
      font-weight: 700;
      color: #22c55e;
    }
    .board-truck-removable {
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s, border-color 0.15s;
    }
    .board-truck-removable:hover {
      opacity: 0.7;
      border-color: #ef4444;
      transform: scale(0.9);
    }
    .board-truck-removable:active { transform: scale(0.82); }
    .board-empty {
      font-size: 12px;
      color: #334155;
      font-style: italic;
    }
    .board-total-block {
      text-align: right;
      flex-shrink: 0;
    }
    .board-total {
      font-size: 30px;
      font-weight: 900;
      line-height: 1;
      transition: color 0.25s;
    }
    .board-total.total-match { color: #22c55e; text-shadow: 0 0 12px rgba(34,197,94,0.5); }
    .board-total.total-near { color: #f59e0b; text-shadow: 0 0 8px rgba(245,158,11,0.3); }
    .board-total.total-under { color: #94a3b8; }
    .board-demand {
      font-size: 13px;
      color: #94a3b8;
      font-weight: 600;
      white-space: nowrap;
    }
    .board-axis-label {
      font-size: 9px;
      color: #f59e0b;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 1px;
    }
    .board-excess {
      font-size: 11px;
      color: #ef4444;
      font-weight: 600;
    }

    /* board shake */
    @keyframes boardShake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-5px); }
      40%      { transform: translateX(5px); }
      60%      { transform: translateX(-4px); }
      80%      { transform: translateX(4px); }
    }
    .board-shaking { animation: boardShake 0.35s ease; }

    /* ── Truck yard ── */
    .truck-yard {
      flex: 1;
      padding: 4px 14px 8px;
    }
    .yard-heading {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }
    .truck-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 10px;
    }
    .truck-card {
      background: #16213e;
      border: 2px solid #1e3a5f;
      border-radius: 12px;
      padding: 12px 8px 10px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.2s, background 0.2s, box-shadow 0.2s;
      user-select: none;
      position: relative;
      -webkit-tap-highlight-color: transparent;
    }
    .truck-card:hover {
      transform: translateY(-2px);
      border-color: #3b5998;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .truck-card:active { transform: scale(0.96); }

    .truck-card.truck-selected {
      border-color: #22c55e;
      background: rgba(34,197,94,0.1);
      box-shadow: 0 0 14px rgba(34,197,94,0.25);
    }
    .truck-card.truck-selected:hover {
      border-color: #16a34a;
    }

    @keyframes truckShake {
      0%,100% { transform: translateX(0) rotate(0deg); }
      15%      { transform: translateX(-6px) rotate(-2deg); }
      30%      { transform: translateX(6px) rotate(2deg); }
      45%      { transform: translateX(-5px) rotate(-1deg); }
      60%      { transform: translateX(5px) rotate(1deg); }
      75%      { transform: translateX(-3px) rotate(0deg); }
    }
    .truck-card.truck-blocked {
      border-color: #ef4444;
      animation: truckShake 0.4s ease;
    }

    .truck-emoji {
      font-size: 36px;
      display: block;
      margin-bottom: 6px;
      line-height: 1;
    }
    .truck-label {
      font-size: 11px;
      color: #94a3b8;
      margin-bottom: 5px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .truck-capacity {
      display: inline-block;
      background: #0f3460;
      color: #f59e0b;
      font-size: 15px;
      font-weight: 900;
      border-radius: 6px;
      padding: 2px 10px;
      border: 1px solid rgba(245,158,11,0.3);
    }
    .truck-card.truck-selected .truck-capacity {
      background: #14532d;
      color: #86efac;
      border-color: rgba(34,197,94,0.4);
    }
    .truck-checkmark {
      position: absolute;
      top: 4px; right: 6px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .truck-card.truck-selected .truck-checkmark { opacity: 1; }

    /* ── Dispatch button ── */
    .dispatch-btn-wrap {
      padding: 8px 14px 14px;
      position: sticky;
      bottom: 0;
      z-index: 10;
      background: #1c1418;
    }
    .dispatch-btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 1px;
      cursor: pointer;
      transition: transform 0.12s, opacity 0.2s, box-shadow 0.2s;
      text-transform: uppercase;
    }
    .dispatch-btn:not(:disabled) {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      box-shadow: 0 4px 20px rgba(34,197,94,0.35);
    }
    .dispatch-btn:not(:disabled):hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(34,197,94,0.45);
    }
    .dispatch-btn:not(:disabled):active { transform: scale(0.97); }
    .dispatch-btn:disabled {
      background: #1e293b;
      color: #475569;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* ── Outcome overlay ── */
    .outcome-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }
    .overlay-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(3px);
    }
    .overlay-inner {
      position: relative;
      border-radius: 20px;
      padding: 32px 28px;
      text-align: center;
      width: 100%;
      max-width: 380px;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 12px 48px rgba(0,0,0,0.5);
      animation: overlayPop 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes overlayPop {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .overlay-success .overlay-inner {
      background: linear-gradient(135deg, #14532d, #166534);
      border: 2px solid #22c55e;
    }
    .overlay-timeout .overlay-inner {
      background: linear-gradient(135deg, #7c2d12, #9a3412);
      border: 2px solid #f97316;
    }
    .overlay-end .overlay-inner {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      border: 2px solid #475569;
    }
    .overlay-emoji {
      font-size: 56px;
      display: block;
      margin-bottom: 12px;
      animation: overlayBounce 0.5s ease 0.1s both;
    }
    @keyframes overlayBounce {
      0%   { transform: scale(0) rotate(-15deg); }
      60%  { transform: scale(1.2) rotate(5deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    .overlay-title {
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 6px;
    }
    .overlay-subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      line-height: 1.4;
    }
    .overlay-stats {
      margin-top: 16px;
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .overlay-stat {
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 13px;
    }
    .overlay-stat strong {
      display: block;
      font-size: 22px;
      font-weight: 900;
      color: #f59e0b;
    }

    /* streak badge */
    .streak-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(245,158,11,0.15);
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 12px;
      color: #f59e0b;
      font-weight: 700;
      margin-left: 6px;
    }

    /* start screen */
    .start-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
      gap: 16px;
    }
    .start-screen h1 {
      font-size: 26px;
      font-weight: 900;
      line-height: 1.2;
    }
    .start-screen p {
      font-size: 14px;
      color: #94a3b8;
      line-height: 1.6;
      max-width: 340px;
    }
    .start-btn {
      margin-top: 8px;
      padding: 14px 40px;
      background: linear-gradient(135deg, #ef4444, #b91c1c);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(239,68,68,0.4);
      transition: transform 0.12s, box-shadow 0.2s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(239,68,68,0.5); }
    .start-btn:active { transform: scale(0.97); }

    .play-again-btn {
      margin-top: 16px;
      padding: 13px 32px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.12s;
      text-transform: uppercase;
      letter-spacing: 1px;
      width: 100%;
    }
    .play-again-btn:hover { transform: translateY(-2px); }
    .play-again-btn:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /*
     * ─────────────────── INTERACTION CONSTRAINTS (Pass 1) ───────────────────
     *
     * selection_rule:          fixed_set_multi_select
     * item_reuse_allowed:      false  — each truck type dispatched at most once
     * selected_items_disappear: true  — truck moves from yard to dispatch queue
     * exact_match_required:    true   — fire capacity must equal fire demand exactly
     * overshoot_recovery:      blocked — cannot add a truck that would exceed demand
     *
     * skill:  resource_allocation_under_constraints
     *         NOT simple accumulation — the player must find the right COMBINATION
     *         that satisfies the incident demand exactly from the available set.
     *
     * solvability guarantee:   getSolvableDemands() ensures every generated target
     *         is reachable by at least one subset of the available trucks.
     *
     * Pass 2 extension: add Rescue demand axis → trucks gain multi-attribute
     *         capacity profiles and incidents require matching multiple categories.
     */

    /* ─────────────────── DATA ─────────────────── */
    const TRUCK_TYPES = [
      // id, emoji, short label, fire capacity (single-axis Pass 1)
      // Capacity shown as "Fire +N" in the UI to establish the attribute framing
      { id: 'hose',      emoji: '🚒', label: 'Engine',        fireCapacity: 5 },
      { id: 'ladder',    emoji: '🪜', label: 'Ladder',         fireCapacity: 3 },
      { id: 'ambulance', emoji: '🚑', label: 'Rescue Unit',   fireCapacity: 2 },
      { id: 'command',   emoji: '🚐', label: 'Command',        fireCapacity: 4 },
      { id: 'tanker',    emoji: '🚛', label: 'Tanker',         fireCapacity: 6 },
    ];

    const LEVEL_CONFIGS = [
      // L1: 3 trucks, small demands, generous timer — learn the mechanic
      { timeLimit: 20, demandRange: [4,8],   trucksAvailable: ['hose','ladder','ambulance'],                        scoreThreshold: 40,  wrongDispatchPenalty: 0 },
      // L2: add Command (+4), wider demand range, slightly tighter
      { timeLimit: 18, demandRange: [5,12],  trucksAvailable: ['hose','ladder','ambulance','command'],              scoreThreshold: 100, wrongDispatchPenalty: 2 },
      // L3: all 5 trucks, wider demands, wrong dispatch costs time
      { timeLimit: 16, demandRange: [6,15],  trucksAvailable: ['hose','ladder','ambulance','command','tanker'],     scoreThreshold: 180, wrongDispatchPenalty: 3 },
      // L4: all 5 trucks, high demands, real pressure
      { timeLimit: 14, demandRange: [8,18],  trucksAvailable: ['hose','ladder','ambulance','command','tanker'],     scoreThreshold: 280, wrongDispatchPenalty: 3 },
      // L5: all 5, highest demands, tight timer, clearable threshold
      { timeLimit: 12, demandRange: [10,20], trucksAvailable: ['hose','ladder','ambulance','command','tanker'],     scoreThreshold: 400, wrongDispatchPenalty: 4 },
    ];

    const INCIDENTS = [
      { name: 'Factory Fire',   emoji: '🏭', location: 'Industrial District', dispatchLine: 'Workers are evacuating!',       resolvedLine: 'Factory secured. Workers safe.' },
      { name: 'House Fire',     emoji: '🏠', location: 'Oak Street',          dispatchLine: 'Family trapped on second floor!', resolvedLine: 'Family rescued. House saved.' },
      { name: 'Car Accident',   emoji: '🚗', location: 'Highway 7',           dispatchLine: 'Multi-car pileup, traffic stopped.', resolvedLine: 'Road cleared. Everyone okay.' },
      { name: 'Chemical Spill', emoji: '⚗️', location: 'North Warehouse',    dispatchLine: 'Hazmat situation developing!',    resolvedLine: 'Spill contained. Area safe.' },
      { name: 'Building Fire',  emoji: '🏢', location: 'Downtown',            dispatchLine: 'Smoke visible for blocks!',       resolvedLine: 'Fire out. Building stable.' },
      { name: 'Brush Fire',     emoji: '🌿', location: 'City Park',           dispatchLine: 'Wind is spreading it fast!',      resolvedLine: 'Fire line held. Park saved.' },
    ];

    function calcStars(incidentLog) {
      const timeouts = incidentLog.filter(i => i.outcome === 'timeout').length;
      const totalOvershoots = incidentLog.reduce((s, i) => s + i.overshootAttempts, 0);
      if (timeouts === 0 && totalOvershoots === 0) return 3;
      if (timeouts <= 1 && totalOvershoots <= 3) return 2;
      return 1;
    }

    function getStarLabel(stars) {
      if (stars === 3) return { text: '★★★ Perfect Shift!', color: '#fbbf24' };
      if (stars === 2) return { text: '★★ Good Shift', color: '#d6d3d1' };
      return { text: '★ Shift Completed', color: '#a8a29e' };
    }

    function getDispatchStatus(incidentCount, streak, lives) {
      if (lives === 1) return { text: '🚨 Final life — stay sharp!', color: '#fca5a5' };
      if (streak >= 4) return { text: '🔥 On fire! Dispatch running hot!', color: '#86efac' };
      if (streak >= 2) return { text: '📻 Good coordination. Keep it up.', color: '#fbbf24' };
      if (incidentCount >= 3) return { text: '📻 Calls are stacking up...', color: '#d6d3d1' };
      if (incidentCount >= 1) return { text: '📻 First response dispatched.', color: '#a8a29e' };
      return { text: '📻 Standing by for incoming calls.', color: '#94a3b8' };
    }

    const SUCCESS_MS  = 1400;
    const TIMEOUT_MS  = 1200;

    /* ─────────────────── HELPERS ─────────────────── */
    const randInt = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
    const randPick = arr => arr[Math.floor(Math.random() * arr.length)];

    /**
     * Returns every demand value in levelConfig.demandRange that can be
     * reached by exactly choosing a non-empty subset of availableTrucks.
     * n ≤ 5 so brute-force over 2^n masks is trivial.
     */
    function getSolvableDemands(levelConfig) {
      const trucks = TRUCK_TYPES.filter(t => levelConfig.trucksAvailable.includes(t.id));
      const caps   = trucks.map(t => t.fireCapacity);
      const n      = caps.length;
      const reachable = new Set();
      for (let mask = 1; mask < (1 << n); mask++) {
        let sum = 0;
        for (let i = 0; i < n; i++) { if (mask & (1 << i)) sum += caps[i]; }
        reachable.add(sum);
      }
      const [lo, hi] = levelConfig.demandRange;
      return [...reachable].filter(s => s >= lo && s <= hi);
    }

    function generateIncident(levelConfig, lvlIdx) {
      // P2B: at L3+ (index >= 2), exclude one truck per incident to break constant-total shortcut
      let trucksForCall = levelConfig.trucksAvailable;
      let excludedTruckId = null;
      if (lvlIdx >= 2 && levelConfig.trucksAvailable.length >= 5) {
        // L5 (index 4): only exclude small trucks to keep enough solvable demands
        const excludable = lvlIdx >= 4
          ? ['ladder', 'ambulance']
          : levelConfig.trucksAvailable;
        excludedTruckId = randPick(excludable);
        trucksForCall = levelConfig.trucksAvailable.filter(id => id !== excludedTruckId);
      }

      // Generate demand from the per-incident truck subset
      const incidentConfig = { ...levelConfig, trucksAvailable: trucksForCall };
      const solvable = getSolvableDemands(incidentConfig);
      const demand   = solvable.length > 0
        ? solvable[Math.floor(Math.random() * solvable.length)]
        : levelConfig.demandRange[0];
      const base = randPick(INCIDENTS);
      return {
        ...base,
        demandValue: demand,
        urgency: Math.random() < 0.33 ? 'high' : Math.random() < 0.5 ? 'medium' : 'low',
        trucksForCall,
        excludedTruckId,
      };
    }

    function truckById(id) { return TRUCK_TYPES.find(t => t.id === id); }

    /* ─────────────────── MissionCard ─────────────────── */
    function MissionCard({ incidentName, incidentEmoji, locationName, demandValue, urgency, dispatchLine }) {
      const urgencyLabel = urgency === 'high' ? '🔴 HIGH' : urgency === 'medium' ? '🟡 MED' : '🟢 LOW';
      return (
        <div className="mission-card">
          <span className={`urgency-badge urgency-${urgency}`}>{urgencyLabel}</span>
          <span className="mission-emoji">{incidentEmoji}</span>
          <div className="mission-info">
            <div className="mission-name">{incidentName}</div>
            <div className="mission-location">📍 {locationName}</div>
            {dispatchLine && <div style={{ fontSize: 11, color: '#fca5a5', fontStyle: 'italic', marginTop: 2 }}>"{dispatchLine}"</div>}
          </div>
          <div className="mission-demand-block">
            <div className="demand-label">🔥 FIRE DEMAND</div>
            <div className="demand-value">{demandValue}</div>
          </div>
        </div>
      );
    }

    /* ─────────────────── DispatchBoard ─────────────────── */
    function DispatchBoard({ selectedTrucks, totalCapacity, demandValue, feedbackMode, boardShaking, onTruckReturn }) {
      const match = totalCapacity === demandValue;
      const gap = demandValue - totalCapacity;
      const nearMiss = !match && totalCapacity > 0 && gap > 0 && gap <= 2;
      const totalClass = `board-total ${match ? 'total-match' : nearMiss ? 'total-near' : 'total-under'}`;
      return (
        <div className={`dispatch-board${boardShaking ? ' board-shaking' : ''}`}>
          <span className="board-label">Queued — tap to return</span>
          <div className="board-trucks">
            {selectedTrucks.length === 0
              ? <span className="board-empty">tap trucks below to add</span>
              : selectedTrucks.map((t, i) => (
                  <span
                    key={i}
                    className="board-truck board-truck-removable"
                    onClick={() => onTruckReturn && onTruckReturn(t.id)}
                    title={`Return ${t.label} to yard`}
                  >
                    {t.emoji}<span className="board-truck-cap">+{t.fireCapacity}</span>
                  </span>
                ))
            }
          </div>
          <div className="board-total-block">
            <div className="board-axis-label">🔥 Fire</div>
            <div className={totalClass}>{totalCapacity}</div>
            <div className="board-demand">{nearMiss ? `${gap} away` : `of ${demandValue}`}</div>
          </div>
        </div>
      );
    }

    /* ─────────────────── TruckYard ─────────────────── */
    function TruckYard({ trucks, onTruckToggle, shakingId, excludedTruck }) {
      return (
        <div className="truck-yard">
          <div className="yard-heading">Available Units — tap to dispatch</div>
          <div className="truck-grid">
            {trucks.length === 0 && !excludedTruck
              ? <span style={{ color: '#64748b', fontSize: 13, fontStyle: 'italic' }}>All units queued ↑</span>
              : <>
                  {trucks.map(truck => {
                    const shaking  = shakingId === truck.id;
                    const cardClass = `truck-card${shaking ? ' truck-blocked' : ''}`;
                    return (
                      <div
                        key={truck.id}
                        className={cardClass}
                        onClick={() => onTruckToggle(truck.id)}
                        role="button"
                        tabIndex={0}
                        onKeyDown={e => { if (e.key === 'Enter' || e.key === ' ') onTruckToggle(truck.id); }}
                      >
                        <span className="truck-emoji">{truck.emoji}</span>
                        <div className="truck-label">{truck.label}</div>
                        <span className="truck-capacity">🔥 +{truck.fireCapacity}</span>
                      </div>
                    );
                  })}
                  {excludedTruck && (
                    <div className="truck-card" style={{ opacity: 0.3, cursor: 'not-allowed', position: 'relative' }}>
                      <span className="truck-emoji">{excludedTruck.emoji}</span>
                      <div className="truck-label">{excludedTruck.label}</div>
                      <span style={{ fontSize: 9, color: '#94a3b8', fontStyle: 'italic' }}>on another call</span>
                    </div>
                  )}
                </>
            }
          </div>
        </div>
      );
    }

    /* ─────────────────── MissionDebrief ─────────────────── */
    function MissionDebrief({ incidentLog }) {
      if (!incidentLog || incidentLog.length === 0) return null;

      const successes = incidentLog.filter(i => i.outcome === 'success');
      const timeouts  = incidentLog.filter(i => i.outcome === 'timeout');
      const totalOvershoots = incidentLog.reduce((sum, i) => sum + i.overshootAttempts, 0);
      const avgResponse = successes.length > 0
        ? Math.round(successes.reduce((sum, i) => sum + i.responseTime, 0) / successes.length)
        : null;

      // Find the hardest demand values (timed out or had overshoots)
      const troubleDemands = {};
      incidentLog.forEach(i => {
        if (i.outcome === 'timeout' || i.overshootAttempts > 0) {
          troubleDemands[i.demand] = (troubleDemands[i.demand] || 0) + 1;
        }
      });
      const hardestDemands = Object.entries(troubleDemands)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 3)
        .map(([demand, count]) => ({ demand: Number(demand), count }));

      // Generate a takeaway
      let takeaway;
      if (timeouts.length > successes.length) {
        takeaway = 'You ran out of time more than you succeeded. Try planning your truck combination before tapping — look at the demand number first, then find the match.';
      } else if (totalOvershoots > incidentLog.length) {
        takeaway = 'You hit a lot of overshoot shakes. Before adding a truck, check: will this put me over the demand? Subtract mentally first.';
      } else if (hardestDemands.length > 0 && hardestDemands[0].demand > 10) {
        takeaway = `High demands (${hardestDemands[0].demand}+) were your toughest. For big numbers, start with your largest truck and fill the gap with smaller ones.`;
      } else if (avgResponse && avgResponse > 15) {
        takeaway = 'Your decisions were careful but slow. Try to recognize common combos faster: Engine(5)+Ladder(3)=8, Ladder(3)+Rescue(2)=5.';
      } else {
        takeaway = 'Strong dispatching! To improve further, aim for faster response times and zero overshoot attempts.';
      }

      const containerStyle = {
        background: '#0f172a',
        borderRadius: 12,
        padding: '14px 16px',
        marginTop: 12,
        border: '1px solid #1e293b',
        textAlign: 'left',
        maxWidth: 360,
        marginLeft: 'auto',
        marginRight: 'auto',
      };
      const headerStyle = { fontSize: 11, color: '#f59e0b', fontWeight: 700, letterSpacing: 1.5, textTransform: 'uppercase', marginBottom: 10 };
      const rowStyle = { display: 'flex', justifyContent: 'space-between', padding: '4px 0', fontSize: 13, color: '#cbd5e1', borderBottom: '1px solid #1e293b' };
      const labelStyle = { color: '#94a3b8' };
      const valStyle = { fontWeight: 700 };
      const goodStyle = { ...valStyle, color: '#86efac' };
      const badStyle = { ...valStyle, color: '#fca5a5' };
      const warnStyle = { ...valStyle, color: '#fcd34d' };

      return React.createElement('div', { style: containerStyle }, [
        React.createElement('div', { key: 'h', style: headerStyle }, '📋 Mission Debrief'),
        React.createElement('div', { key: 'r1', style: rowStyle }, [
          React.createElement('span', { key: 'l', style: labelStyle }, 'Resolved'),
          React.createElement('span', { key: 'v', style: goodStyle }, successes.length),
        ]),
        React.createElement('div', { key: 'r2', style: rowStyle }, [
          React.createElement('span', { key: 'l', style: labelStyle }, 'Timed out'),
          React.createElement('span', { key: 'v', style: timeouts.length > 0 ? badStyle : goodStyle }, timeouts.length),
        ]),
        React.createElement('div', { key: 'r3', style: rowStyle }, [
          React.createElement('span', { key: 'l', style: labelStyle }, 'Overshoot attempts'),
          React.createElement('span', { key: 'v', style: totalOvershoots > 2 ? warnStyle : goodStyle }, totalOvershoots),
        ]),
        avgResponse !== null && React.createElement('div', { key: 'r4', style: rowStyle }, [
          React.createElement('span', { key: 'l', style: labelStyle }, 'Avg response time'),
          React.createElement('span', { key: 'v', style: avgResponse > 15 ? warnStyle : goodStyle }, `${avgResponse}s`),
        ]),
        hardestDemands.length > 0 && React.createElement('div', { key: 'r5', style: { ...rowStyle, borderBottom: 'none', flexDirection: 'column', gap: 4 } }, [
          React.createElement('span', { key: 'l', style: labelStyle }, 'Hardest demands:'),
          React.createElement('span', { key: 'v', style: { color: '#fcd34d', fontSize: 14, fontWeight: 700 } },
            hardestDemands.map(d => `🔥 ${d.demand}`).join('   ')
          ),
        ]),
        React.createElement('div', { key: 'tip', style: {
          marginTop: 10, padding: '10px 12px', background: 'rgba(245,158,11,0.08)',
          borderRadius: 8, border: '1px solid rgba(245,158,11,0.2)',
          fontSize: 12, color: '#fcd34d', lineHeight: 1.6,
        } }, [
          React.createElement('strong', { key: 's' }, '💡 Next time: '),
          takeaway,
        ]),
      ]);
    }

    /* ─────────────────── OutcomeOverlay ─────────────────── */
    function OutcomeOverlay({ feedbackMode, summaryStats, incidentLog, onPlayAgain, careerSnapshot }) {
      if (!feedbackMode) return null;

      const config = {
        success: {
          wrapClass: 'overlay-success',
          emoji: '✅',
          title: summaryStats?.resolvedLine || 'Incident Resolved!',
          subtitle: summaryStats && summaryStats.urgency === 'high'
            ? `🔴 High priority! +${summaryStats.pointsEarned} pts`
            : summaryStats && summaryStats.streak > 1
              ? `${summaryStats.streak}x streak! +${summaryStats.pointsEarned} pts`
              : `+${summaryStats ? summaryStats.pointsEarned : 10} pts`,
        },
        timeout: {
          wrapClass: 'overlay-timeout',
          emoji: '⏰',
          title: 'Too Slow!',
          subtitle: 'Incident escalated — a life lost.',
        },
        shift_end: {
          wrapClass: 'overlay-end',
          emoji: '🏁',
          title: 'Shift Over!',
          subtitle: null,
        },
      }[feedbackMode];

      if (!config) return null;

      const stars = incidentLog && incidentLog.length > 0 ? calcStars(incidentLog) : null;
      const starInfo = stars ? getStarLabel(stars) : null;

      return (
        <div className={`outcome-overlay ${config.wrapClass}`}>
          <div className="overlay-backdrop" />
          <div className="overlay-inner">
            <span className="overlay-emoji">{config.emoji}</span>
            <div className="overlay-title">{config.title}</div>
            {config.subtitle && <div className="overlay-subtitle">{config.subtitle}</div>}
            {feedbackMode === 'shift_end' && starInfo && (
              <div style={{ fontSize: 20, fontWeight: 800, color: starInfo.color, marginBottom: 8 }}>{starInfo.text}</div>
            )}
            {feedbackMode === 'shift_end' && summaryStats && (
              <>
                <div className="overlay-stats">
                  <div className="overlay-stat">
                    <strong>{summaryStats.incidentCount}</strong>
                    Incidents
                  </div>
                  <div className="overlay-stat">
                    <strong>{summaryStats.score}</strong>
                    Score
                  </div>
                  <div className="overlay-stat">
                    <strong>{summaryStats.levelIndex + 1}</strong>
                    Level
                  </div>
                </div>
                {incidentLog && React.createElement(MissionDebrief, { incidentLog: incidentLog })}
                {careerSnapshot && (
                  <div style={{
                    fontSize: 11, color: '#94a3b8', textAlign: 'center',
                    margin: '8px 0 4px', lineHeight: 1.6,
                  }}>
                    Career: <span style={{ color: '#f59e0b', fontWeight: 700 }}>{careerSnapshot.bestScore}</span> best score · <span style={{ color: '#f59e0b', fontWeight: 700 }}>{careerSnapshot.bestStreak}x</span> best streak · <span style={{ color: '#f59e0b', fontWeight: 700 }}>{careerSnapshot.totalIncidents}</span> total incidents
                  </div>
                )}
                <button className="play-again-btn" onClick={onPlayAgain}>
                  🔄 Play Again
                </button>
              </>
            )}
          </div>
        </div>
      );
    }

    /* ─────────────────── P4: Career Persistence ──────────────────── */

    const CAREER_KEY = 'fire-dispatch-career-v1';

    function loadCareer() {
      try {
        const raw = localStorage.getItem(CAREER_KEY);
        if (raw) return JSON.parse(raw);
      } catch (e) { /* ignore parse errors */ }
      return { sessions: 0, bestScore: 0, bestStreak: 0, bestLevel: 0, totalIncidents: 0 };
    }

    function saveCareer(career) {
      try { localStorage.setItem(CAREER_KEY, JSON.stringify(career)); } catch (e) { /* quota */ }
    }

    function updateCareer(score, streak, levelIndex, incidentCount) {
      const career = loadCareer();
      career.sessions += 1;
      career.bestScore = Math.max(career.bestScore, score);
      career.bestStreak = Math.max(career.bestStreak, streak);
      career.bestLevel = Math.max(career.bestLevel, levelIndex + 1);
      career.totalIncidents += incidentCount;
      saveCareer(career);
      return career;
    }

    /* ─────────────────── TUTORIAL CONFIG ─────────────────── */
    const TUTORIAL_STEPS = [
      {
        title: 'MATCH THE DEMAND',
        body: 'This fire needs 5 units of capacity. The Engine has exactly Fire +5.\nTap the Engine to select it.',
        icon: '🔥',
        incident: { name: 'House Fire', emoji: '🏠', location: 'Oak Street', demandValue: 5, urgency: 'low' },
        trucksAvailable: ['hose'],  // Engine = +5, exact match
        hint: 'Tap 🚒 Engine (Fire +5)',
        successText: 'The Engine matched exactly! That is how dispatch works.',
      },
      {
        title: 'COMBINE TRUCKS',
        body: 'This fire needs 5 units — but there is no single truck with +5.\nCombine Ladder (+3) and Rescue (+2) to reach exactly 5.',
        icon: '🧮',
        incident: { name: 'Car Accident', emoji: '🚗', location: 'Highway 7', demandValue: 5, urgency: 'medium' },
        trucksAvailable: ['ladder', 'ambulance'],  // 3+2=5
        hint: 'Tap 🪜 Ladder (+3) then 🚑 Rescue (+2)',
        successText: 'You combined two trucks to match the demand. That is the core skill.',
      },
      {
        title: 'WATCH FOR OVERSHOOT',
        body: 'The demand is 5. If you select Ladder (+3) first, then Engine (+5) would make 8 — too much!\nThe truck will shake if it would overshoot. Try it, then pick Rescue (+2) instead.',
        icon: '⚠️',
        incident: { name: 'Brush Fire', emoji: '🌿', location: 'City Park', demandValue: 5, urgency: 'low' },
        trucksAvailable: ['ladder', 'hose', 'ambulance'],  // 3+5=8 (over), 3+2=5 (exact)
        hint: 'Try 🪜 Ladder first, then see what fits',
        successText: 'You found the right combination and avoided overshoot. Ready for real incidents!',
      },
    ];

    /* ─────────────────── FireDispatchPrototype ─────────────────── */
    function FireDispatchPrototype() {
      const [started,         setStarted]         = useState(false);
      const [levelIndex,      setLevelIndex]       = useState(0);
      const [score,           setScore]            = useState(0);
      const [lives,           setLives]            = useState(3);
      const [currentIncident, setCurrentIncident]  = useState(null);
      const [dispatched,      setDispatched]       = useState([]);   // truckId[]
      const [totalCapacity,   setTotalCapacity]    = useState(0);
      const [feedbackMode,    setFeedbackMode]     = useState(null); // null|'success'|'timeout'|'shift_end'
      const [timeLeft,        setTimeLeft]         = useState(25);
      const [streak,          setStreak]           = useState(0);
      const [sessionComplete, setSessionComplete]  = useState(false);
      const [incidentCount,   setIncidentCount]    = useState(0);
      const [shakingId,       setShakingId]        = useState(null);
      const [boardShaking,    setBoardShaking]     = useState(false);
      const [lastPoints,      setLastPoints]       = useState(0);

      // Tutorial state
      const [tutorialStep,    setTutorialStep]     = useState(-1); // -1=not in tutorial, 0-2=steps
      const [tutorialDone,    setTutorialDone]     = useState(false);
      const [tutorialSuccess, setTutorialSuccess]  = useState(false); // show success text between steps

      // P4: career persistence
      const [careerSnapshot, setCareerSnapshot] = useState(null); // set when session ends
      const peakStreak = useRef(0);

      // Mission debrief — incident log
      const [incidentLog,     setIncidentLog]      = useState([]); // [{demand, outcome, responseTime, overshootAttempts, trucksUsed}]
      const incidentStartTime = useRef(Date.now());
      const overshootCount    = useRef(0);

      // derived
      const currentLevel    = LEVEL_CONFIGS[levelIndex];
      const tutorialActive  = tutorialStep >= 0 && tutorialStep < TUTORIAL_STEPS.length;
      const tutorialConfig  = tutorialActive ? TUTORIAL_STEPS[tutorialStep] : null;
      const activeTruckIds  = tutorialActive
        ? tutorialConfig.trucksAvailable
        : (currentIncident && currentIncident.trucksForCall)
          ? currentIncident.trucksForCall
          : currentLevel.trucksAvailable;
      const excludedTruck   = (!tutorialActive && currentIncident && currentIncident.excludedTruckId)
        ? truckById(currentIncident.excludedTruckId)
        : null;
      const availableTrucks = TRUCK_TYPES.filter(t => activeTruckIds.includes(t.id));
      // trucks visible in the yard = available minus those already queued on the board
      const yardTrucks      = availableTrucks.filter(t => !dispatched.includes(t.id));
      const timePercent     = tutorialActive ? 100 : (timeLeft / currentLevel.timeLimit) * 100;
      const selectedTrucks  = dispatched.map(id => truckById(id));
      const dispatchEnabled = dispatched.length > 0 && !feedbackMode;

      // refs for stable callbacks
      const feedbackRef    = useRef(feedbackMode);
      const sessionRef     = useRef(sessionComplete);
      const tutorialRef    = useRef(tutorialStep);
      feedbackRef.current  = feedbackMode;
      sessionRef.current   = sessionComplete;
      tutorialRef.current  = tutorialStep;

      /* init incident */
      const spawnIncident = useCallback((lvlIdx) => {
        const lvl = LEVEL_CONFIGS[lvlIdx];
        setCurrentIncident(generateIncident(lvl, lvlIdx));
        setDispatched([]);
        setTotalCapacity(0);
        setTimeLeft(lvl.timeLimit);
        setFeedbackMode(null);
        setBoardShaking(false);
        incidentStartTime.current = Date.now();
        overshootCount.current = 0;
      }, []);

      /* start tutorial */
      const startTutorial = () => {
        setTutorialStep(0);
        setTutorialDone(false);
        setTutorialSuccess(false);
        const step = TUTORIAL_STEPS[0];
        setCurrentIncident(step.incident);
        setDispatched([]);
        setTotalCapacity(0);
        setFeedbackMode(null);
        setStarted(true);
      };

      /* skip tutorial — for returning players */
      const skipTutorial = () => {
        setTutorialStep(-1);
        setTutorialDone(true);
        startGameDirect();
      };

      /* advance tutorial to next step or finish */
      const advanceTutorial = () => {
        setTutorialSuccess(false);
        const nextStep = tutorialStep + 1;
        if (nextStep >= TUTORIAL_STEPS.length) {
          // Tutorial complete — start real game
          setTutorialStep(-1);
          setTutorialDone(true);
          startGameDirect();
        } else {
          setTutorialStep(nextStep);
          const step = TUTORIAL_STEPS[nextStep];
          setCurrentIncident(step.incident);
          setDispatched([]);
          setTotalCapacity(0);
          setFeedbackMode(null);
        }
      };

      /* start game (direct, no tutorial) */
      const startGameDirect = () => {
        setLevelIndex(0);
        setScore(0);
        setLives(3);
        setStreak(0);
        setIncidentCount(0);
        setSessionComplete(false);
        setFeedbackMode(null);
        setIncidentLog([]);
        setCareerSnapshot(null);
        peakStreak.current = 0;
        spawnIncident(0);
        setStarted(true);
      };

      /* start game (from start screen — goes through tutorial) */
      const startGame = () => {
        startTutorial();
      };

      /* timer — does NOT run during tutorial */
      useEffect(() => {
        if (!started || feedbackRef.current !== null || sessionRef.current) return;
        if (tutorialStep >= 0) return; // tutorial = no timer
        if (timeLeft <= 0) return;
        const id = setTimeout(() => setTimeLeft(t => t - 1), 1000);
        return () => clearTimeout(id);
      }, [started, timeLeft, feedbackMode, sessionComplete, tutorialStep]);

      /* timeout handler */
      useEffect(() => {
        if (!started || timeLeft !== 0 || feedbackRef.current !== null || sessionRef.current) return;
        if (tutorialRef.current >= 0) return; // no timeout during tutorial
        // time ran out — log for debrief
        if (currentIncident) {
          setIncidentLog(prev => [...prev, {
            demand: currentIncident.demandValue,
            outcome: 'timeout',
            responseTime: currentLevel.timeLimit,
            overshootAttempts: overshootCount.current,
            trucksUsed: dispatched.length,
          }]);
        }
        setStreak(0);
        setLives(prev => {
          const next = prev - 1;
          if (next <= 0) {
            setSessionComplete(true);
            setFeedbackMode('shift_end');
          } else {
            setFeedbackMode('timeout');
          }
          return next;
        });
      }, [started, timeLeft]);

      /* auto-advance after timeout feedback */
      useEffect(() => {
        if (feedbackMode !== 'timeout') return;
        const id = setTimeout(() => {
          setLevelIndex(prev => {
            spawnIncident(prev);
            return prev;
          });
        }, TIMEOUT_MS);
        return () => clearTimeout(id);
      }, [feedbackMode]);

      /* P4: save career when session ends */
      useEffect(() => {
        if (!sessionComplete) return;
        const updated = updateCareer(score, peakStreak.current, levelIndex, incidentCount);
        setCareerSnapshot(updated);
      }, [sessionComplete]);

      /* truck toggle */
      const handleTruckToggle = useCallback((truckId) => {
        if (feedbackRef.current !== null) return;
        const truck = truckById(truckId);
        if (!truck) return;

        setDispatched(prev => {
          if (prev.includes(truckId)) {
            // deselect
            const next = prev.filter(id => id !== truckId);
            setTotalCapacity(next.reduce((sum, id) => sum + truckById(id).fireCapacity, 0));
            return next;
          } else {
            const tentative = prev.reduce((sum, id) => sum + truckById(id).fireCapacity, 0) + truck.fireCapacity;
            const demand = currentIncident ? currentIncident.demandValue : 0;
            if (tentative > demand) {
              // overshoot prevention — shake truck
              setShakingId(truckId);
              setTimeout(() => setShakingId(null), 420);
              overshootCount.current++;
              return prev; // unchanged
            }
            const next = [...prev, truckId];
            setTotalCapacity(tentative);
            return next;
          }
        });
      }, [currentIncident]);

      /* dispatch */
      const handleDispatch = useCallback(() => {
        if (feedbackRef.current !== null) return;
        if (dispatched.length === 0) return;
        const demand = currentIncident ? currentIncident.demandValue : 0;
        if (totalCapacity === demand) {
          // Tutorial success — show message, don't score
          if (tutorialRef.current >= 0) {
            setTutorialSuccess(true);
            return;
          }
          // Scoring: base 20 + time bonus (remaining seconds) + streak + urgency
          const timeBonus = Math.max(0, timeLeft);
          const streakBonus = Math.min(streak * 5, 25); // cap at 25
          const urgencyMult = currentIncident.urgency === 'high' ? 1.5
                            : currentIncident.urgency === 'low'  ? 0.8
                            : 1.0;
          const pts = Math.round((20 + timeBonus + streakBonus) * urgencyMult);
          setLastPoints(pts);
          setScore(s => {
            const newScore = s + pts;
            return newScore;
          });
          const newStreak = streak + 1;
          setStreak(newStreak);
          if (newStreak > peakStreak.current) peakStreak.current = newStreak;
          const newCount = incidentCount + 1;
          setIncidentCount(newCount);
          setFeedbackMode('success');

          // Log this incident for debrief
          setIncidentLog(prev => [...prev, {
            demand: demand,
            outcome: 'success',
            responseTime: Math.round((Date.now() - incidentStartTime.current) / 1000),
            overshootAttempts: overshootCount.current,
            trucksUsed: dispatched.length,
          }]);

          setTimeout(() => {
            setScore(prevScore => {
              setLevelIndex(prevLevel => {
                const lvl = LEVEL_CONFIGS[prevLevel];
                let nextLevel = prevLevel;
                // prevScore is already post-pts (first setScore applied before setTimeout fired)
                if (prevScore >= lvl.scoreThreshold) {
                  if (prevLevel < 4) {
                    nextLevel = prevLevel + 1;
                  } else {
                    // L5 cleared — session victory
                    setSessionComplete(true);
                    setFeedbackMode('shift_end');
                    return prevLevel;
                  }
                }
                spawnIncident(nextLevel);
                return nextLevel;
              });
              return prevScore; // score already updated above
            });
          }, SUCCESS_MS);
        } else {
          // Wrong dispatch — shake board and penalize time
          setBoardShaking(true);
          setTimeout(() => setBoardShaking(false), 400);
          const penalty = currentLevel.wrongDispatchPenalty || 0;
          if (penalty > 0 && tutorialRef.current < 0) {
            setTimeLeft(prev => Math.max(0, prev - penalty));
            overshootCount.current++;
          }
        }
      }, [dispatched, totalCapacity, currentIncident, streak, incidentCount, spawnIncident]);

      /* ── start screen ── */
      if (!started) {
        const career = loadCareer();
        const hasCareer = career.sessions > 0;
        return (
          <div className="fire-dispatch">
            <div className="start-screen">
              <div style={{ fontSize: 72 }}>🚒</div>
              <h1>Fire Station<br/>Dispatch</h1>
              <p style={{ maxWidth: 340, lineHeight: 1.7 }}>
                Match truck capacity to fire demand.
                <br/>Combine trucks until the total hits the target exactly.
              </p>
              {hasCareer && (
                <div style={{
                  background: '#0f172a', border: '1px solid #1e293b', borderRadius: 12,
                  padding: '12px 16px', margin: '12px 0', maxWidth: 300, width: '100%',
                }}>
                  <div style={{ fontSize: 10, color: '#f59e0b', fontWeight: 700, letterSpacing: 2, textTransform: 'uppercase', marginBottom: 8 }}>Career Record</div>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '6px 12px', fontSize: 12 }}>
                    <div style={{ color: '#94a3b8' }}>Best Score</div>
                    <div style={{ color: '#e2e8f0', fontWeight: 700, textAlign: 'right' }}>{career.bestScore}</div>
                    <div style={{ color: '#94a3b8' }}>Best Streak</div>
                    <div style={{ color: '#e2e8f0', fontWeight: 700, textAlign: 'right' }}>{career.bestStreak}x</div>
                    <div style={{ color: '#94a3b8' }}>Best Level</div>
                    <div style={{ color: '#e2e8f0', fontWeight: 700, textAlign: 'right' }}>L{career.bestLevel}</div>
                    <div style={{ color: '#94a3b8' }}>Incidents</div>
                    <div style={{ color: '#e2e8f0', fontWeight: 700, textAlign: 'right' }}>{career.totalIncidents}</div>
                    <div style={{ color: '#94a3b8' }}>Shifts</div>
                    <div style={{ color: '#e2e8f0', fontWeight: 700, textAlign: 'right' }}>{career.sessions}</div>
                  </div>
                </div>
              )}
              <button className="start-btn" onClick={startGame}>Learn the Basics →</button>
              {tutorialDone && (
                <button
                  className="start-btn"
                  style={{ background: 'transparent', border: '1px solid #334155', color: '#94a3b8', marginTop: 8 }}
                  onClick={skipTutorial}
                >
                  Skip Tutorial — Start Shift
                </button>
              )}
            </div>
          </div>
        );
      }

      const livesDisplay = Array.from({ length: 3 }, (_, i) => i < lives ? '❤️' : '🖤').join('');

      return (
        <div className="fire-dispatch">
          {/* HUD */}
          <div className="dispatch-hud">
            <div>
              <div className="hud-title">{tutorialActive ? '📋 Tutorial' : '🚨 Dispatch'}</div>
              <div className="hud-level">{tutorialActive ? `Step ${tutorialStep + 1} / ${TUTORIAL_STEPS.length}` : `Level ${levelIndex + 1} / 5`}</div>
            </div>
            {!tutorialActive && (
              <>
                <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2 }}>
                  <div className="hud-lives">{livesDisplay}</div>
                </div>
                <div style={{ textAlign: 'right' }}>
                  <div className="hud-score">Score: {score}</div>
                  {streak > 1 && (
                    <span className="streak-badge">🔥 {streak}x</span>
                  )}
                </div>
              </>
            )}
          </div>

          {/* Timer — hidden during tutorial */}
          {!tutorialActive && (
            <div className="timer-bar">
              <div
                className={`timer-fill${timeLeft < 5 ? ' timer-urgent' : ''}`}
                style={{ width: `${timePercent}%` }}
              />
            </div>
          )}

          {/* Dispatch status strip */}
          {!tutorialActive && (() => {
            const status = getDispatchStatus(incidentCount, streak, lives);
            return (
              <div style={{
                textAlign: 'center', fontSize: 12, padding: '4px 12px',
                color: status.color, background: '#0f172a',
                borderBottom: '1px solid #1e293b',
              }}>
                {status.text}
              </div>
            );
          })()}

          {/* Tutorial instruction panel */}
          {tutorialActive && tutorialConfig && (
            <div style={{
              background: 'linear-gradient(135deg, #1e293b 0%, #0f172a 100%)',
              margin: '0 14px',
              borderRadius: '0 0 14px 14px',
              padding: '14px 18px',
              borderBottom: '2px solid #f59e0b',
              textAlign: 'center',
            }}>
              <div style={{ fontSize: 11, color: '#f59e0b', fontWeight: 700, letterSpacing: 2, textTransform: 'uppercase', marginBottom: 6 }}>
                Tutorial {tutorialStep + 1} / {TUTORIAL_STEPS.length} — {tutorialConfig.title}
              </div>
              <div style={{ fontSize: 14, color: '#e2e8f0', lineHeight: 1.6, whiteSpace: 'pre-line', marginBottom: 8 }}>
                {tutorialConfig.body}
              </div>
              <div style={{ fontSize: 12, color: '#94a3b8', fontStyle: 'italic' }}>
                {tutorialConfig.hint}
              </div>
              {/* No timer text — just a calm "take your time" */}
              <div style={{ fontSize: 11, color: '#475569', marginTop: 8 }}>
                ⏸ No timer — take your time
              </div>
            </div>
          )}

          {/* Tutorial success overlay */}
          {tutorialActive && tutorialSuccess && (
            <div style={{
              position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
              background: 'rgba(0,0,0,0.75)',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              zIndex: 100,
            }}>
              <div style={{
                background: '#1e293b', borderRadius: 16, padding: '28px 24px',
                textAlign: 'center', maxWidth: 360, border: '1px solid #22c55e',
                boxShadow: '0 0 30px rgba(34,197,94,0.2)',
              }}>
                <div style={{ fontSize: 48, marginBottom: 12 }}>✅</div>
                <div style={{ fontSize: 16, fontWeight: 700, color: '#86efac', marginBottom: 8 }}>
                  {tutorialConfig.successText}
                </div>
                <button
                  className="start-btn"
                  style={{ marginTop: 12, fontSize: 14, padding: '10px 28px' }}
                  onClick={advanceTutorial}
                >
                  {tutorialStep < TUTORIAL_STEPS.length - 1 ? 'Next Lesson →' : 'Start Your Shift! 🚒'}
                </button>
              </div>
            </div>
          )}

          {/* Mission */}
          {currentIncident && (
            <MissionCard
              incidentName={currentIncident.name}
              incidentEmoji={currentIncident.emoji}
              locationName={currentIncident.location}
              demandValue={currentIncident.demandValue}
              urgency={currentIncident.urgency}
              dispatchLine={currentIncident.dispatchLine}
            />
          )}

          {/* Dispatch board — tap a truck chip here to return it to the yard */}
          <DispatchBoard
            selectedTrucks={selectedTrucks}
            totalCapacity={totalCapacity}
            demandValue={currentIncident ? currentIncident.demandValue : 0}
            feedbackMode={feedbackMode}
            boardShaking={boardShaking}
            onTruckReturn={handleTruckToggle}
          />

          {/* Truck yard — only shows trucks NOT yet queued */}
          <TruckYard
            trucks={yardTrucks}
            onTruckToggle={handleTruckToggle}
            shakingId={shakingId}
            excludedTruck={excludedTruck}
          />

          {/* Dispatch button */}
          <div className="dispatch-btn-wrap">
            <button
              className="dispatch-btn"
              disabled={dispatched.length === 0 || !!feedbackMode}
              onClick={handleDispatch}
            >
              {totalCapacity === (currentIncident ? currentIncident.demandValue : -1) && dispatched.length > 0
                ? (tutorialActive ? '✅ TRY IT!' : '✅ DISPATCH!')
                : `${tutorialActive ? 'SELECT' : 'DISPATCH'}  (${totalCapacity} / ${currentIncident ? currentIncident.demandValue : '?'})`
              }
            </button>
          </div>

          {/* Outcome overlay */}
          <OutcomeOverlay
            feedbackMode={sessionComplete ? 'shift_end' : feedbackMode === 'shift_end' ? 'shift_end' : feedbackMode}
            summaryStats={{
              incidentCount,
              score,
              levelIndex,
              streak,
              pointsEarned: lastPoints,
              urgency: currentIncident ? currentIncident.urgency : null,
              resolvedLine: currentIncident ? currentIncident.resolvedLine : null,
            }}
            incidentLog={incidentLog}
            onPlayAgain={startGame}
            careerSnapshot={careerSnapshot}
          />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<FireDispatchPrototype />);
  </script>
</body>
</html>
