<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Power Grid Operator — P1</title>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0f1a; color: #e2e8f0; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; justify-content: center; padding: 16px; }
  #root { width: 100%; max-width: 600px; }
  .grid-game { display: flex; flex-direction: column; align-items: center; gap: 14px; }

  .hud { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 10px 16px; background: rgba(10,20,40,0.95); border: 1px solid #1e3a5f; border-radius: 10px; }
  .hud-title { font-size: 14px; font-weight: 700; color: #22c55e; letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 0 8px rgba(34,197,94,0.4); }
  .hud-stat { font-size: 12px; color: #94a3b8; }
  .hud-stat span { color: #fbbf24; font-weight: 700; font-size: 16px; }

  .status-strip { text-align: center; font-size: 13px; padding: 6px 16px; border-radius: 999px; background: rgba(10,20,40,0.8); border: 1px solid #1e3a5f; font-weight: 600; }
  .radio { font-size: 11px; color: #64748b; font-style: italic; text-align: center; min-height: 16px; }
  .radio.alert { color: #ef4444; font-style: normal; font-weight: 600; }
  .radio.success { color: #22c55e; }
  .radio.warn { color: #f59e0b; }

  .district { background: rgba(15,25,45,0.95); border: 2px solid #1e3a5f; border-radius: 14px; padding: 16px 20px; width: 100%; transition: all 0.4s; position: relative; }
  .district.powered { border-color: #22c55e; box-shadow: 0 0 24px rgba(34,197,94,0.25); }
  .district.degrading { border-color: #f59e0b; animation: flicker 1.5s ease-in-out infinite; }
  .district.blackout { border-color: #ef4444; box-shadow: 0 0 20px rgba(239,68,68,0.2); opacity: 0.5; }
  @keyframes flicker { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }

  .district-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .district-name { font-size: 16px; font-weight: 700; }
  .district-demand { font-size: 13px; color: #fbbf24; font-weight: 600; }
  .priority-badge { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; margin-left: 8px; }
  .priority-badge.critical { background: rgba(239,68,68,0.15); color: #ef4444; }
  .priority-badge.standard { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .status-badge { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; margin-left: 6px; }
  .status-badge.ok { background: rgba(34,197,94,0.15); color: #22c55e; }
  .status-badge.warn { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .status-badge.dark { background: rgba(239,68,68,0.15); color: #ef4444; }

  .stability-bar { height: 4px; background: #1e293b; border-radius: 2px; overflow: hidden; margin: 6px 0; }
  .stability-fill { height: 100%; border-radius: 2px; transition: width 1s linear, background 0.3s; }

  .equation-block { background: #0f1729; border: 1px solid #1e3a5f; border-radius: 10px; padding: 14px; margin: 8px 0; text-align: center; }
  .equation-text { font-size: 22px; font-weight: 800; letter-spacing: 2px; }
  .equation-text .unknown { color: #fbbf24; text-shadow: 0 0 8px rgba(251,191,36,0.4); }

  .sources { display: flex; gap: 8px; flex-wrap: wrap; margin: 6px 0; }
  .source-chip { background: #0f1729; border: 1px solid #334155; border-radius: 8px; padding: 5px 10px; font-size: 11px; display: flex; align-items: center; gap: 5px; }
  .source-chip .val { color: #22c55e; font-weight: 700; }

  .solve-row { display: flex; gap: 8px; align-items: center; justify-content: center; margin-top: 8px; }
  .solve-input { width: 80px; padding: 8px 12px; font-size: 18px; font-weight: 700; text-align: center; background: #0a0f1a; border: 2px solid #334155; border-radius: 8px; color: #fbbf24; outline: none; }
  .solve-input:focus { border-color: #fbbf24; box-shadow: 0 0 8px rgba(251,191,36,0.3); }
  .solve-btn { padding: 8px 20px; font-size: 14px; font-weight: 700; background: #22c55e; color: #0a0f1a; border: none; border-radius: 8px; cursor: pointer; }
  .solve-btn:hover { background: #16a34a; }
  .solve-btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

  .route-btn { padding: 10px 24px; font-size: 14px; font-weight: 700; background: #3b82f6; color: #fff; border: none; border-radius: 8px; cursor: pointer; margin-top: 4px; }
  .route-btn:hover { background: #2563eb; }

  .feedback { text-align: center; padding: 8px; border-radius: 8px; font-size: 12px; font-weight: 600; margin-top: 4px; }
  .feedback.correct { background: rgba(34,197,94,0.1); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
  .feedback.wrong { background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }

  .deficit-warning { text-align: center; font-size: 12px; color: #f59e0b; font-weight: 600; padding: 10px; background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.2); border-radius: 8px; }

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .overlay-card { background: #0f1729; border: 2px solid #22c55e; border-radius: 16px; padding: 32px; max-width: 440px; text-align: center; }
  .overlay-card h2 { color: #22c55e; font-size: 20px; margin-bottom: 8px; text-shadow: 0 0 12px rgba(34,197,94,0.4); }
  .overlay-card.failed { border-color: #f59e0b; }
  .overlay-card.failed h2 { color: #f59e0b; text-shadow: 0 0 12px rgba(245,158,11,0.4); }
  .stat-line { font-size: 13px; color: #94a3b8; margin: 4px 0; }
  .stat-line span { color: #fbbf24; font-weight: 700; }
  .triage-line { font-size: 12px; margin: 6px 0; padding: 8px; border-radius: 6px; }
  .triage-line.saved { background: rgba(34,197,94,0.08); color: #22c55e; border: 1px solid rgba(34,197,94,0.2); }
  .triage-line.lost { background: rgba(239,68,68,0.08); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }
  .next-btn { margin-top: 16px; padding: 10px 28px; font-size: 14px; font-weight: 700; background: #22c55e; color: #0a0f1a; border: none; border-radius: 8px; cursor: pointer; }
  .next-btn:hover { background: #16a34a; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── Level Configs ───────────────────────────────────────────────────────────

const LEVELS = [
  {
    level: 1, name: 'Training Shift', subtitle: 'One district, no timer',
    districts: [
      { id: 'downtown', name: 'Downtown', emoji: '🏙️', demand: null, priority: 'standard', stabilityTime: null },
    ],
    sources: [
      { id: 'wind', name: 'Wind Farm', emoji: '🌬️', fixed: true },
      { id: 'battery', name: 'Battery', emoji: '🔋', fixed: false },
    ],
    totalExtra: null, // unlimited — single district, always solvable
  },
  {
    level: 2, name: 'Harbor Shift', subtitle: 'Soft timer — 60 seconds',
    globalTimer: 60,
    districts: [
      { id: 'harbor', name: 'Harbor District', emoji: '⚓', demand: null, priority: 'standard', stabilityTime: null },
    ],
    sources: [
      { id: 'solar', name: 'Solar Array', emoji: '☀️', fixed: true },
      { id: 'battery', name: 'Battery', emoji: '🔋', fixed: false },
    ],
    totalExtra: null,
  },
  {
    level: '3A', name: 'Scarcity Tutorial', subtitle: 'Two districts — not enough for both. No timer.',
    districts: [
      { id: 'hospital', name: 'Hospital', emoji: '🏥', demand: 8, priority: 'critical', knownPower: 3, stabilityTime: null },
      { id: 'homes', name: 'Residential', emoji: '🏘️', demand: 6, priority: 'standard', knownPower: 2, stabilityTime: null },
    ],
    sources: [
      { id: 'solar', name: 'Solar Array', emoji: '☀️', fixed: true },
      { id: 'wind', name: 'Wind Farm', emoji: '🌬️', fixed: true },
      { id: 'battery', name: 'Battery Reserve', emoji: '🔋', fixed: false },
    ],
    totalExtra: 7, // hospital needs 5, homes needs 4, total needed = 9, available = 7
    scarcity: true,
  },
  {
    level: '3B', name: 'Triage Shift', subtitle: 'Two districts, real pressure. Choose wisely.',
    districts: [
      { id: 'hospital', name: 'Hospital', emoji: '🏥', demand: 10, priority: 'critical', knownPower: 4, stabilityTime: 20 },
      { id: 'transit', name: 'Transit Station', emoji: '🚉', demand: 9, priority: 'standard', knownPower: 5, stabilityTime: 30 },
    ],
    sources: [
      { id: 'wind', name: 'Wind Farm', emoji: '🌬️', fixed: true },
      { id: 'solar', name: 'Solar Array', emoji: '☀️', fixed: true },
      { id: 'battery', name: 'Battery Reserve', emoji: '🔋', fixed: false },
    ],
    totalExtra: 8, // hospital needs 6, transit needs 4, total needed = 10, available = 8
    scarcity: true,
  },
];

// ─── Generate round ──────────────────────────────────────────────────────────

function generateRound(cfg) {
  if (cfg.scarcity) {
    // Fixed scarcity levels — demands are preset
    const districts = cfg.districts.map(d => ({
      ...d,
      known: d.knownPower,
      needed: d.demand - d.knownPower,
      solved: false, routed: false, blackout: false,
      stability: d.stabilityTime || null,
      maxStability: d.stabilityTime || null,
    }));

    // Split fixed sources: assign known power values
    // For scarcity levels, known sources sum to district.knownPower
    const fixedSources = cfg.sources.filter(s => s.fixed);
    const srcValues = [];
    let remaining = districts.reduce((s, d) => s + d.known, 0);
    fixedSources.forEach((s, i) => {
      if (i === fixedSources.length - 1) {
        srcValues.push({ ...s, output: remaining });
      } else {
        const val = Math.floor(remaining / (fixedSources.length - i));
        srcValues.push({ ...s, output: val });
        remaining -= val;
      }
    });

    return {
      districts,
      fixedSources: srcValues,
      unknownSource: cfg.sources.find(s => !s.fixed),
      totalExtra: cfg.totalExtra,
      scarcity: true,
    };
  }

  // L1/L2: single district, random demand
  const d = cfg.districts[0];
  const demand = 10 + Math.floor(Math.random() * 7); // 10-16
  const knownVal = 3 + Math.floor(Math.random() * 5); // 3-7

  return {
    districts: [{
      ...d, demand, known: knownVal, needed: demand - knownVal,
      solved: false, routed: false, blackout: false,
      stability: null, maxStability: null,
    }],
    fixedSources: [{ ...cfg.sources.find(s => s.fixed), output: knownVal }],
    unknownSource: cfg.sources.find(s => !s.fixed),
    totalExtra: null,
    scarcity: false,
  };
}

// ─── Main Component ──────────────────────────────────────────────────────────

function PowerGridPrototype() {
  const [screen, setScreen] = useState('menu');
  const [levelIdx, setLevelIdx] = useState(0);
  const [round, setRound] = useState(null);
  const [inputVal, setInputVal] = useState('');
  const [activeIdx, setActiveIdx] = useState(0);
  const [feedback, setFeedback] = useState(null);
  const [score, setScore] = useState(0);
  const [radio, setRadio] = useState({ text: '', cls: '' });
  const [showOverlay, setShowOverlay] = useState(false);
  const [overlayData, setOverlayData] = useState(null);
  const [globalTimer, setGlobalTimer] = useState(null);
  const [powerUsed, setPowerUsed] = useState(0);
  const routeOrder = useRef([]);

  const cfg = LEVELS[levelIdx];

  function startLevelByIdx(idx) {
    const c = LEVELS[idx];
    const r = generateRound(c);
    setLevelIdx(idx);
    setRound(r);
    setInputVal('');
    setActiveIdx(0);
    setFeedback(null);
    setScore(0);
    setRadio({ text: '', cls: '' });
    setShowOverlay(false);
    setOverlayData(null);
    setGlobalTimer(c.globalTimer || null);
    setPowerUsed(0);
    routeOrder.current = [];
    setScreen('playing');
  }

  // Global timer countdown
  useEffect(() => {
    if (screen !== 'playing' || globalTimer === null || globalTimer <= 0) return;
    const id = setTimeout(() => setGlobalTimer(t => t - 1), 1000);
    return () => clearTimeout(id);
  }, [screen, globalTimer]);

  // Global timer expiry
  useEffect(() => {
    if (globalTimer === 0 && screen === 'playing') finishShift();
  }, [globalTimer, screen]);

  // District stability timers (L3B)
  useEffect(() => {
    if (screen !== 'playing' || !round) return;
    const hasTimers = round.districts.some(d => d.stability !== null && d.stability > 0 && !d.routed && !d.blackout);
    if (!hasTimers) return;
    const id = setInterval(() => {
      setRound(prev => {
        if (!prev) return prev;
        let changed = false;
        const updated = { ...prev, districts: prev.districts.map(d => {
          if (d.stability !== null && d.stability > 0 && !d.routed && !d.blackout) {
            changed = true;
            const next = d.stability - 1;
            if (next <= 0) {
              setRadio({ text: `🚨 "${d.name} — BLACKOUT! Power failed!"`, cls: 'alert' });
              return { ...d, stability: 0, blackout: true };
            }
            return { ...d, stability: next };
          }
          return d;
        })};
        // Auto-finish if all districts are resolved
        const allDone = updated.districts.every(d => d.routed || d.blackout);
        if (allDone && changed) setTimeout(() => finishShift(), 1000);
        return updated;
      });
    }, 1000);
    return () => clearInterval(id);
  }, [screen, round?.districts.map(d => d.routed + '/' + d.blackout).join(',')]);

  function finishShift() {
    if (!round) return;
    const saved = round.districts.filter(d => d.routed);
    const lost = round.districts.filter(d => !d.routed);
    setOverlayData({ saved, lost, score, routeOrder: [...routeOrder.current] });
    setShowOverlay(true);
    setScreen('complete');
  }

  function handleSolve() {
    if (!round || !inputVal) return;
    const d = round.districts[activeIdx];
    const answer = parseInt(inputVal, 10);

    if (answer === d.needed) {
      setScore(s => s + 100);
      setRound(prev => {
        const updated = { ...prev, districts: prev.districts.map((dd, i) =>
          i === activeIdx ? { ...dd, solved: true, solvedVal: answer } : dd
        )};
        return updated;
      });
      setFeedback({ type: 'correct', msg: `✓ ${answer} MW — correct!`, districtId: d.id });
      setRadio({ text: `📻 "${d.name} — solution confirmed. Route when ready."`, cls: 'success' });
    } else {
      setScore(s => s - 20);
      setFeedback({ type: 'wrong', msg: `✗ Not ${answer}. Check: ${d.known} + ? = ${d.demand}`, districtId: d.id });
      setRadio({ text: `📻 "${d.name} — that won't balance. Recalculate!"`, cls: 'alert' });
    }
    setInputVal('');
  }

  function handleRoute(districtId) {
    const d = round.districts.find(dd => dd.id === districtId);
    const powerCost = d.solvedVal || d.needed;

    if (round.scarcity && powerUsed + powerCost > round.totalExtra) {
      setRadio({ text: `⚠️ Not enough reserve power! Only ${round.totalExtra - powerUsed} MW left.`, cls: 'warn' });
      return;
    }

    setPowerUsed(prev => prev + powerCost);
    routeOrder.current.push(districtId);
    setScore(s => s + 40);

    setRound(prev => {
      const updated = { ...prev, districts: prev.districts.map(dd =>
        dd.id === districtId ? { ...dd, routed: true } : dd
      )};

      // Check remaining districts
      const unsaved = updated.districts.filter(dd => !dd.routed && !dd.blackout);
      if (unsaved.length === 0) {
        setTimeout(() => finishShift(), 800);
      } else if (round.scarcity) {
        const remainingPower = round.totalExtra - (powerUsed + powerCost);
        const remainingNeed = unsaved.reduce((s, dd) => s + dd.needed, 0);
        if (remainingPower < remainingNeed && unsaved.length > 0) {
          const names = unsaved.map(dd => dd.name).join(', ');
          setRadio({ text: `⚠️ Not enough power for ${names}. ${remainingPower} MW left, need ${remainingNeed}.`, cls: 'warn' });
          // Mark remaining as blacked out after a delay
          setTimeout(() => {
            setRound(prev2 => {
              if (!prev2) return prev2;
              return { ...prev2, districts: prev2.districts.map(dd =>
                !dd.routed && !dd.blackout ? { ...dd, blackout: true } : dd
              )};
            });
            setTimeout(() => finishShift(), 1000);
          }, 1500);
        }
      }
      return updated;
    });

    setRadio({ text: `📻 "${d.name} — power restored! Grid holding."`, cls: 'success' });
    setFeedback(null);

    // Move to next unsolved district
    const nextIdx = round.districts.findIndex((dd, i) => i !== activeIdx && !dd.routed && !dd.blackout && !dd.solved);
    if (nextIdx >= 0) setActiveIdx(nextIdx);
  }

  // ── Menu ──
  if (screen === 'menu') {
    return (
      <div className="grid-game">
        <div style={{ textAlign: 'center', marginTop: 40 }}>
          <div style={{ fontSize: 48 }}>⚡</div>
          <h1 style={{ color: '#22c55e', fontSize: 24, marginTop: 8, textShadow: '0 0 16px rgba(34,197,94,0.4)', letterSpacing: 3 }}>POWER GRID</h1>
          <h2 style={{ color: '#94a3b8', fontSize: 14, letterSpacing: 2, fontWeight: 400 }}>OPERATOR</h2>
          <p style={{ color: '#64748b', fontSize: 13, maxWidth: 340, margin: '16px auto', lineHeight: 1.7 }}>
            Keep the city powered. Solve the missing value. Route electricity before the lights go out.
          </p>
        </div>
        {LEVELS.map((lv, i) => (
          <button key={i} onClick={() => startLevelByIdx(i)} style={{
            width: '100%', padding: '14px 20px', background: 'rgba(15,25,45,0.95)',
            border: '1px solid #1e3a5f', borderRadius: 10, cursor: 'pointer',
            textAlign: 'left', color: '#e2e8f0', display: 'flex', justifyContent: 'space-between', alignItems: 'center',
          }}>
            <div>
              <div style={{ fontSize: 14, fontWeight: 700 }}>Level {lv.level} — {lv.name}</div>
              <div style={{ fontSize: 11, color: '#64748b', marginTop: 2 }}>{lv.subtitle}</div>
            </div>
            <div style={{ fontSize: 11, color: '#22c55e', fontWeight: 600 }}>▶ PLAY</div>
          </button>
        ))}
        <div style={{ fontSize: 10, color: '#334155', textAlign: 'center', marginTop: 8 }}>Power Grid Operator — P1 Prototype</div>
      </div>
    );
  }

  if (!round) return null;

  // ── Playing ──
  const timerPct = globalTimer !== null && cfg.globalTimer ? (globalTimer / cfg.globalTimer) * 100 : 100;

  return (
    <div className="grid-game">
      <div className="hud">
        <div className="hud-title">⚡ Power Grid</div>
        <div style={{ display: 'flex', gap: 16 }}>
          <div className="hud-stat">LVL <span>{cfg.level}</span></div>
          <div className="hud-stat">SCORE <span>{score}</span></div>
          {globalTimer !== null && (
            <div className="hud-stat" style={{ color: globalTimer <= 15 ? '#ef4444' : undefined }}>
              ⏱️ <span style={{ color: globalTimer <= 15 ? '#ef4444' : '#fbbf24' }}>{globalTimer}s</span>
            </div>
          )}
          {round.scarcity && (
            <div className="hud-stat">RESERVE <span style={{ color: round.totalExtra - powerUsed <= 2 ? '#ef4444' : '#22c55e' }}>{round.totalExtra - powerUsed} MW</span></div>
          )}
        </div>
      </div>

      {globalTimer !== null && (
        <div style={{ width: '100%', height: 5, background: '#1e293b', borderRadius: 3, overflow: 'hidden' }}>
          <div style={{ width: `${timerPct}%`, height: '100%', background: globalTimer <= 15 ? '#ef4444' : timerPct > 50 ? '#22c55e' : '#f59e0b', transition: 'width 1s linear', borderRadius: 3 }} />
        </div>
      )}

      <div className="status-strip" style={{ color: round.scarcity ? '#f59e0b' : '#22c55e' }}>
        {round.scarcity
          ? `⚠️ Limited power — ${round.totalExtra} MW reserve for ${round.districts.length} districts`
          : '🌙 Grid active. Solve and route.'
        }
      </div>

      <div className="radio" style={{ color: radio.cls === 'alert' ? '#ef4444' : radio.cls === 'success' ? '#22c55e' : radio.cls === 'warn' ? '#f59e0b' : '#64748b' }}>
        {radio.text}
      </div>

      {/* District cards */}
      {round.districts.map((d, i) => {
        const isActive = i === activeIdx && !d.routed && !d.blackout;
        const dClass = d.routed ? 'powered' : d.blackout ? 'blackout' : (d.stability !== null && d.stability < 8) ? 'degrading' : '';

        return (
          <div key={d.id} className={`district ${dClass}`}
            onClick={() => { if (!d.routed && !d.blackout) { setActiveIdx(i); setFeedback(null); setInputVal(''); } }}
            style={{ cursor: !d.routed && !d.blackout ? 'pointer' : 'default' }}
          >
            <div className="district-header">
              <div style={{ display: 'flex', alignItems: 'center' }}>
                <span className="district-name">{d.emoji} {d.name}</span>
                <span className={`priority-badge ${d.priority}`}>{d.priority}</span>
              </div>
              <div style={{ display: 'flex', alignItems: 'center' }}>
                <span className="district-demand">DEMAND: {d.demand} MW</span>
                {d.routed && <span className="status-badge ok">⚡ POWERED</span>}
                {d.blackout && <span className="status-badge dark">⛔ BLACKOUT</span>}
                {!d.routed && !d.blackout && d.solved && <span className="status-badge warn">ROUTE NOW</span>}
                {!d.routed && !d.blackout && !d.solved && isActive && <span className="status-badge warn">SOLVE</span>}
              </div>
            </div>

            {/* Stability bar for timed districts */}
            {d.maxStability && !d.routed && !d.blackout && (
              <div className="stability-bar">
                <div className="stability-fill" style={{
                  width: `${(d.stability / d.maxStability) * 100}%`,
                  background: d.stability > d.maxStability * 0.5 ? '#22c55e' : d.stability > d.maxStability * 0.25 ? '#f59e0b' : '#ef4444',
                }} />
              </div>
            )}
            {d.maxStability && !d.routed && !d.blackout && (
              <div style={{ fontSize: 10, color: d.stability <= 5 ? '#ef4444' : '#64748b', textAlign: 'right' }}>
                Stability: {d.stability}s
              </div>
            )}

            {/* Sources */}
            <div className="sources">
              {round.fixedSources.map(s => (
                <div key={s.id} className="source-chip">
                  <span>{s.emoji}</span> <span>{s.name}</span> <span className="val">+{s.output} MW</span>
                </div>
              ))}
              <div className="source-chip" style={{ borderColor: '#fbbf24' }}>
                <span>{round.unknownSource.emoji}</span>
                <span>{round.unknownSource.name}</span>
                <span className="val" style={{ color: '#fbbf24' }}>{d.solved ? `+${d.solvedVal} MW` : '? MW'}</span>
              </div>
            </div>

            {/* Equation — only for active unsolved district */}
            {isActive && !d.solved && !d.blackout && (
              <div className="equation-block">
                <div className="equation-text">
                  {d.known} + <span className="unknown">x</span> = {d.demand}
                </div>
                <div style={{ fontSize: 11, color: '#64748b', marginTop: 4 }}>
                  How much from {round.unknownSource.name}?
                </div>
                <div className="solve-row">
                  <input className="solve-input" type="number" value={inputVal}
                    onChange={e => setInputVal(e.target.value)}
                    onKeyDown={e => { if (e.key === 'Enter') handleSolve(); }}
                    placeholder="x" autoFocus
                  />
                  <button className="solve-btn" onClick={handleSolve} disabled={!inputVal}>SOLVE</button>
                </div>
              </div>
            )}

            {/* Route button */}
            {d.solved && !d.routed && !d.blackout && isActive && (
              <div style={{ textAlign: 'center', marginTop: 8 }}>
                <button className="route-btn" onClick={() => handleRoute(d.id)}>
                  ⚡ ROUTE {d.solvedVal} MW TO {d.name.toUpperCase()}
                </button>
              </div>
            )}

            {/* Feedback */}
            {feedback && feedback.districtId === d.id && (
              <div className={`feedback ${feedback.type}`}>{feedback.msg}</div>
            )}
          </div>
        );
      })}

      {/* Scarcity warning — shown when both equations are solved but deficit exists */}
      {round.scarcity && round.districts.every(d => d.solved || d.routed || d.blackout) && round.districts.some(d => !d.routed && !d.blackout) && (
        <div className="deficit-warning">
          ⚠️ Both equations solved — but only {round.totalExtra - powerUsed} MW reserve left.
          You cannot fully power everything. Choose which district gets power first.
        </div>
      )}

      {/* Shift complete overlay */}
      {showOverlay && overlayData && (
        <div className="overlay">
          <div className={`overlay-card ${overlayData.lost.length > 0 ? 'failed' : ''}`}>
            <h2>{overlayData.lost.length === 0 ? '⚡ ALL DISTRICTS POWERED' : '⚡ SHIFT COMPLETE'}</h2>
            <div className="stat-line">Score: <span>{overlayData.score}</span></div>

            {overlayData.saved.map(d => (
              <div key={d.id} className="triage-line saved">
                ✅ {d.emoji} {d.name} — powered ({d.priority})
              </div>
            ))}
            {overlayData.lost.map(d => (
              <div key={d.id} className="triage-line lost">
                ⛔ {d.emoji} {d.name} — lost power ({d.priority})
              </div>
            ))}

            {overlayData.routeOrder.length > 0 && round.scarcity && (
              <div style={{ fontSize: 11, color: '#64748b', marginTop: 8 }}>
                You chose: {overlayData.routeOrder.map(id => round.districts.find(d => d.id === id)?.name).join(' → ')}
              </div>
            )}

            {round.scarcity && overlayData.lost.length > 0 && (
              <div style={{ fontSize: 12, color: '#94a3b8', marginTop: 8, fontStyle: 'italic' }}>
                Not enough reserve power for all districts. You had to choose.
              </div>
            )}

            {levelIdx < LEVELS.length - 1 ? (
              <button className="next-btn" onClick={() => startLevelByIdx(levelIdx + 1)}>NEXT SHIFT →</button>
            ) : (
              <button className="next-btn" onClick={() => { setScreen('menu'); setScore(0); }}>BACK TO MENU</button>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PowerGridPrototype />);
</script>
</body>
</html>
